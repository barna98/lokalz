      )}
      {tab==="reports"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          {reports.length===0
            ?<div className="empty"><div className="empty-icon">🚩</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No reports yet.</div></div>
            :Object.entries(
                reports.reduce((acc,r)=>{
                  const key = r.venue_id;
                  if(!acc[key]) acc[key]={name:r.venues?.name||"Unknown venue", reports:[]};
                  acc[key].reports.push(r);
                  return acc;
                },{})
              ).map(([venueId,group])=>(
              <div key={venueId} className="admin-card" style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{group.name}</div>
                  <button onClick={async()=>{
                    await Promise.all(group.reports.map(r=>supabase.from("venue_reports").delete().eq("id",r.id)));
                    setReports(prev=>prev.filter(r=>r.venue_id!==venueId));
                  }} style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"6px 12px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#0A3622",cursor:"pointer"}}>
                    ✓ Resolved
                  </button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {group.reports.map(r=>(
                    <div key={r.id} style={{background:"#F8D7DA",color:"#58151C",borderRadius:8,padding:"3px 10px",fontFamily:"var(--display)",fontWeight:700,fontSize:12}}>
                      {r.report_type==="closed"?"Closed"
                       :r.report_type==="wrong_address"?"Wrong address"
                       :r.report_type==="photos_outdated"?"Photos outdated"
                       :"Other"}
                    </div>
                  ))}
                </div>
                <div style={{fontFamily:"var(--body)",fontSize:11,color:"#888",fontWeight:600,marginTop:6}}>
                  {group.reports.length} report{group.reports.length>1?"s":""} · Latest: {new Date(group.reports[0].created_at).toLocaleDateString()}
                </div>
              </div>
            ))
          }
        </div>
      )}
      {tab==="events"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          {pendingEvents.length===0
            ?<div className="empty"><div className="empty-icon">🗓</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No pending events</div></div>
            :pendingEvents.map(ev=>(
              <div key={ev.id} className="admin-card" style={{marginBottom:12}}>
                <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,marginBottom:4}}>{ev.title}</div>
                <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginBottom:4}}>
                  by {ev.users?.name||"Scout"} · {ev.venues?.name||"No venue"}
                </div>
                {ev.event_date&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>
                  📅 {new Date(ev.event_date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
                </div>}
                {ev.description&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#555",lineHeight:1.5,marginBottom:10}}>{ev.description}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>approveEvent(ev.id)}
                    style={{flex:1,background:"#D1E7DD",color:"#0A3622",border:"none",borderRadius:10,padding:"10px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✓ APPROVE
                  </button>
                  <button onClick={()=>rejectEvent(ev.id)}
                    style={{flex:1,background:"#F8D7DA",color:"#58151C",border:"none",borderRadius:10,padding:"10px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✕ REJECT
                  </button>
                </div>
              </div>
            ))
          }
        </div>
      )}
      {tab==="partners"&&(
        <PartnerManageTab showToast={showToast}/>
      )}
    </div>
  );
}

function PartnerManageTab({showToast}) {
  const [partners, setPartners] = useState([]);
  const [pins, setPins] = useState({});
  const [generating, setGenerating] = useState(null);

  useEffect(()=>{
    supabase.from("partners").select("*").order("name").then(({data})=>{
      if(data) setPartners(data);
    });
  },[]);

  async function generatePin(partnerId){
    setGenerating(partnerId);
    const pin = Math.floor(1000 + Math.random() * 9000).toString();
    const validUntil = new Date();
    validUntil.setMonth(validUntil.getMonth() + 3);
    const {error} = await supabase.from("partner_pins").insert({
      partner_id: partnerId,
      pin,
      valid_from: new Date().toISOString(),
      valid_until: validUntil.toISOString()
    });
    setGenerating(null);
    if(error){ showToast("Error: "+error.message); return; }
    setPins(p=>({...p, [partnerId]: pin}));
    showToast("PIN generated: " + pin);
  }

  return (
    <div className="scroll" style={{padding:"14px 20px"}}>
      {partners.length===0
        ?<div className="empty"><div className="empty-icon">🏨</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No partners yet.</div></div>
        :partners.map(p=>(
          <div key={p.id} className="admin-card" style={{marginBottom:12}}>
            <div style={{marginBottom:8}}>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{p.name}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>{p.type} · {p.plan} · {p.address}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,color:"var(--red)",fontWeight:600,marginTop:1}}>🔗 lokalz.vercel.app/{p.slug}</div>
            </div>
            {pins[p.id]&&(
              <div style={{background:"#D1E7DD",borderRadius:10,padding:"10px 14px",marginBottom:10,fontFamily:"var(--display)",fontWeight:800,fontSize:20,color:"#0A3622",textAlign:"center",letterSpacing:".3em"}}>
                {pins[p.id]}
                <div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:600,color:"#0A3622",opacity:.7,marginTop:2,letterSpacing:0}}>Valid 3 months — send to hotel</div>
              </div>
            )}
            <button onClick={()=>generatePin(p.id)} style={{background:"var(--red)",border:"none",borderRadius:10,padding:"10px 16px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,color:"white",cursor:"pointer",width:"100%",opacity:generating===p.id?0.6:1}}>
              {generating===p.id?"generating...":"🔑 Generate new PIN"}
            </button>
          </div>
        ))
      }
    </div>
  );
}

function ProfileScreen({navigate, user, setUser, onMenu, onSignOut, darkMode, setDarkMode, cities}) {
  const [editing, setEditing] = useState(null);
  const [newName, setNewName] = useState(user?.name||"");
  const [newPassword, setNewPassword] = useState("");
  const [newPassword2, setNewPassword2] = useState("");
  const [newCity, setNewCity] = useState(user?.city||"Budapest");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showDelete, setShowDelete] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState("");
  const [newBio, setNewBio] = useState(user?.bio||"");
  const [newInstagram, setNewInstagram] = useState(user?.instagram_url||"");
  const [uploadingImg, setUploadingImg] = useState(false);

  function showMsg(text, isErr=false){setMsg({text,isErr});setTimeout(()=>setMsg(null),3000);}

  async function saveProfile(){
    setSaving(true);
    const {error} = await supabase.from("users").update({
      bio: newBio.trim()||null,
      instagram_url: newInstagram.trim()||null,
    }).eq("id",user.id);
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setUser(u=>({...u, bio:newBio.trim(), instagram_url:newInstagram.trim()}));
    setEditing(null);
    showMsg("Profile updated ✓");
  }

  async function uploadProfileImage(file){
    setUploadingImg(true);
    const ext = file.name.split(".").pop();
    const path = `profiles/${user.id}.${ext}`;
    const {error} = await supabase.storage.from("venue-images").upload(path, file, {upsert:true});
    if(error){showMsg("Upload error: "+error.message,true);setUploadingImg(false);return;}
    const {data} = supabase.storage.from("venue-images").getPublicUrl(path);
    await supabase.from("users").update({profile_image:data.publicUrl}).eq("id",user.id);
    setUser(u=>({...u, profile_image:data.publicUrl}));
    showMsg("Photo updated ✓");
    setUploadingImg(false);
  }

  async function savePassword(){
    if(newPassword.length<6) return showMsg("Password must be at least 6 characters.",true);
    if(newPassword!==newPassword2) return showMsg("Passwords don't match.",true);
    setSaving(true);
    const {error} = await supabase.auth.updateUser({password: newPassword});
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setNewPassword("");setNewPassword2("");setEditing(null);
    showMsg("Password updated ✓");
  }

  async function saveCity(){
    setSaving(true);
    const {data: cityData} = await supabase.from("cities").select("id").eq("name", newCity).single();
    const {error} = await supabase.from("users").update({city_id: cityData?.id||null}).eq("id",user.id);
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setUser(u=>({...u, city_id: cityData?.id||null, city: newCity}));
    setEditing(null);
    showMsg("City updated ✓");
  }

  async function deleteAccount(){
    if(deleteConfirm!=="delete") return showMsg("Type DELETE to confirm.",true);
    const {error} = await supabase.rpc("delete_user");
    if(error){
      // fallback: just sign out
      await supabase.auth.signOut();
      onSignOut();
      return;
    }
    await supabase.auth.signOut();
    onSignOut();
  }

  const rowStyle={background:"var(--white)",borderRadius:14,padding:"16px",marginBottom:10,cursor:"pointer"};

  return (
    <div className="screen">
      <div className="hdr"><Hamburger onClick={onMenu}/><div/></div>
      <div style={{padding:"12px 24px 24px"}}>
        <div className="logo-md">Lokal'z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)"}} style={{marginTop:6}}>Profile</div>
      </div>
      <div className="scroll" style={{padding:"0 20px"}}>

        {/* Profile header — kép, név, bio */}
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,padding:"16px",background:"var(--white)",borderRadius:16}}>
          <label style={{cursor:"pointer",flexShrink:0}}>
            <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&uploadProfileImage(e.target.files[0])}/>
            <div style={{width:72,height:72,borderRadius:"50%",background:"var(--red)",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              {user?.profile_image
                ?<img src={user.profile_image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                :<span style={{fontFamily:"var(--display)",fontWeight:900,fontSize:28,color:"white"}}>{(user?.name||"U")[0].toUpperCase()}</span>
              }
              <div style={{position:"absolute",bottom:0,right:0,background:"rgba(0,0,0,.5)",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>📷</div>
              {uploadingImg&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:20,height:20,border:"2px solid white",borderTop:"2px solid transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>}
            </div>
          </label>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:18,color:"var(--black)"}}>{user?.name||"User"}</div>
            {(user?.role==="scout"||user?.role==="city_lead")&&<div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:700,color:"var(--red)",marginTop:2,letterSpacing:".04em"}}>{user.role==="city_lead"?"city lead":"scout"}</div>}
            {user?.bio&&<div style={{fontFamily:"var(--body)",fontSize:13,fontWeight:600,color:"#666",marginTop:4,lineHeight:1.5}}>{user.bio}</div>}
          </div>
        </div>

        {/* Bio + Instagram — scout/city_lead esetén szerkeszthető */}
        {(user?.role==="scout"||user?.role==="city_lead")&&(
          <div style={{background:"var(--white)",borderRadius:14,padding:"16px",marginBottom:10,cursor:"pointer"}} onClick={()=>setEditing(editing==="profile"?null:"profile")}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em"}}>SCOUT PROFILE</div>
              <span style={{color:"var(--red)",fontSize:20}}>{editing==="profile"?"∨":"›"}</span>
            </div>

                {user?.bio||<span style={{color:"#bbb"}}>Add a bio...</span>}
                {user?.instagram_url&&<span style={{marginLeft:8,color:"var(--red)"}}>@{user.instagram_url.replace("https://instagram.com/","").replace("@","")}</span>}
              </div>
            )}
            {editing==="profile"&&(
              <div style={{marginTop:12}} onClick={e=>e.stopPropagation()}>
                <textarea placeholder="Short bio (max 160 chars)" maxLength={160} rows={3} value={newBio} onChange={e=>setNewBio(e.target.value)}
                  style={{width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,marginBottom:8,outline:"none",resize:"none"}}/>
                <input placeholder="Instagram URL or @handle" value={newInstagram} onChange={e=>setNewInstagram(e.target.value)}
                  style={{width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,marginBottom:10,outline:"none"}}/>
                <button onClick={saveProfile} style={{background:"var(--red)",color:"white",border:"none",borderRadius:10,padding:"11px",width:"100%",fontFamily:"var(--display)",fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>
                  {saving?"saving...":"save profile"}

              </div>
            )}
          </div>
        )}

        {/* Name — editable */}
        <div style={rowStyle} onClick={()=>setEditing(editing==="name"?null:"name")}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em"}}>NAME</div>
              <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15,color:"var(--black)",marginTop:2}}>{user?.name||"User"}</div>
            </div>
            <span style={{color:"var(--red)",fontSize:20}}>{editing==="name"?"∨":"›"}</span>
          </div>
          {editing==="name"&&(
            <div style={{marginTop:12}} onClick={e=>e.stopPropagation()}>
              <input
                value={newName}
                onChange={e=>setNewName(e.target.value)}

              <button onClick={async()=>{
                if(!newName.trim()) return showMsg("Name cannot be empty.",true);
                setSaving(true);
                const {error} = await supabase.from("users").update({name:newName.trim()}).eq("id",user.id);
                setSaving(false);
                if(error) return showMsg(error.message,true);
                setUser(u=>({...u, name: newName.trim()}));
                setEditing(null);
                showMsg("Name updated ✓");
              }} style={{background:"var(--red)",color:"white",border:"none",borderRadius:10,padding:"11px",width:"100%",fontFamily:"var(--display)",fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>
                {saving?"saving...":"save name"}

          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15,color:"var(--black)",marginTop:2}}>{user?.email||""}</div>
        </div>

        {/* Password */}

            </div>
            <span style={{color:"var(--red)",fontSize:20}}>{editing==="password"?"∨":"›"}</span>
          </div>
          {editing==="password"&&(

              <input type="password" placeholder="Confirm password" value={newPassword2} onChange={e=>setNewPassword2(e.target.value)}

              <button onClick={savePassword} style={{background:"var(--red)",color:"white",border:"none",borderRadius:10,padding:"11px",width:"100%",fontFamily:"var(--display)",fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>
                {saving?"saving...":"save password"}

            </div>

        {/* City */}

              <select value={newCity} onChange={e=>setNewCity(e.target.value)}

              </select>
              <button onClick={saveCity} style={{background:"var(--red)",color:"white",border:"none",borderRadius:10,padding:"11px",width:"100%",fontFamily:"var(--display)",fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>

          )}

        {/* Dark mode */}

          </button>

            <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:14,color:"#58151C",marginBottom:8}}>Are you sure?</div>

              style={{width:"100%",border:"1.5px solid #F8D7DA",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,marginBottom:10,outline:"none"}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={deleteAccount} style={{flex:1,background:"#58151C",color:"white",border:"none",borderRadius:10,padding:"11px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer",opacity:deleteConfirm==="delete"?1:.5}}>
                DELETE
              </button>
              <button onClick={()=>{setShowDelete(false);setDeleteConfirm("");}} style={{background:"#eee",border:"none",borderRadius:10,padding:"11px 16px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          </div>
        }
        <div style={{height:32}}/>
      </div>
    </div>
  );
}


// ── SCOUT PROFILE SCREEN ─────────────────────
function ScoutProfileScreen({navigate, scoutId, allVenues, user}) {
  const [scout, setScout] = useState(null);
  const [venues, setVenues] = useState([]);
  const [loading, setLoading] = useState(true);
  const [catFilter, setCatFilter] = useState("All");
  const [isFollowing, setIsFollowing] = useState(false);
  const [followLoading, setFollowLoading] = useState(false);

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const {data: sd} = await supabase
        .from("users").select("id,name,bio,instagram_url,profile_image,role,badge")
        .eq("id", scoutId).single();
      setScout(sd||null);

      const {data: added} = await supabase
        .from("venues").select("*")
        .eq("submitted_by", scoutId)
        .eq("status","active");

      const {data: saved} = await supabase
        .from("saved_venues").select("venue_id")
        .eq("user_id", scoutId);
      const savedIds = new Set((saved||[]).map(s=>s.venue_id));

      let savedVenues = [];
      if(savedIds.size > 0){
        const {data: sv} = await supabase
          .from("venues").select("*")
          .in("id",[...savedIds])
          .eq("status","active");
        savedVenues = sv||[];
      }

      const merged = [...(added||[])];
      (savedVenues||[]).forEach(v=>{ if(!merged.find(a=>a.id===v.id)) merged.push(v); });
      setVenues(merged);

      // Check if following
      if(user?.id){
        const {data: follow} = await supabase
          .from("scout_follows")
          .select("id")
          .eq("user_id", user.id)
          .eq("scout_id", scoutId)
          .single();
        setIsFollowing(!!follow);
      }
      setLoading(false);
    }
    if(scoutId) load();
  },[scoutId]);

  async function toggleFollow(){
    if(!user?.id) return;
    setFollowLoading(true);
    if(isFollowing){
      await supabase.from("scout_follows").delete().eq("user_id",user.id).eq("scout_id",scoutId);
      setIsFollowing(false);
    } else {
      await supabase.from("scout_follows").insert({user_id:user.id, scout_id:scoutId});
      setIsFollowing(true);
    }
    setFollowLoading(false);
  }

  const isPremium = user?.role==="premium"||user?.role==="scout"||user?.role==="city_lead";

  if(!isPremium) return (
    <div className="screen">
      <div className="hdr">
        <button className="back-btn" onClick={()=>navigate("results")}>&#8249;</button>
        <div/><div style={{width:26}}/>
      </div>
      <div style={{padding:"60px 28px",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:20}}>⭐</div>
        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:22,color:"var(--black)",marginBottom:10}}>Premium Feature</div>
        <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:600,color:"#777",lineHeight:1.6}}>Scout profiles are available to Premium members.</div>
      </div>
    </div>
  );

  if(loading) return (
    <div className="screen" style={{alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:36,height:36,border:"3px solid rgba(0,0,0,.15)",borderTop:"3px solid var(--blue)",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"#888"}}>Loading scout...</div>
    </div>
  );

  const igHandle = (scout?.instagram_url||"")
    .replace("https://www.instagram.com/","")
    .replace("https://instagram.com/","")
    .replace("@","").replace("/","");

  const categories = ["All", ...new Set(venues.map(v=>v.category||v.cuisine).filter(Boolean))];
  const filtered = catFilter==="All" ? venues : venues.filter(v=>(v.category||v.cuisine)===catFilter);
  const isOwnProfile = user?.id===scoutId;

  return (
    <div className="screen">
      <div className="hdr">
        <button className="back-btn" onClick={()=>navigate(-1)}>&#8249;</button>
        <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,color:"var(--red)",letterSpacing:".04em"}}>SCOUT</div>
        <div style={{width:26}}/>
      </div>
      <div className="scroll" style={{padding:"0 0 40px"}}>

        {/* Hero header */}
        <div style={{background:"var(--red)",padding:"28px 24px 24px",marginBottom:0}}>
          <div style={{display:"flex",alignItems:"center",gap:18,marginBottom:16}}>
            <div style={{width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,.2)",overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:"3px solid rgba(255,255,255,.3)"}}>
              {scout?.profile_image
                ?<img src={scout.profile_image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                :<span style={{fontFamily:"var(--display)",fontWeight:900,fontSize:32,color:"white"}}>{(scout?.name||"S")[0].toUpperCase()}</span>
              }
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:22,color:"white",letterSpacing:".02em"}}>{scout?.name||"Scout"}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:700,color:"rgba(255,255,255,.6)",letterSpacing:".06em",marginTop:3}}>
                {scout?.badge||( scout?.role==="city_lead"?"✦ CITY LEAD":"✦ LOCAL SCOUT")}
              </div>
              {igHandle&&(
                <a href={`https://instagram.com/${igHandle}`} target="_blank" rel="noreferrer"
                  style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:6,fontFamily:"var(--body)",fontSize:13,fontWeight:700,color:"rgba(255,255,255,.85)",textDecoration:"none"}}>
                  📸 @{igHandle}
                </a>
              )}
            </div>
          </div>

          {scout?.bio&&(
            <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"rgba(255,255,255,.85)",lineHeight:1.6,padding:"12px 14px",background:"rgba(255,255,255,.1)",borderRadius:12,marginBottom:16}}>
              "{scout.bio}"
            </div>
          )}

          {/* Follow button — not own profile */}
          {!isOwnProfile&&(
            <button onClick={toggleFollow} disabled={followLoading}
              style={{width:"100%",background:isFollowing?"rgba(255,255,255,.15)":"white",border:isFollowing?"2px solid rgba(255,255,255,.3)":"none",borderRadius:12,padding:"12px",fontFamily:"var(--display)",fontWeight:800,fontSize:14,color:isFollowing?"white":"var(--red)",cursor:"pointer",letterSpacing:".04em",opacity:followLoading?0.6:1,transition:"all .2s"}}>
              {followLoading?"...":(isFollowing?"✓ FOLLOWING":"+ FOLLOW")}
            </button>
          )}
        </div>

        {/* Category filter */}
        {categories.length > 2 && (
          <div style={{padding:"14px 20px 0",overflowX:"auto",display:"flex",gap:8,flexShrink:0}}>
            {categories.map(c=>(
              <button key={c} onClick={()=>setCatFilter(c)}
                style={{flexShrink:0,padding:"7px 16px",borderRadius:20,border:"1.5px solid",fontFamily:"var(--body)",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",
                  background:catFilter===c?"var(--red)":"var(--white)",
                  color:catFilter===c?"white":"var(--red)",
                  borderColor:"var(--red)"}}>
                {c}
              </button>
            ))}
          </div>
        )}

        {/* Venue lista */}
        <div style={{padding:"14px 20px"}}>

// ── PARTNER ACTIVATE SCREEN ──────────────────
function PartnerActivateScreen({partner, navigate, user, onActivate, showToast}) {
  const [pin, setPin] = useState("");
  const [nights, setNights] = useState(1);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [attempts, setAttempts] = useState(0);
  const MAX_ATTEMPTS = 5;

  async function activate(){
    if(!pin) return setError("Please enter the PIN code.");
    if(attempts >= MAX_ATTEMPTS) return setError("Too many attempts. Please contact the hotel reception.");
    setLoading(true);
    setError(null);
    // Check PIN
    const {data: validPin} = await supabase
      .from("partner_pins")
      .select("id")
      .eq("partner_id", partner.id)
      .eq("pin", pin)
      .gt("valid_until", new Date().toISOString())
      .single();

    if(!validPin){
      setLoading(false);
      setAttempts(a=>a+1);
      const remaining = MAX_ATTEMPTS - attempts - 1;
      return setError(remaining > 0
        ? `Invalid PIN. ${remaining} attempt${remaining===1?"":"s"} remaining.`
        : "Too many attempts. Please contact the hotel reception."
      );
    }

    // Save partner access to user profile
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + nights);

    const {error: updateError} = await supabase.from("users").update({
      partner_id: partner.id,
      partner_access_expires_at: expiresAt.toISOString()
    }).eq("id", user.id);

    setLoading(false);
    if(updateError) return setError("Something went wrong. Please try again.");

    onActivate({...user, partner_id: partner.id, partner_access_expires_at: expiresAt.toISOString()});
    showToast("Welcome to " + partner.name + "! 🎉");
    navigate("home");
  }

  return (
    <div className="screen" style={{padding:"36px 28px", justifyContent:"space-between"}}>
      <div>
        <div className="logo-md">Lokal'z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)"}} style={{marginTop:8}}>Activate your stay</div>
        <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:600,color:"#555",marginTop:8,lineHeight:1.5}}>
          Enter the PIN code from {partner.name} to unlock your local guide.
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:0,marginBottom:8}}>PIN CODE</div>
          <input
            className="input-field"
            placeholder="Enter PIN"
            value={pin}
            onChange={e=>{setPin(e.target.value);setError(null);}}
            maxLength={8}
            style={{textAlign:"center",fontSize:24,letterSpacing:".3em"}}
          />
        </div>
        <div>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:0,marginBottom:8}}>HOW MANY NIGHTS?</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[1,2,3,4,5,6,7].map(n=>(
              <button key={n} onClick={()=>setNights(n)}
                style={{flex:1,minWidth:40,background:nights===n?"var(--black)":"var(--red)",color:"white",border:"none",borderRadius:12,padding:"14px 8px",fontFamily:"var(--display)",fontWeight:800,fontSize:17,cursor:"pointer"}}>
                {n}
              </button>
            ))}
          </div>
        </div>
        {error&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#c00",fontWeight:600,background:"rgba(255,0,0,.08)",padding:"10px 14px",borderRadius:10}}>{error}</div>}
      </div>
      <button className="btn-black" onClick={activate} style={{opacity:loading?0.6:1}}>
        {loading?"ACTIVATING...":"ACTIVATE →"}
      </button>
    </div>
  );
}

function EventDetailScreen({navigate, event, user, showToast}) {
  const [rsvp, setRsvp] = useState(null);
  const [rsvpCount, setRsvpCount] = useState(0);
  const [loading, setLoading] = useState(false);
  const isPremium = user?.role==="premium"||user?.role==="scout"||user?.role==="city_lead";

  useEffect(()=>{
    if(!event) return;
    // Load RSVP count
    supabase.from("event_rsvps").select("id",{count:"exact"}).eq("event_id",event.id).eq("status","going")
      .then(({count})=>setRsvpCount(count||0));
    // Load own RSVP
    if(user?.id){
      supabase.from("event_rsvps").select("status").eq("event_id",event.id).eq("user_id",user.id).single()
        .then(({data})=>{ if(data) setRsvp(data.status); });
    }
  },[event?.id]);

  async function doRsvp(status){
    if(!isPremium){ navigate("upgrade"); return; }
    if(!user?.id) return;
    setLoading(true);
    await supabase.from("event_rsvps").upsert({event_id:event.id, user_id:user.id, status},{onConflict:"event_id,user_id"});
    setRsvp(status);
    setRsvpCount(c=> status==="going" ? c+1 : Math.max(0,c-1));
    showToast(status==="going"?"You're going! 🎉":"RSVP updated");
    setLoading(false);
  }

  function formatDate(dt){
    const d = new Date(dt);
    return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }

  if(!event) return null;

  return (
    <div className="screen">
      <div style={{width:"100%",height:220,background:"var(--red)",flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        {event.cover_image
          ?<img src={event.cover_image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<span style={{fontSize:64}}>🎉</span>
        }
        <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent,rgba(0,0,0,.5))"}}/>
        <button className="back-btn" style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.4)",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:22}} onClick={()=>navigate(-1)}>‹</button>
      </div>
      <div className="scroll" style={{padding:"20px 24px 40px"}}>
        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:26,color:"var(--black)",marginBottom:12,letterSpacing:".02em"}}>{event.title}</div>
        <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--red)",marginBottom:8}}>📅 {formatDate(event.event_date)}</div>
        {event.venues&&(
          <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#555",marginBottom:16}}>📍 {event.venues?.name||""} · {event.venues?.address||""}</div>
        )}
        {event.description&&(
          <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#444",lineHeight:1.7,marginBottom:20}}>{event.description}</div>
        )}

        {/* RSVP */}
        <div style={{background:"var(--white)",borderRadius:16,padding:"16px",marginBottom:20}}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em",marginBottom:12}}>
            {rsvpCount} {rsvpCount===1?"person is":"people are"} going
          </div>
          <div style={{display:"flex",gap:8}}>
            {[["going","🎉 I'm going"],["maybe","🤔 Maybe"],["not_going","✕ Can't go"]].map(([val,label])=>(
              <button key={val} onClick={()=>doRsvp(val)} disabled={loading}
                style={{flex:1,padding:"11px 4px",border:"2px solid",borderRadius:12,fontFamily:"var(--display)",fontWeight:800,fontSize:11,letterSpacing:".02em",cursor:"pointer",transition:"all .15s",
                  background:rsvp===val?"var(--red)":"transparent",
                  color:rsvp===val?"white":"var(--black)",
                  borderColor:rsvp===val?"var(--red)":"rgba(0,0,0,.2)"}}>
                {label}
              </button>
            ))}
          </div>
          {!isPremium&&(
            <div style={{marginTop:10,textAlign:"center",fontFamily:"var(--body)",fontSize:12,fontWeight:600,color:"#888"}}>
              <span style={{color:"var(--red)",cursor:"pointer",fontWeight:700}} onClick={()=>navigate("upgrade")}>Upgrade to Premium</span> to RSVP
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

}

function CreatePlanModal({onClose, onCreate, user, allVenues, showToast}) {
  const [title, setTitle] = useState("");
  const [desc, setDesc] = useState("");
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [venueId, setVenueId] = useState("");
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      allVenues.filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||
        (v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch, allVenues]);

  function selectVenue(v){
    setVenueId(v.id);
    setVenueSearch(v.name+" · Dist. "+v.district);
    setVenueSuggestions([]);
  }

  async function save(){
    if(!title.trim()) return;
    if(!venueId){ showToast("Please select a venue"); return; }
    setSaving(true);
    const event_date = date&&time ? new Date(`${date}T${time}`).toISOString() : null;
    const {data, error} = await supabase.from("event_plans").insert({
      created_by: user.id,
      title: title.trim(),
      description: desc.trim()||null,
      event_date,
      venue_id: venueId||null,
    }).select("*, venues(name,district)").single();
    setSaving(false);
    if(error){ showToast("Error: "+error.message); return; }
    onCreate(data);
    showToast("Event created! 🎉");
  }

  const inputStyle = {width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,outline:"none",background:"white",color:"var(--black)",marginBottom:10};

  return (
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"var(--bg)",borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",width:"100%",animation:"slideInUp .3s ease both"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:20,color:"var(--black)"}}>NEW EVENT</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#888"}}>✕</button>
        </div>
        <input placeholder="Event name *" value={title} onChange={e=>setTitle(e.target.value)} style={inputStyle}/>
        <textarea placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)} rows={2}
          style={{...inputStyle,resize:"none"}}/>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inputStyle,flex:1,marginBottom:0}}/>
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{...inputStyle,flex:1,marginBottom:0}}/>
        </div>
        <div style={{position:"relative",marginBottom:10}}>
          <input
            placeholder="🔍 Search venue..."
            value={venueSearch}
            onChange={e=>{ setVenueSearch(e.target.value); setVenueId(""); }}
            style={{...inputStyle,marginBottom:0}}
          />
          {venueSuggestions.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #ddd",borderRadius:10,zIndex:50,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden"}}>
              {venueSuggestions.map(v=>(
                <div key={v.id} onClick={()=>selectVenue(v)}
                  style={{padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",cursor:"pointer",borderBottom:"1px solid #f5f5f5"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f9f6f0"}
                  onMouseLeave={e=>e.currentTarget.style.background="white"}>
                  {v.name} <span style={{color:"#888",fontSize:12}}>· Dist. {v.district}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <button className="btn-black" onClick={save} style={{opacity:saving||!title.trim()||!venueId?0.5:1}}>
          {saving?"creating...":"create event →"}
        </button>
      </div>
    </div>
  );
}

function EventPlanDetailScreen({navigate, plan, user, allVenues, showToast}) {
  const [rsvps, setRsvps] = useState([]);
  const [myRsvp, setMyRsvp] = useState(null);
  const [loading, setLoading] = useState(true);
  const [copied, setCopied] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [editForm, setEditForm] = useState({});
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [currentPlan, setCurrentPlan] = useState(plan);
  const isOwner = plan?.created_by===user?.id;

  useEffect(()=>{ setCurrentPlan(plan); },[plan]);

  useEffect(()=>{
    if(!plan) return;
    async function load(){
      const {data} = await supabase.from("event_plan_rsvps")
        .select("*, users(name)").eq("plan_id", plan.id);
      setRsvps(data||[]);
      if(user?.id) setMyRsvp((data||[]).find(r=>r.user_id===user.id)?.status||null);
      setLoading(false);
    }
    load();
  },[plan?.id]);

  // Venue autocomplete
  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      (allVenues||[]).filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||(v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch]);

  async function doRsvp(status){
    if(!user?.id) return;
    await supabase.from("event_plan_rsvps").upsert({plan_id:plan.id,user_id:user.id,status},{onConflict:"plan_id,user_id"});
    setMyRsvp(status);
    setRsvps(prev=>{
      const existing=prev.find(r=>r.user_id===user.id);
      if(existing) return prev.map(r=>r.user_id===user.id?{...r,status}:r);
      return [...prev,{user_id:user.id,status,users:{name:user.name}}];
    });
    showToast(status==="going"?"You're going! 🎉":"RSVP updated");
  }

  function copyLink(){
    const link = `${window.location.origin}${window.location.pathname}?plan=${plan.invite_code}`;
    navigator.clipboard?.writeText(link);
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
    showToast("Invite link copied! 🔗");
  }

  function openEdit(){
    const d = currentPlan.event_date ? new Date(currentPlan.event_date) : null;
    setEditForm({
      title: currentPlan.title||"",
      description: currentPlan.description||"",
      event_date: d ? d.toISOString().slice(0,10) : "",
      event_time: d ? d.toTimeString().slice(0,5) : "",
      venue_id: currentPlan.venue_id||"",
    });
    setVenueSearch(currentPlan.venues ? currentPlan.venues.name+" · Dist. "+currentPlan.venues.district : "");
    setVenueSuggestions([]);
    setShowEdit(true);
  }

  async function saveEdit(){
    if(!editForm.title.trim()) return;
    setSaving(true);
    const event_date = editForm.event_date&&editForm.event_time
      ? new Date(`${editForm.event_date}T${editForm.event_time}`).toISOString() : null;
    const {data, error} = await supabase.from("event_plans").update({
      title: editForm.title.trim(),
      description: editForm.description.trim()||null,
      event_date,
      venue_id: editForm.venue_id||null,
    }).eq("id", plan.id).select("*, venues(name,district)").single();
    setSaving(false);
    if(error){ showToast("Error: "+error.message); return; }
    setCurrentPlan(data);
    setShowEdit(false);
    showToast("Event updated ✓");
  }

  async function deletePlan(){
    if(!window.confirm("Delete this event? This cannot be undone.")) return;
    setDeleting(true);
    await supabase.from("event_plan_rsvps").delete().eq("plan_id", plan.id);
    const {error} = await supabase.from("event_plans").delete().eq("id", plan.id);
    if(error){ showToast("Error: "+error.message); setDeleting(false); return; }
    showToast("Event deleted");
    navigate(-1);
  }

  function formatDate(dt){
    if(!dt) return "Date TBD";
    const d=new Date(dt);
    return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }

  if(!currentPlan) return null;

  const going = rsvps.filter(r=>r.status==="going");
  const maybe = rsvps.filter(r=>r.status==="maybe");
  const inputStyle = {width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,outline:"none",background:"white",color:"var(--black)",marginBottom:10};

  return (
    <div className="screen">
      <div className="hdr">
        <button className="back-btn" onClick={()=>navigate(-1)}>&#8249;</button>
        <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,color:"var(--red)",letterSpacing:".04em"}}>EVENT</div>
        <div style={{width:26}}/>
      </div>
      <div className="scroll" style={{padding:"8px 24px 40px"}}>

        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:26,color:"var(--black)",marginBottom:8}}>{currentPlan.title}</div>
        <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--red)",marginBottom:6}}>📅 {formatDate(currentPlan.event_date)}</div>
        {currentPlan.venues&&<div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#555",marginBottom:12}}>📍 {currentPlan.venues.name} · Dist. {currentPlan.venues.district}</div>}
        {currentPlan.description&&<div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#444",lineHeight:1.7,marginBottom:16}}>{currentPlan.description}</div>}

        {/* Owner actions */}
        {isOwner&&(
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={openEdit}
              style={{flex:1,background:"#EDE8E0",border:"none",borderRadius:12,padding:"12px",fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"var(--black)",cursor:"pointer",letterSpacing:".04em"}}>
              ✏️ EDIT
            </button>
            <button onClick={deletePlan} disabled={deleting}
              style={{flex:1,background:"#F8D7DA",border:"none",borderRadius:12,padding:"12px",fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#58151C",cursor:"pointer",letterSpacing:".04em",opacity:deleting?0.5:1}}>
              {deleting?"...":"🗑 DELETE"}
            </button>
          </div>
        )}

        {/* Invite link */}
        <div style={{background:"var(--red)",borderRadius:14,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"rgba(255,255,255,.7)",letterSpacing:".06em",marginBottom:2}}>INVITE LINK</div>
            <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:600,color:"rgba(255,255,255,.9)"}}>Share with friends to invite them</div>
          </div>
          <button onClick={copyLink}
            style={{background:"white",border:"none",borderRadius:10,padding:"9px 14px",fontFamily:"var(--display)",fontWeight:800,fontSize:12,color:"var(--red)",cursor:"pointer",letterSpacing:".04em",flexShrink:0}}>
            {copied?"copied ✓":"copy 🔗"}
          </button>
        </div>

        {/* RSVP */}
        <div style={{background:"var(--white)",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em",marginBottom:10}}>YOUR RSVP</div>
          <div style={{display:"flex",gap:8}}>
            {[["going","🎉 Going"],["maybe","🤔 Maybe"],["not_going","✕ Can't go"]].map(([val,label])=>(
              <button key={val} onClick={()=>doRsvp(val)}
                style={{flex:1,padding:"10px 4px",border:"2px solid",borderRadius:12,fontFamily:"var(--display)",fontWeight:800,fontSize:11,cursor:"pointer",transition:"all .15s",
                  background:myRsvp===val?"var(--red)":"transparent",
                  color:myRsvp===val?"white":"var(--black)",
                  borderColor:myRsvp===val?"var(--red)":"rgba(0,0,0,.2)"}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* Guest list */}
        <div style={{background:"var(--white)",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em",marginBottom:10}}>
            GUEST LIST · {going.length} going{maybe.length>0?`, ${maybe.length} maybe`:""}
          </div>
          {loading
            ?<div style={{fontFamily:"var(--body)",fontSize:13,color:"#888"}}>Loading...</div>
            :rsvps.length===0
              ?<div style={{fontFamily:"var(--body)",fontSize:13,color:"#888",fontWeight:600}}>No RSVPs yet. Share the invite link!</div>
              :rsvps.map(r=>(
                <div key={r.user_id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.06)"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontFamily:"var(--display)",fontWeight:900,fontSize:14,color:"white"}}>{(r.users?.name||"?")[0].toUpperCase()}</span>
                  </div>
                  <div style={{flex:1,fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--black)"}}>{r.users?.name||"Guest"}</div>
                  <span style={{fontSize:16}}>{r.status==="going"?"🎉":r.status==="maybe"?"🤔":"✕"}</span>
                </div>
              ))
          }
        </div>
      </div>

      {/* Edit modal */}
      {showEdit&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"var(--bg)",borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",width:"100%",animation:"slideInUp .3s ease both"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:18,color:"var(--black)"}}>EDIT EVENT</div>
              <button onClick={()=>setShowEdit(false)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#888"}}>✕</button>
            </div>
            <input placeholder="Title *" value={editForm.title} onChange={e=>setEditForm(f=>({...f,title:e.target.value}))} style={inputStyle}/>

              <input type="date" value={editForm.event_date} onChange={e=>setEditForm(f=>({...f,event_date:e.target.value}))} style={{...inputStyle,flex:1,marginBottom:0}}/>

            <div style={{position:"relative",marginBottom:10}}>
              <input placeholder="🔍 Search venue..." value={venueSearch}
                onChange={e=>{ setVenueSearch(e.target.value); setEditForm(f=>({...f,venue_id:""})); }}

                  {venueSuggestions.map(v=>(
                    <div key={v.id} onClick={()=>{setEditForm(f=>({...f,venue_id:v.id}));setVenueSearch(v.name+" · Dist. "+v.district);setVenueSuggestions([]);}}

              )}

        </div>
      )}

  );

    async function loadVenues(cityId){
      setVenuesLoading(true);
      let query = supabase
        .from("venues")
        .select("*")
        .in("status",["active","pending","needs_edit","watchlist"]);
      if(cityId) query = query.eq("city_id", cityId);
      const {data, error} = await query;
      if(!error && data) setAllVenues(data.map(v=>({
        ...v,
        price: v.price_level,
        why: v.why,
        emoji: "🍽",
        occasions: v.occasions || []
      })));
      setVenuesLoading(false);
    }
    loadVenues(null);
  },[]);

  // Reload venues when user city changes
  useEffect(()=>{
    if(!user?.city_id) return;
    async function reloadVenues(){
      setVenuesLoading(true);
      let query = supabase
        .from("venues")
        .select("*")
        .in("status",["active","pending","needs_edit","watchlist"])
        .eq("city_id", user.city_id);
      const {data, error} = await query;
      if(!error && data) setAllVenues(data.map(v=>({
        ...v,
        price: v.price_level,
        why: v.why,
        emoji: "🍽",
        occasions: v.occasions || []
      })));
      setVenuesLoading(false);
    }
    reloadVenues();
  },[user?.city_id]);

  const [darkMode, setDarkModeState] = useState(()=>localStorage.getItem("darkMode")==="true");

  function setDarkMode(val){
    setDarkModeState(val);
    localStorage.setItem("darkMode", val);
  }

  useEffect(()=>{
    const root = document.getElementById("root");
    if(darkMode) root.classList.add("dark-mode");
    else root.classList.remove("dark-mode");
  },[darkMode]);
  useEffect(()=>{
    // Safety timeout — max 5 másodperc loading
    const timeout = setTimeout(()=>setAppLoading(false), 5000);

    async function restoreSession(){
      try {
        const {data:{session}} = await supabase.auth.getSession();
        if(session){
          // Email megerősítés ellenőrzés
          if(!session.user.email_confirmed_at){
            await supabase.auth.signOut();
            clearTimeout(timeout);
            setAppLoading(false);
            return;
          }
          const {data:profile} = await supabase.from("users").select("*").eq("id",session.user.id).single();
          // Auto-create profile if doesn't exist (Google auth)
          if(!profile){
            await supabase.from("users").insert({
              id: session.user.id,
              name: session.user.user_metadata?.full_name || session.user.email.split("@")[0],
              email: session.user.email,
              role: "USER"
            });
          }
          const u = {
            id: session.user.id,
            name: profile?.name || session.user.user_metadata?.full_name || session.user.email.split("@")[0],
            email: session.user.email,
            role: profile?.role?.toLowerCase() || "user",
            city_id: profile?.city_id || null,
            badge: profile?.badge || null,
            partner_id: profile?.partner_id || null,
            partner_access_expires_at: profile?.partner_access_expires_at || null,
          };
          setUser(u);
          loadSavedIds(u.id);
          if(partner){
            const hasActiveAccess = u.partner_id && u.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
            setScreen(hasActiveAccess ? "home" : "partner_activate");
          } else {
            setScreen(u.city_id ? "home" : "onboarding");
          }
        }
      } catch(e){
        console.log("Session restore error:", e);
      } finally {
        clearTimeout(timeout);
        setAppLoading(false);
      }
    }

    restoreSession();

    const {data: authListener} = supabase.auth.onAuthStateChange(async (event, session)=>{
      if(event==="SIGNED_OUT"){
        setUser(null);
        setSavedIds(new Set());
        setScreen("signin");
      }
      // Google OAuth callback — csak ha nincs még user betöltve
      if(event==="SIGNED_IN" && session && !appLoading){
        const {data:profile} = await supabase.from("users").select("*").eq("id",session.user.id).single();
        if(!profile){
          await supabase.from("users").insert({
            id: session.user.id,
            name: session.user.user_metadata?.full_name || session.user.email.split("@")[0],
            email: session.user.email,
            role: "USER"
          });
        }
        const u = {
          id: session.user.id,
          name: profile?.name || session.user.user_metadata?.full_name || session.user.email.split("@")[0],
          email: session.user.email,
          role: profile?.role?.toLowerCase() || "user",
          city_id: profile?.city_id || null,
          badge: profile?.badge || null,
          partner_id: profile?.partner_id || null,
          partner_access_expires_at: profile?.partner_access_expires_at || null,
        };
        setUser(u);
        loadSavedIds(u.id);
        setAppLoading(false);
        if(partner){
          const hasActiveAccess = u.partner_id && u.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
          setScreen(hasActiveAccess ? "home" : "partner_activate");
        } else {
          setScreen(u.city_id ? "home" : "onboarding");
        }
      }
    });

    return ()=>{ authListener?.subscription?.unsubscribe(); };
  },[]);

  function navigate(target, data) {
    if(target===-1||target==="back"){
      setHistory(h=>{
        if(h.length===0){setScreen("home");return h;}
        const prev=h[h.length-1];
        setScreen(prev.screen);
        if(prev.venue) setSelectedVenue(prev.venue);
        if(prev.scout) setSelectedScout(prev.scout);
        if(prev.event) setSelectedEvent(prev.event);
        if(prev.plan) setSelectedPlan(prev.plan);
        return h.slice(0,-1);
      });
      setShowMenu(false);
      return;
    }
    setHistory(h=>[...h,{screen,venue:selectedVenue,scout:selectedScout,event:selectedEvent,plan:selectedPlan}]);
    if(target==="venue"&&data){setSelectedVenue(data);}
    if(target==="scout_profile"&&data){setSelectedScout(data);}
    if(target==="event_detail"&&data){setSelectedEvent(data);}
    if(target==="event_plan_detail"&&data){setSelectedPlan(data);}
    setScreen(target);
    setShowMenu(false);
  }
  function showToastMsg(msg){setToast(msg);setTimeout(()=>setToast(null),3000);}

  async function loadSavedIds(userId){
    const {data, error} = await supabase
      .from("saved_venues")
      .select("venue_id")
      .eq("user_id", userId);
    console.log("loadSavedIds", userId, data, error);
    if(data) setSavedIds(new Set(data.map(r=>r.venue_id)));
  }

  async function toggleSave(id){
    if(!user) return;
    const isSaved = savedIds.has(id);
    if(isSaved){
      setSavedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
      await supabase.from("saved_venues").delete().eq("user_id",user.id).eq("venue_id",id);
    } else {
      setSavedIds(prev=>new Set(prev).add(id));
      await supabase.from("saved_venues").insert({user_id:user.id, venue_id:id});
    }
  }

  function onLogin(u){
    setUser(u);
    if(u?.id) loadSavedIds(u.id);
    // If pending invite → go to event directly
    if(pendingInvite){
      setSelectedPlan(pendingInvite);
      setPendingInvite(null);
      setScreen(u.city_id ? "event_plan_detail" : "onboarding");
      return;
    }
    // If partner context → go to activate screen (or home if already has active access)
    if(partner){
      const hasActiveAccess = u?.partner_id===partner.id && u?.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
      if(hasActiveAccess) setScreen("home");
      else setScreen("partner_activate");
      return;
    }
    // Normal login → home or onboarding
    if(!u.city_id) setScreen("onboarding");
    else setScreen("home");
  }
  async function signOut(){
    await supabase.auth.signOut();
    setUser(null);
    setSavedIds(new Set());
    setScreen("signin");
  }

  const isScout = user?.role==="scout"||user?.role==="city_lead";
  const isPartnerActive = user?.partner_id && user?.partner_access_expires_at && new Date(user.partner_access_expires_at) > new Date();

  // If partner detected in URL and user not logged in → show partner landing
  useEffect(()=>{
    if(partner && screen==="signin"){
      setScreen("partner_landing");
    }
  },[partner]);

  // Pending invite flow
  useEffect(()=>{
    if(!pendingInvite || appLoading) return;
    setSelectedPlan(pendingInvite);
    if(!user){
      // Not logged in → go to signup, plan waiting
      setScreen("signup");
    } else {
      // Logged in → open event directly (free users can also RSVP)
      setScreen("event_plan_detail");
      setPendingInvite(null);
    }
  },[pendingInvite, appLoading, user]);

  const screens = {
    signin: <SignInScreen navigate={navigate} onLogin={onLogin}/>,
    signup: <SignUpScreen navigate={navigate} onLogin={onLogin}/>,
    onboarding: <OnboardingScreen navigate={navigate} user={user} setUser={setUser}/>,
    home: <HomeScreen navigate={navigate} onMenu={()=>setShowMenu(true)} setAnswers={setAnswers} user={user} partner={isPartnerActive ? partner : null}/>,
    q1: <Q1Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q2: <Q2Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers} partnerDistrict={isPartnerActive ? partner?.district : null}/>,
    q3: <Q3Screen navigate={navigate} answers={answers} setAnswers={setAnswers}/>,
    q4: <Q4Screen navigate={navigate} answers={answers} setAnswers={setAnswers}/>,
    q5: <Q5Screen navigate={navigate} answers={answers} setAnswers={setAnswers}/>,
    results: <ResultsScreen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} allVenues={allVenues} partner={isPartnerActive ? partner : null} user={user}/>,
    venue: selectedVenue&&<VenueDetailScreen venue={selectedVenue} navigate={navigate} savedIds={savedIds} toggleSave={toggleSave} showToast={showToastMsg} isScout={isScout} user={user}/>,
    saved: <SavedScreen navigate={navigate} savedIds={savedIds} allVenues={allVenues} onMenu={()=>setShowMenu(true)} user={user}/>,
    all_venues: <AllVenuesScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)}/>,
    scout: <ScoutScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} setAllVenues={setAllVenues} user={user} cities={cities}/>,
    city_lead: <CityLeadScreen navigate={navigate} allVenues={allVenues} setAllVenues={setAllVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} user={user}/>,
    profile: <ProfileScreen navigate={navigate} user={user} setUser={setUser} onMenu={()=>setShowMenu(true)} onSignOut={signOut} darkMode={darkMode} setDarkMode={setDarkMode} cities={cities}/>,
    about: <AboutScreen navigate={navigate}/>,
    upgrade: <UpgradeScreen navigate={navigate} user={user}/>,
    event_calendar: <EventCalendarScreen navigate={navigate} onMenu={()=>setShowMenu(true)} user={user}/>,
    event_detail: selectedEvent&&<EventDetailScreen navigate={navigate} event={selectedEvent} user={user} showToast={showToastMsg}/>,
    event_planning: <EventPlanningScreen navigate={navigate} onMenu={()=>setShowMenu(true)} user={user} allVenues={allVenues} showToast={showToastMsg}/>,
    event_plan_detail: selectedPlan&&<EventPlanDetailScreen navigate={navigate} plan={selectedPlan} user={user} allVenues={allVenues} showToast={showToastMsg}/>,
    scout_profile: selectedScout&&<ScoutProfileScreen navigate={navigate} scoutId={selectedScout} allVenues={allVenues} savedIds={savedIds} user={user}/>,
    partner_activate: partner&&user&&<PartnerActivateScreen partner={partner} navigate={navigate} user={user} onActivate={u=>{setUser(u);}} showToast={showToastMsg}/>,
    partner_signup: <SignUpScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
    partner_signin: <SignInScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
  };

  return (
    <div style={{width:"100%",height:"100%",position:"relative"}}>
      {appLoading
        ? <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"var(--bg)"}}>
            <div style={{fontFamily:"var(--display)",fontSize:32,color:"var(--red)",letterSpacing:0}}>Lokal'z</div>
            <div style={{width:32,height:32,border:"3px solid rgba(0,0,0,.2)",borderTop:"3px solid #000000",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          </div>
        : <>
            {screens[screen]||screens.signin}
            {showMenu&&<Menu onClose={()=>setShowMenu(false)} navigate={navigate} role={user?.role||"user"} onSignOut={signOut}/>}
            {toast&&<div className="toast">{toast}</div>}
          </>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
