<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Bricolage Grotesque',sans-serif;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#root{width:100%;max-width:430px;height:100dvh;max-height:932px;position:relative;overflow:hidden;background:#F5B8EC;}
@media(max-width:430px){#root{max-height:100dvh;}}

/* TOKENS */
:root{
  --bg: #F5B8EC;
  --red: #FD0100;
  --red-dark: #CC0000;
  --blue: #FD0100;
  --blue-dark: #CC0000;
  --black: #000000;
  --white: #FFFFFF;
  --display: 'Climate Crisis', sans-serif;
  --body: 'Bricolage Grotesque', sans-serif;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideInUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);animation:fadeUp .28s ease both;}

/* LOGO — large on auth screens, medium on inner screens */
.logo{font-family:var(--display);font-size:52px;color:var(--red);line-height:.88;letter-spacing:0;user-select:none;}
.logo-md{font-family:var(--display);font-size:40px;color:var(--red);line-height:.9;letter-spacing:0;user-select:none;}
.logo-white{color:var(--white);}

/* TAGLINE */
.tagline{font-family:var(--body);font-weight:400;font-size:17px;color:var(--black);margin-top:8px;line-height:1.3;}

/* SCRIPT TEXT */
.script{font-family:var(--body);font-size:26px;font-weight:600;color:var(--black);}
.script-white{color:var(--white);}
.script-sm{font-size:20px;}

/* INPUTS — blue background, white bold uppercase, pill shape */
.input-field{
  background:var(--white);
  border-radius:50px;
  padding:12px 22px;
  font-family:var(--body);
  font-weight:400;
  font-size:16px;
  color:var(--black);
  width:100%;
  border:1.5px solid var(--black);
  outline:none;
  cursor:text;
  display:block;
}
.input-field::placeholder{color:rgba(0,0,0,.4);font-weight:400;}

/* BUTTONS */
.btn-black{
  background:var(--black);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:12px 28px;
  font-family:var(--body);
  font-weight:400;
  font-size:16px;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s,opacity .12s;
  display:block;
}
.btn-black:active{transform:scale(.97);}

.btn-black-half{
  background:var(--white);
  color:var(--black);
  border:1.5px solid var(--black);
  border-radius:50px;
  padding:18px 20px;
  font-family:var(--body);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  flex:1;
  text-align:center;
  transition:transform .12s;
}
.btn-black-half:active{transform:scale(.97);}

.btn-blue{
  background:var(--red);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:18px 28px;
  font-family:var(--body);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s;
  display:block;
}
.btn-blue:active{transform:scale(.97);}

/* OCCASION CARDS — horizontal scroll */
.cards-row{
  display:flex;
  gap:14px;
  padding:0 24px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  padding-bottom:8px;
  flex-shrink:0;
}
.cards-row::-webkit-scrollbar{display:none;}

.occ-card{
  flex-shrink:0;
  width:210px;
  height:260px;
  background:var(--black);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  scroll-snap-align:center;
  transition:transform .15s,opacity .15s,outline .1s;
  position:relative;
  overflow:hidden;
}
.occ-card:active{transform:scale(.97);}
.occ-card.sel{outline:3px solid var(--red);background:#111;}
.occ-card-label{font-family:var(--body);font-size:22px;font-weight:600;color:var(--white);line-height:1.25;position:relative;z-index:1;}

/* SOMETHING ELSE EXPANDED */
.else-card{
  width:210px;
  min-height:260px;
  background:var(--black);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  flex-shrink:0;
  scroll-snap-align:center;
}
.else-item{
  font-family:var(--body);
  font-size:18px;
  font-weight:500;
  color:var(--white);
  padding:10px 6px;
  border-bottom:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:opacity .15s;
  border-radius:8px;
}
.else-item:last-child{border-bottom:none;}
.else-item:active{opacity:.7;}

/* MENU */
.menu-panel{
  position:absolute;inset:0;
  background:var(--black);
  z-index:101;
  animation:fadeIn .22s ease;
  display:flex;flex-direction:column;
  padding:56px 36px 44px;
}
.menu-close{position:absolute;top:24px;right:28px;background:none;border:none;color:rgba(255,255,255,.7);font-size:32px;cursor:pointer;font-weight:200;line-height:1;}
.menu-item{
  font-family:var(--body);
  font-weight:700;
  font-size:40px;
  color:var(--white);
  padding:10px 0;
  cursor:pointer;
  transition:opacity .15s;
  line-height:1.1;
}
.menu-item:active{opacity:.6;}
.menu-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.menu-bottom-item{font-family:var(--body);font-weight:700;font-size:14px;color:rgba(255,255,255,.55);cursor:pointer;transition:color .15s;}
.menu-bottom-item:active{color:var(--white);}

/* HAMBURGER */
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:7px;}
.hamburger span{display:block;width:26px;height:2px;background:var(--black);border-radius:2px;}

/* OPTION BUTTONS (location, budget, etc) */
.opt-btn{
  background:var(--white);
  border:1.5px solid rgba(0,0,0,.2);
  border-radius:16px;
  padding:18px 22px;
  font-family:var(--body);
  font-weight:500;
  font-size:16px;
  color:var(--black);
  cursor:pointer;
  width:100%;
  text-align:left;
  transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;
}
.opt-btn.sel{background:var(--black);color:var(--white);border-color:var(--black);}
.opt-btn:active{transform:scale(.98);}
.opt-check{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-check.on{background:var(--black);border-color:var(--black);}
.opt-check.on::after{content:'✓';font-size:12px;color:var(--white);font-weight:700;}

/* VENUE CARDS */
.venue-card{
  background:#FFFFFF;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s;
  margin-bottom:14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}
.venue-card:active{transform:scale(.98);}
.venue-img{width:100%;height:170px;background:var(--black);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;}
.venue-body{padding:16px 18px;}
.venue-name{font-family:var(--body);font-weight:700;font-size:20px;color:var(--black);margin-bottom:5px;}
.venue-meta{font-family:var(--body);font-size:13px;color:#666;font-weight:400;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.venue-tag{display:inline-block;background:#F0D8EC;color:#000;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}
.tab{flex:1;padding:14px 6px;font-family:var(--body);font-size:13px;font-weight:600;color:rgba(0,0,0,.35);background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;text-transform:uppercase;letter-spacing:.04em;transition:all .15s;}
.tab.on{color:var(--black);border-bottom-color:var(--black);}

/* MISC */
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0;flex-shrink:0;}
.back-btn{background:none;border:none;font-size:32px;color:var(--black);cursor:pointer;padding:0;line-height:1;font-weight:300;}
.text-link{font-family:var(--body);font-size:14px;font-weight:700;color:var(--black);text-decoration:underline;cursor:pointer;}
.text-link-blue{color:var(--red);}
.divider{height:1px;background:rgba(0,0,0,.1);margin:4px 0;}
.empty{text-align:center;padding:48px 20px;color:#888;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.toast{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--white);padding:13px 26px;border-radius:50px;font-family:var(--body);font-size:14px;font-weight:600;letter-spacing:.02em;animation:popIn .25s ease both;white-space:nowrap;z-index:300;}
.status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.04em;font-family:var(--body);}
.pill-pending{background:#FFF3CD;color:#856404;}
.pill-active{background:#D1E7DD;color:#0A3622;}
.pill-rejected{background:#F8D7DA;color:#58151C;}
.pill-needs_edit{background:#CFF4FC;color:#055160;}
.admin-card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.input-wrap-light{background:var(--white);border:1.5px solid rgba(0,0,0,.15);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;width:100%;}
.input-wrap-light input{border:none;outline:none;background:transparent;font-family:var(--body);font-size:15px;font-weight:400;color:var(--black);flex:1;}
.input-wrap-light input::placeholder{color:rgba(0,0,0,.3);}
.prog-dots{display:flex;gap:7px;justify-content:center;padding:10px 0 4px;}
.prog-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.13);transition:all .2s;}
.prog-dot.on{background:var(--black);width:24px;border-radius:5px;}

/* DARK MODE — disabled in new design */
</style>

function SignInScreen({navigate, onLogin}) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  async function go() {
    if(!email||!pw) return;
    setLoading(true);
    setError(null);
    try {
      const {data, error} = await supabase.auth.signInWithPassword({email, password:pw});
      if(error) throw error;
      if(!data.user.email_confirmed_at) {
        await supabase.auth.signOut();
        throw new Error("Please confirm your email before signing in. Check your inbox.");
      }
      const {data: profile} = await supabase.from("users").select("*").eq("id", data.user.id).single();
      const u = {
        id: data.user.id,
        name: profile?.name || email.split("@")[0],
        email: data.user.email,
        role: (()=>{ const r=(profile?.role||"explorer").toLowerCase(); return r==="user"?"explorer":r; })(),
        city_id: profile?.city_id || null,
        badge: profile?.badge || null,
      };
      onLogin(u);
      // navigation handled by onLogin
    } catch(e) {
      setError(e.message || "Sign in failed. Check your email and password.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="screen" style={{padding:"80px 28px 32px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>

        {error&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#c00",fontWeight:400,background:"rgba(255,0,0,.08)",padding:"10px 14px",borderRadius:10}}>{error}</div>}

function OnboardingScreen({navigate, user, setUser}) {
  const isScout = user?.role==="scout"||user?.role==="city_lead";
  const [step, setStep] = useState(1); // 1 = city, 2 = badge (scouts only)
  const [city, setCity] = useState(null);
  const [badge, setBadge] = useState(null);
  const [saving, setSaving] = useState(false);
  const [citiesList, setCitiesList] = useState([]);

  useEffect(()=>{
    supabase.from("cities").select("id,name").order("name").then(({data})=>{
      if(data) setCitiesList(data);
    });
  },[]);

  async function goNext(){
    if(step===1){
      if(!city) return;
      if(isScout){ setStep(2); return; }
      // non-scout: save city and go home
      await saveAndNavigate(city, null);
      return;
    }
    // step 2: badge
    await saveAndNavigate(city, badge);
  }

  async function saveAndNavigate(selectedCity, selectedBadge){
    setSaving(true);
    const found = citiesList.find(c=>c.name===selectedCity);
    const updates = { city_id: found?.id||null };
    if(selectedBadge) updates.badge = selectedBadge;
    if(found && user?.id){
      await supabase.from("users").update(updates).eq("id", user.id);
      setUser(u=>({...u, city_id: found.id, city: selectedCity, badge: selectedBadge}));
    }
    setSaving(false);
    navigate("home");
  }

  const displayCities = citiesList.length>0 ? citiesList.map(c=>c.name) : CITIES;

  // Step 1: City pick
  if(step===1) return (
    <div className="screen" style={{padding:"48px 28px 48px",justifyContent:"space-between"}}>
      <div>
        <div className="logo">Lokal&#39;z</div>
        <div style={{marginTop:32}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)",marginBottom:4}}>Welcome!</div>
          <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:600,color:"#555",lineHeight:1.5}}>
            Pick your city to get started.
          </div>
        </div>
        {isScout&&(
          <div style={{display:"flex",gap:6,marginTop:16}}>
            {[1,2].map(s=>(
              <div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?"var(--red)":"rgba(0,0,0,.15)"}}/>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {displayCities.map(c=>(
          <button key={c} className={`opt-btn${city===c?" sel":""}`} onClick={()=>setCity(c)}>
            {c}
            <div className={`opt-check${city===c?" on":""}`}/>
          </button>
        ))}
      </div>
      <button className="btn-black" onClick={goNext} style={{opacity:city?1:.4}}>
        {isScout ? "next →" : (saving?"saving...":"let's go →")}
      </button>
    </div>
  );

  // Step 2: Badge pick (scouts only)
  return (
    <div className="screen" style={{padding:"48px 28px 48px",justifyContent:"space-between"}}>
      <div>
        <div className="logo">Lokal&#39;z</div>
        <div style={{marginTop:32}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)",marginBottom:4}}>Your scout badge</div>
          <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:600,color:"#555",lineHeight:1.5}}>
            Pick the one that fits you best. This shows on every place you add.
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:16}}>
          {[1,2].map(s=>(
            <div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?"var(--red)":"rgba(0,0,0,.15)"}}/>
          ))}
        </div>
      </div>
      <div className="scroll" style={{flex:1,padding:"16px 0",display:"flex",flexDirection:"column",gap:10}}>
        {SCOUT_BADGES.filter(b=>b.id!=="The Founder"||["78be06ee-5e05-402a-b74e-b9e4e60ee1f0","b20cd939-2165-42be-b69b-d15faa5ed8e3"].includes(user?.id)).map(b=>(
          <button key={b.id} className={`opt-btn${badge===b.id?" sel":""}`} onClick={()=>setBadge(b.id)}
            style={{padding:"16px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:24}}>{b.emoji}</span>
              <div>
                <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16,letterSpacing:".02em"}}>{b.id}</div>
                <div style={{fontFamily:"var(--body)",fontWeight:600,fontSize:12,opacity:.65,marginTop:1}}>{b.desc}</div>
              </div>
            </div>
            <div className={`opt-check${badge===b.id?" on":""}`}/>
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:10,flexShrink:0,paddingTop:8}}>
        <button onClick={()=>setStep(1)} style={{background:"none",border:"2px solid rgba(0,0,0,.2)",borderRadius:50,padding:"18px 22px",fontFamily:"var(--display)",fontWeight:800,fontSize:15,cursor:"pointer",color:"var(--black)"}}>←</button>
        <button className="btn-black" onClick={goNext} style={{flex:1,opacity:badge?1:.4}}>
          {saving?"saving...":"let's go →"}
        </button>
      </div>
    </div>
  );
}

function HomeScreen({navigate, onMenu, setAnswers, user, partner, venuesLoading}) {
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const PARTNER_SHORTCUTS = [
    {label:"Dinner near the hotel", icon:"🍽", occasions:["Dinner with friends","Date night"]},
    {label:"Wine bars nearby", icon:"🍷", occasions:["Drinks"]},
    {label:"Coffee within 5 min", icon:"☕", occasions:["Coffee & Bakery"]},
    {label:"Brunch spots", icon:"🥞", occasions:["Brunch"]},
    {label:"Birthday dinner", icon:"🎂", occasions:["Birthday"]},
  ];

  async function savePartnerSearch(data){
    if(!partner?.id) return;
    await supabase.from("partner_searches").insert({
      partner_id: partner.id,
      user_id: user?.id||null,
      query: data.query||null,
      occasions: data.occasions||null,
      cuisines: data.cuisines||null,
      budget: data.budget||null,
      group_size: data.group||null,
    });
  }

  async function handleAISearch() {
    if(!query.trim()) return;
    setLoading(true);
    setError(null);
    try {
      const result = await supabase.functions.invoke("ai-search", {
        body: { query }
      });
      if(result.error) throw result.error;
      const parsed = result.data||{};
      const VALID_OCC = ["Casual dining","Fine dining","Dinner with friends","Date night","Lunch","Breakfast and brunch","Quick bite","Coffee","Quiet work spot","Pre-drinks / drinks","Late night","Celebration","Family outing"];
      const VALID_CUI = ["Japanese","Chinese","Korean","Thai","Vietnamese","Indian","Italian","French","Spanish","Greek","Mexican","American","Hungarian","Middle Eastern","Mediterranean"];
      const VALID_DIS = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","Anywhere in Budapest"];
      const VALID_DIE = ["Gluten-free","Vegan","Vegetarian","Halal","Kosher","Dairy-free","Nut-free","Pescatarian"];
      const VALID_BUD = ["$","$$","$$$","$$$$"];
      const VALID_GRP = ["Just me","2 people","3\u20134 people","5+ people"];
      const aiData = {
        occasions: Array.isArray(parsed.occasions)?parsed.occasions.filter(o=>VALID_OCC.includes(o)):[],
        cuisines:  Array.isArray(parsed.cuisines) ?parsed.cuisines.filter(c=>VALID_CUI.includes(c)) :[],
        budget:    VALID_BUD.includes(parsed.budget)?parsed.budget:null,
        group:     VALID_GRP.includes(parsed.group)?parsed.group:null,
        terrace:   parsed.terrace===true?true:parsed.terrace===false?false:null,
        locations: Array.isArray(parsed.locations)?parsed.locations.filter(l=>VALID_DIS.includes(l)):[],
        dietary:   Array.isArray(parsed.dietary)  ?parsed.dietary.filter(d=>VALID_DIE.includes(d))  :[],
        whySearch: typeof parsed.whySearch==="string"&&parsed.whySearch.trim()?parsed.whySearch.trim():null,
      };
      setAnswers(a=>({...a, ...aiData, aiQuery:query}));
      savePartnerSearch({query, ...aiData});
      navigate("results");
    } catch(e) {
      setError("Couldn't understand that. Try again or use Discover.");
    } finally {
      setLoading(false);
    }
  }
  function handleShortcut(shortcut){

    navigate("results");

    if(id==="Not sure yet"){
      setSelOcc(prev=>prev.includes(id)?[]:["Not sure yet"]);
      return;

    setSelOcc(prev=>{
      const without=prev.filter(x=>x!=="Not sure yet");
      return without.includes(id)?without.filter(x=>x!==id):[...without,id];

  const [sel, setSel] = useState(answers.locations||(partnerDistrict?[partnerDistrict]:[]));
  const [showMore, setShowMore] = useState(false);

        ()=>{ setSel(prev=>[...prev.filter(x=>x!=="near me"),"near me"]); setLocLoading(false); },
        ()=>{ setSel(prev=>[...prev.filter(x=>x!=="near me"),"near me"]); setLocLoading(false); }
      );
      return;
    }
    setSel(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d]);
  }
  function next(){setAnswers(a=>({...a,locations:sel}));navigate("q4");}

function getOccasionsForCategory(category) {
  if(!category) return OCCASIONS.map(o=>o.id);
  const list = CATEGORY_OCCASIONS[category];
  return list || OCCASIONS.map(o=>o.id);
}

function getTagsForCategory(category, extraTags=[]) {
  const base = (!category || !CATEGORY_TAGS[category]) ? TAGS : CATEGORY_TAGS[category];
  // Merge in any custom tags learned for this category
  const merged = [...base];
  extraTags.forEach(t=>{ if(!merged.includes(t)) merged.push(t); });
  return merged;
}

// Capacity matching — "2 főre keresek" → Up to 6, Up to 8, 8+ is megfelelő
function capacityMatches(venueCapacity, searchGroup) {
  if(!venueCapacity || !searchGroup) return true;
  if(searchGroup === "solo") return true; // 1 person fits anywhere
  const order = ["2", "3-6", "6-8", "9+"];
  const vIdx = order.indexOf(venueCapacity);
  const sIdx = order.indexOf(searchGroup);
  if(vIdx === -1 || sIdx === -1) return true;
  return vIdx >= sIdx;
}

function ResultsScreen({navigate, onMenu, answers, allVenues, partner, user}) {
  const BATCH=5;
  const active = allVenues.filter(v=>v.status==="active").sort((a,b)=>a.name.localeCompare(b.name));
  const filtered = active.filter(v=>{
    // 0. Category — strict match
    if(answers.category && v.category!==answers.category) return false;
    // 1. Occasions — legalább egy egyezzen
    if(answers.occasions?.length>0 && !answers.occasions.some(o=>(v.occasions||[]).includes(o))) return false;
    // 1b. Tags — at least one must match
    if(answers.tags?.length>0 && !answers.tags.some(t=>(v.tags||[]).includes(t))) return false;
    // 2. Budget — singular (AI) vagy plural (discover flow) egyaránt
    const vPrice = (v.price_level||v.price||"").trim();
    if(answers.budget && vPrice !== answers.budget.trim()) return false;
    if(answers.budgets?.length>0 && !answers.budgets.includes(vPrice)) return false;
    // 3. Cuisines — legalább egy egyezzen
    if(answers.cuisines?.length>0 && v.cuisine && !answers.cuisines.some(c=>v.cuisine.toLowerCase().includes(c.toLowerCase()))) return false;
    // 4. Group / capacity
    if(answers.group && !capacityMatches(v.capacity, answers.group)) return false;

    // 6. District/location — normalizált összehasonlítás (pl. "District V." == district "V")
    if(answers.locations?.length>0 && !answers.locations.includes("Anywhere in Budapest") && !answers.locations.includes("near me")) {
      if(!answers.locations.some(l=>String(l).trim()===String(v.district).trim())) return false;
    }
    // 7. Dietary
    if(answers.dietary?.length>0) {
      if(!answers.dietary.some(d=>(v.dietary||[]).includes(d))) return false;
    }
    // Tags filter
    if(answers.tags?.length>0){
      const vTags = v.tags||[];
      if(!answers.tags.some(t=>vTags.includes(t))) return false;
    }
    // whySearch: kizáró szűrő — csak ha az AI kinyerte (vibe/mood ami más szűrőbe nem fért)
    if(answers.whySearch&&answers.whySearch.trim()) {
      const wq=answers.whySearch.toLowerCase();
      if(!(v.why||"").toLowerCase().includes(wq)&&!(v.name||"").toLowerCase().includes(wq)) return false;
    }
    // Partner district bias — partner's district gets priority but is not exclusive
    return true;
  });
  // Partner district: venues from partner's district appear first
  const partnerDistrict = answers.partnerDistrict || partner?.district;
  const whyQ = answers.whySearch?.toLowerCase();
  const sorted = [...filtered].sort((a,b)=>{
    // whySearch egyezés előre kerül
    if(whyQ) {
      const aWhy = (a.why||"").toLowerCase().includes(whyQ)||(a.name||"").toLowerCase().includes(whyQ);
      const bWhy = (b.why||"").toLowerCase().includes(whyQ)||(b.name||"").toLowerCase().includes(whyQ);
      if(aWhy && !bWhy) return -1;
      if(!aWhy && bWhy) return 1;
    }
    // Partner district előre kerül
    if(partnerDistrict) {
      const aMatch = a.district===partnerDistrict ? -1 : 1;
      const bMatch = b.district===partnerDistrict ? -1 : 1;
      return aMatch - bMatch;
    }
    return 0;
  });
  const pool = shuffle(sorted);
  const [shown,setShown]=useState(pool.slice(0,BATCH));
  const [page,setPage]=useState(1);
  const noMore=page*BATCH>=pool.length;

  // Reset pagination when answers/pool changes
  React.useEffect(()=>{
    setShown(pool.slice(0,BATCH));
    setPage(1);
  },[answers]);

  // Save partner analytics on first render
  useEffect(()=>{
    if(!partner?.id) return;
    supabase.from("partner_searches").insert({
      partner_id: partner.id,
      user_id: user?.id||null,
      query: answers.aiQuery||null,
      occasions: answers.occasions||null,
      cuisines: answers.cuisines||null,
      budget: answers.budget||null,
      group_size: answers.group||null,
      results_count: pool.length,
    });
  },[]);

  function showMore(){
    const next=pool.slice(page*BATCH,(page+1)*BATCH);
    setShown(p=>[...p,...next]);
    setPage(p=>p+1);
  }

  return (
    <div className="screen" style={{background:"var(--bg)"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <Hamburger onClick={onMenu}/>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:4}}>Beyond the obvious.</div>
          </div>
        </div>
      </div>
      <div style={{padding:"8px 20px 12px",flexShrink:0}}>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)"}}>our picks for you</div>
      </div>
      <div className="scroll" style={{padding:"0 20px"}}>
        {shown.length===0&&(
          <div className="empty">
            <div className="empty-icon">😕</div>
            <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:600,color:"#777",lineHeight:1.6}}>
              No venues matched your filters.<br/>Try different options!
            </div>
            <button className="btn-blue" style={{marginTop:20,width:"auto",padding:"14px 28px"}} onClick={()=>navigate("q1")}>
              START OVER

        {shown.map((v,i)=>(

            <VenueCard venue={v} onClick={()=>navigate("venue",v)}/>

        {shown.length>0&&!noMore&&(

            That's all! <span className="text-link text-link-blue" onClick={()=>navigate("q1")}>Start over</span>

function ScoutFeedbackSection({venue, user, showToast}) {
  const [existing, setExisting] = useState(null);
  const [counts, setCounts] = useState({still_recommended:0, needs_review:0, report_closed:0});
  const [submitting, setSubmitting] = useState(false);

  useEffect(()=>{
    // Load own feedback
    if(user?.id){
      supabase.from("venue_feedback")
        .select("*")
        .eq("venue_id", venue.id)
        .eq("scout_id", user.id)
        .single()
        .then(({data})=>{ if(data) setExisting(data); });
    }
    // Load counts
    supabase.from("venue_feedback")
      .select("feedback_type")
      .eq("venue_id", venue.id)
      .then(({data})=>{
        if(data){
          const c={still_recommended:0,needs_review:0,report_closed:0};
          data.forEach(r=>{ if(c[r.feedback_type]!==undefined) c[r.feedback_type]++; });
          setCounts(c);
        }
      });
  },[venue.id, user?.id]);

  async function submitFeedback(type){
    if(!user?.id) return;
    if(existing?.feedback_type === type) return; // már ki van választva
    setSubmitting(true);
    const prevType = existing?.feedback_type;
    if(existing){
      const {error} = await supabase.from("venue_feedback").update({feedback_type:type}).eq("id",existing.id);
      if(!error){
        setExisting(e=>({...e,feedback_type:type}));
        setCounts(c=>({...c,[prevType]:c[prevType]-1,[type]:c[type]+1}));
      }
    } else {
      const {data,error} = await supabase.from("venue_feedback").insert({
        venue_id: venue.id,
        scout_id: user.id,
        feedback_type: type
      }).select().single();
      if(!error){
        setExisting(data);
        setCounts(c=>({...c,[type]:c[type]+1}));
      }
    }
    setSubmitting(false);
    showToast("Feedback submitted ✓");
  }

  const options = [
    {type:"still_recommended", label:"Still recommended", icon:"✅"},
    {type:"needs_review", label:"Needs review", icon:"⚠️"},
    {type:"report_closed", label:"Report closed", icon:"🚫"},
  ];

  return (
    <div style={{background:"#F5F5F5",borderRadius:16,padding:16,marginTop:4}}>
      <div style={{fontFamily:"var(--display)",fontSize:13,fontWeight:800,color:"var(--red)",letterSpacing:".06em",marginBottom:10}}>SCOUT FEEDBACK</div>
      {options.map(o=>(
        <button key={o.type} onClick={()=>!submitting&&submitFeedback(o.type)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"space-between",
            background:existing?.feedback_type===o.type?"var(--red)":"none",
            color:existing?.feedback_type===o.type?"white":"var(--black)",
            border:"1.5px solid",
            borderColor:existing?.feedback_type===o.type?"var(--red)":"#ddd",
            borderRadius:10,padding:"10px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8,transition:"all .15s"}}>
          <span>{o.icon} {o.label}</span>
          <span style={{background:existing?.feedback_type===o.type?"rgba(255,255,255,.25)":"#e0e0e0",borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:800,color:existing?.feedback_type===o.type?"white":"#555"}}>
            {counts[o.type]}
          </span>
        </button>
      ))}
      {existing&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:4}}>Last updated: {new Date(existing.created_at).toLocaleDateString()}</div>}
    </div>
  );
}

          else if(r.feedback_type==="neutral") v.neutral++;
          else if(r.feedback_type==="dislike") v.dislike++;
          if(user?.id&&r.scout_id===user.id) setMyVote(r.feedback_type);
        });
        setVotes(v);
      });
  },[venue.id,user?.id]);

  async function submitVote(type){
    if(!user?.id||votingLoading) return;
    setVotingLoading(true);
    if(myVote===type){
      // Remove vote
      await supabase.from("venue_feedback").delete().eq("venue_id",venue.id).eq("scout_id",user.id);
      setVotes(v=>({...v,[type]:Math.max(0,v[type]-1)}));
      setMyVote(null);
    } else {
      if(myVote){
        // Change vote
        await supabase.from("venue_feedback").update({feedback_type:type}).eq("venue_id",venue.id).eq("scout_id",user.id);
        setVotes(v=>({...v,[myVote]:Math.max(0,v[myVote]-1),[type]:v[type]+1}));
      } else {
        await supabase.from("venue_feedback").insert({venue_id:venue.id,scout_id:user.id,feedback_type:type});
        setVotes(v=>({...v,[type]:v[type]+1}));
      }
      setMyVote(type);
    }
    setVotingLoading(false);
  }

  async function submitReport(){
    if(!reportType) return;
    setReportSubmitting(true);
    const {error} = await supabase.from("venue_reports").insert({
      venue_id: venue.id,
      user_id: user?.id||null,
      report_type: reportType
    });
    setReportSubmitting(false);
    if(error){
      showToast("Error: " + error.message);
      return;
    }
    setShowReport(false);
    setReportType("");
    showToast("Report sent ✓ Thank you!");
  }

  useEffect(()=>{
    supabase.from("venue_images").select("url").eq("venue_id",venue.id).order("sort_order").then(({data})=>{
      if(data&&data.length>0) setImages(data.map(d=>d.url));
    });
  },[venue.id]);

  function swipeTo(dir){
    if(images.length<=1) return;
    setSwingDir(dir);
    setTimeout(()=>{
      setImgIdx(i=> dir==="left" ? (i+1)%images.length : (i-1+images.length)%images.length);
      setSwingDir(null);
    },200);
  }

  const grads={
    "Wine bar":"linear-gradient(160deg,#1a0a2e,#000000)",
    "Hungarian":"linear-gradient(160deg,#8B0000,#222)",
    "Bar":"linear-gradient(160deg,#111,#000)",
    "Coffee & Bakery":"linear-gradient(160deg,#3B2010,#111)",
    "Fine dining":"linear-gradient(160deg,#111,#000)",
    default:"linear-gradient(160deg,#111,#000)",
  };

  const touchStartX = React.useRef(null);

  const swingStyle = swingDir==="left"
    ? {transform:"translateX(-60px) rotate(-8deg)",opacity:0,transition:"all .2s ease"}
    : swingDir==="right"
    ? {transform:"translateX(60px) rotate(8deg)",opacity:0,transition:"all .2s ease"}
    : {transform:"translateX(0) rotate(0deg)",opacity:1,transition:"all .15s ease"};

  return (
    <div className="screen">
      <div style={{width:"100%",aspectRatio:"1/1",background:images.length>0?"#111":grads[venue.cuisine]||grads.default,flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",fontSize:72,overflow:"hidden"}}
        onTouchStart={e=>{ touchStartX.current = e.touches[0].clientX; }}
        onTouchEnd={e=>{
          if(touchStartX.current===null||images.length<=1) return;
          const diff = touchStartX.current - e.changedTouches[0].clientX;
          if(Math.abs(diff)>40) swipeTo(diff>0?"left":"right");
          touchStartX.current = null;
        }}>
        {images.length>0
          ?<img src={images[imgIdx]} style={{width:"100%",height:"100%",objectFit:"cover",...swingStyle}}/>
          :<span>🍽</span>
        }
        {images.length>1&&(
          <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
            {images.map((_,i)=>(
              <div key={i} onClick={()=>setImgIdx(i)} style={{width:6,height:6,borderRadius:"50%",background:i===imgIdx?"white":"rgba(255,255,255,.5)",cursor:"pointer"}}/>
            ))}
          </div>
        )}
        <button className="back-btn" style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.4)",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:22}} onClick={()=>navigate(-1)}>‹</button>
        <button onClick={()=>{toggleSave(venue.id);showToast(saved?"removed":"saved ♥");}}
          style={{position:"absolute",top:16,right:16,background:"rgba(0,0,0,.4)",border:"none",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,color:saved?"#F97B30":"white"}}>
          {saved?"♥":"♡"}
        </button>
      </div>
      <div className="scroll" style={{padding:"20px 24px"}}>
        <div style={{fontFamily:"var(--display)",fontSize:"36px",color:"var(--red)",lineHeight:1,letterSpacing:0,marginBottom:6}}>{venue.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          <span className="venue-tag">{venue.subcategory||venue.category||venue.cuisine}</span>
          <span className="venue-tag">Dist. {venue.district}</span>
          <span className="venue-tag">{venue.price_level||venue.price}</span>

          {venue.is_city_pick&&(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")&&<span className="venue-tag" style={{background:"#FFF3CD",color:"#856404"}}>⭐ City pick</span>}
        </div>
        {venue.tags&&venue.tags.length>0&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {venue.tags.map(t=><span key={t} style={{fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:"#555",background:"#f0f0f0",borderRadius:20,padding:"4px 10px"}}>{t}</span>)}
          </div>
        )}

        {/* Address - clickable Google Maps link */}
        <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:700,color:"#888",marginBottom:2}}>address</div>
        <a href={venue.google_maps_url||`https://maps.google.com/?q=${encodeURIComponent(venue.address||venue.name)}`} target="_blank" rel="noreferrer"
          style={{fontFamily:"var(--body)",fontSize:14,fontWeight:400,color:"var(--red)",marginBottom:16,display:"block",textDecoration:"none"}}>
          📍 {venue.address}
        </a>

        {/* Why locals */}
        <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:700,color:"var(--black)",marginBottom:6}}>why locals go here</div>
        <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:400,color:"#444",lineHeight:1.7,marginBottom:4}}>{venue.why}</div>

        <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:400,marginBottom:20}}>
          — <span
            style={{color:(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")?"var(--red)":"#aaa",
              cursor:(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")?"pointer":"default",
              fontWeight:700}}
            onClick={()=>{
              if((user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")&&venue.submitted_by)
                navigate("scout_profile", venue.submitted_by);
            }}>
            {venue.scout_alias}
          </span>
          {(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")&&venue.submitted_by&&
            <span style={{fontSize:11,color:"#bbb",marginLeft:6}}>· view picks ›</span>}
        </div>

        {/* Action buttons - only Instagram and Reservation */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
          {[
            ["📸","Instagram", venue.instagram_url],
            ["🍽","Reservation", venue.reservation_url]
          ].filter(([,,url])=>url).map(([ico,label,url])=>(
            <button key={label}
              onClick={()=>window.open(url,"_blank")}
              style={{background:"white",border:"1.5px solid #ddd",borderRadius:12,padding:"12px 8px",fontFamily:"var(--body)",fontWeight:400,fontSize:13,color:"var(--black)",cursor:"pointer",transition:"all .15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--red)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#ddd"}>
              {ico} {label}
            </button>
          ))}
        </div>

        <button style={{background:"var(--red)",color:"white",border:"none",borderRadius:12,padding:"13px",width:"100%",fontFamily:"var(--body)",fontWeight:400,fontSize:14,cursor:"pointer",marginBottom:10}}
          onClick={()=>{navigator.clipboard?.writeText(`https://lokalz.app/venue/${venue.id}`);showToast("link copied!");}}>
          🔗 share this place
        </button>

        {/* Like / Neutral / Dislike */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[["like","👍"],["neutral","😐"],["dislike","👎"]].map(([type,icon])=>(
            <button key={type} onClick={()=>submitVote(type)} disabled={!user?.id||votingLoading}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 6px",borderRadius:12,border:"1.5px solid",borderColor:myVote===type?"var(--black)":"#ddd",background:myVote===type?"var(--black)":"white",cursor:user?.id?"pointer":"default",transition:"all .15s"}}>
              <span style={{fontSize:18}}>{icon}</span>
              <span style={{fontFamily:"var(--body)",fontWeight:700,fontSize:12,color:myVote===type?"white":"var(--black)"}}>{votes[type]}</span>
            </button>
          ))}
        </div>

        <button style={{background:"transparent",color:"#888",border:"1.5px solid #ddd",borderRadius:12,padding:"11px",width:"100%",fontFamily:"var(--body)",fontWeight:400,fontSize:13,cursor:"pointer",marginBottom:8}}
          onClick={()=>setShowReport(true)}>
          ⚑ report venue
        </button>
        {showReport&&(
          <div style={{background:"#FFF8F8",border:"1.5px solid #F8D7DA",borderRadius:16,padding:16,marginBottom:12,animation:"fadeUp .2s ease both"}}>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"#58151C",marginBottom:10}}>report this venue</div>
            {[["closed","This place is closed"],["wrong_address","Wrong address"],["photos_outdated","Photos are outdated"],["other","Other issue"]].map(([val,label])=>(
              <button key={val} onClick={()=>setReportType(val)}
                style={{display:"block",width:"100%",textAlign:"left",background:reportType===val?"#F8D7DA":"none",border:"1.5px solid",borderColor:reportType===val?"#dc3545":"#ddd",borderRadius:10,padding:"10px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--black)",cursor:"pointer",marginBottom:8}}>
                {label}
              </button>
            ))}
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={submitReport} disabled={!reportType||reportSubmitting}
                style={{flex:1,background:"#58151C",color:"white",border:"none",borderRadius:10,padding:"11px",fontFamily:"var(--body)",fontWeight:400,fontSize:13,cursor:reportType?"pointer":"default",opacity:reportType?1:.5}}>
                {reportSubmitting?"sending...":"send report"}
              </button>
              <button onClick={()=>{setShowReport(false);setReportType("");}}
                style={{background:"#eee",border:"none",borderRadius:10,padding:"11px 16px",fontFamily:"var(--body)",fontWeight:400,fontSize:13,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          </div>
        )}
        {isScout&&(
          <ScoutFeedbackSection venue={venue} user={user} showToast={showToast}/>
        )}
      </div>
    </div>
  );
}

  const [scoutsLoading, setScoutsLoading] = useState(true);

    if(!user?.id||!isPremium) { setScoutsLoading(false); return; }
    supabase.from("scout_follows")
      .select("scout_id, users!scout_id(id,name,badge,role,profile_image)")
      .eq("user_id", user.id)
      .then(({data})=>{
        setScouts((data||[]).map(r=>r.users).filter(Boolean));
        setScoutsLoading(false);
      });

  return (
    <div className="screen" style={{background:"white"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>

          <div style={{textAlign:"right"}}>

          </div>
        </div>
      </div>

      <div className="tabs" style={{background:"var(--black)",borderBottom:"1px solid rgba(255,255,255,.15)",flexShrink:0}}>

          <button key={k} style={{flex:1,padding:"14px 6px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:tab===k?"white":"rgba(255,255,255,.4)",background:"none",border:"none",cursor:"pointer",borderBottom:tab===k?"2.5px solid white":"2.5px solid transparent",marginBottom:-1,transition:"all .15s"}} onClick={()=>setTab(k)}>{l}</button>

      {tab==="places"&&(
        <div className="scroll" style={{padding:"16px 20px"}}>
          {saved.length===0
            ?<div className="empty"><div className="empty-icon">🔖</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No saved places yet.<br/>Tap ♡ on any venue.</div></div>
            :saved.map(v=><VenueCard key={v.id} venue={v} onClick={()=>navigate("venue",v)}/>)

                <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:400,color:"#777",marginBottom:24,lineHeight:1.6}}>Follow scouts and see their picks with an Explorer Pro membership.</div>
                <button className="btn-black" onClick={()=>navigate("upgrade")}>upgrade to pro →</button>
              </div>

              ?<div style={{textAlign:"center",padding:32}}><div style={{width:28,height:28,border:"3px solid rgba(0,0,0,.15)",borderTop:"3px solid var(--red)",borderRadius:"50%",animation:"spin .8s linear infinite",display:"inline-block"}}/></div>
              :scouts.length===0
                ?<div className="empty"><div className="empty-icon">👤</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No followed scouts yet.<br/>Visit a scout&#39;s profile to follow them.</div></div>

function AllVenuesScreen({navigate, allVenues, onMenu}) {
  const [search,setSearch]=useState("");
  const [category,setCategory]=useState("");
  const [occasion,setOccasion]=useState("");
  const [cuisine,setCuisine]=useState("");
  const [budget,setBudget]=useState("");
  const [district,setDistrict]=useState("");
  const [subcategory,setSubcategory]=useState("");
  const [tag,setTag]=useState("");

  const CATEGORIES = ["Restaurant","Café","Bar","Bakery","Patisserie","Street food","Other"];
  const BAR_SUBCATEGORIES = ["Cocktail bar","Wine bar","Pub","Night club","Speakeasy"];
  const isFoodOccasion = FOOD_OCCASIONS.includes(occasion);
  const allOccasions = OCCASIONS.map(o=>o.id);

  const active=allVenues.filter(v=>v.status==="active");
  const filtered=active.filter(v=>{
    if(search){
      const q=search.toLowerCase();
      const inName=(v.name||"").toLowerCase().includes(q);
      const inWhy=(v.why||"").toLowerCase().includes(q);
      const inCuisine=(v.cuisine||"").toLowerCase().includes(q);
      if(!inName&&!inWhy&&!inCuisine) return false;
    }
    if(category&&v.category!==category&&v.subcategory!==category) return false;
    if(subcategory&&v.subcategory!==subcategory) return false;
    if(occasion&&!(v.occasions||[]).includes(occasion)) return false;
    if(cuisine&&v.cuisine!==cuisine) return false;
    if(budget&&(v.price_level||v.price||"").trim()!==budget.trim()) return false;
    if(district&&String(v.district).trim()!==String(district).trim()) return false;
    if(tag&&!(v.tags||[]).includes(tag)) return false;

    return true;
  });
  const sorted=[...filtered].sort((a,b)=>a.name.localeCompare(b.name));
  const selectStyle={background:"white",border:"1.5px solid black",borderRadius:50,padding:"10px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:14,cursor:"pointer",outline:"none",width:"100%",marginBottom:10};

  return (
    <div className="screen" style={{background:"white"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <Hamburger onClick={onMenu}/>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"var(--black)",marginTop:4}}>all venues</div>
          </div>
        </div>
      </div>
      <div style={{background:"var(--black)",padding:"12px 20px",flexShrink:0,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",borderRadius:50,padding:"8px 14px"}}>
          <span style={{color:"rgba(255,255,255,.5)",fontSize:13}}>🔍</span>
          <input placeholder="search..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:"none",border:"none",outline:"none",fontFamily:"var(--body)",fontSize:13,fontWeight:400,color:"white",flex:1}} />
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select value={category} onChange={e=>{setCategory(e.target.value);setCuisine("");setSubcategory("");}} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:category?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none"}}>
            <option value="">all categories</option>
            {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          {category==="Bar"&&(
            <select value={subcategory||""} onChange={e=>setSubcategory(e.target.value)} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:subcategory?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none"}}>
              <option value="">all bar types</option>
              {["Cocktail bar","Wine bar","Pub","Night club","Speakeasy"].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          )}
          <select value={occasion} onChange={e=>{setOccasion(e.target.value);setCuisine("");}} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:occasion?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none"}}>
            <option value="">all occasions</option>
            {allOccasions.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
          <select value={budget} onChange={e=>setBudget(e.target.value)} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:budget?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none"}}>
            <option value="">all prices</option>
            {BUDGETS.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
          <select value={district} onChange={e=>setDistrict(e.target.value)} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:district?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none"}}>
            <option value="">all districts</option>
            {ALL_DISTRICTS.map(d=><option key={d} value={d}>{districtLabel(d)}</option>)}
          </select>

          {category==="Restaurant"&&(
            <select value={cuisine} onChange={e=>setCuisine(e.target.value)} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:cuisine?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none",animation:"fadeUp .2s ease both"}}>
              <option value="">all cuisines</option>
              {CUISINES_FILTER.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          )}
          <select value={tag} onChange={e=>setTag(e.target.value)} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"6px 12px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:tag?"white":"rgba(255,255,255,.5)",cursor:"pointer",outline:"none"}}>
            <option value="">all tags</option>
            {TAGS.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
      </div>
      <div className="scroll" style={{padding:"12px 20px"}}>
        {sorted.length===0
          ?<div className="empty"><div className="empty-icon">🍽</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:400,color:"#777"}}>no venues found</div></div>
          :sorted.map(v=><VenueCard key={v.id} venue={v} onClick={()=>navigate("venue",v)}/>)
        }
      </div>
    </div>
  );
}

function ScoutEventsTab({user, allVenues, showToast}) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [form, setForm] = useState({title:"", description:"", event_date:"", event_time:"", venue_id:"", venue_name:""});
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [imgFile, setImgFile] = useState(null);
  const [saving, setSaving] = useState(false);
  const [deletingId, setDeletingId] = useState(null);

  useEffect(()=>{
    supabase.from("events").select("*, venues(name,district)")
      .eq("created_by", user.id).order("created_at",{ascending:false})
      .then(({data})=>{ setEvents(data||[]); setLoading(false); });
  },[]);

  // Venue autocomplete
  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      allVenues.filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||
        (v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch, allVenues]);

  function selectVenue(v){
    setForm(f=>({...f, venue_id:v.id, venue_name:v.name}));
    setVenueSearch(v.name+" · Dist. "+v.district);
    setVenueSuggestions([]);
  }

  async function submitEvent(){
    if(!form.title.trim()) return;
    if(!form.venue_id){ showToast("Please select a venue"); return; }
    if(!form.event_date||!form.event_time){ showToast("Please set a date and time"); return; }
    setSaving(true);
    const event_date = new Date(`${form.event_date}T${form.event_time}`).toISOString();
    const {data, error} = await supabase.from("events").insert({
      city_id: user.city_id,
      created_by: user.id,
      title: form.title.trim(),
      description: form.description.trim()||null,
      event_date,
      venue_id: form.venue_id||null,
      status: "pending",
    }).select("*, venues(name,district)").single();
    if(error){ showToast("Error: "+error.message); setSaving(false); return; }
    if(imgFile && data?.id){
      const ext = imgFile.name.split(".").pop();
      const path = `events/${data.id}/cover.${ext}`;
      const {data: up} = await supabase.storage.from("venue-images").upload(path, imgFile, {upsert:true});
      if(up){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("events").update({cover_image: urlData.publicUrl}).eq("id", data.id);
        data.cover_image = urlData.publicUrl;
      }
    }
    setEvents(e=>[{...data}, ...e]);
    setForm({title:"",description:"",event_date:"",event_time:"",venue_id:"",venue_name:""});
    setVenueSearch("");
    setImgFile(null);
    setShowCreate(false);
    showToast("Event submitted for approval ✓");
    setSaving(false);
  }

  async function deleteEvent(id){
    setDeletingId(id);
    await supabase.from("events").delete().eq("id",id);
    setEvents(e=>e.filter(ev=>ev.id!==id));
    setDeletingId(null);
    showToast("Event deleted");
  }

  const inputStyle = {width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,outline:"none",background:"white",marginBottom:10};

  return (
    <div className="scroll" style={{padding:"14px 20px"}}>
      <button className="btn-black" style={{marginBottom:16}} onClick={()=>setShowCreate(v=>!v)}>
        {showCreate?"cancel":"+ add event"}
      </button>

      {showCreate&&(
        <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"#888",letterSpacing:".06em",marginBottom:12}}>NEW EVENT</div>
          <input placeholder="Event title *" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={inputStyle}/>
          <textarea placeholder="Description" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={2} style={{...inputStyle,resize:"none"}}/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input type="date" value={form.event_date} onChange={e=>setForm(f=>({...f,event_date:e.target.value}))} style={{...inputStyle,flex:1,marginBottom:0}}/>
            <input type="time" value={form.event_time} onChange={e=>setForm(f=>({...f,event_time:e.target.value}))} style={{...inputStyle,flex:1,marginBottom:0}}/>
          </div>
          {/* Venue autocomplete */}
          <div style={{position:"relative",marginBottom:10}}>
            <input
              placeholder="🔍 Search venue..."
              value={venueSearch}
              onChange={e=>{ setVenueSearch(e.target.value); setForm(f=>({...f,venue_id:"",venue_name:""})); }}
              style={{...inputStyle,marginBottom:0}}
            />
            {venueSuggestions.length>0&&(
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #ddd",borderRadius:10,zIndex:50,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden"}}>
                {venueSuggestions.map(v=>(
                  <div key={v.id} onClick={()=>selectVenue(v)}
                    style={{padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",cursor:"pointer",borderBottom:"1px solid #f5f5f5"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f9f6f0"}
                    onMouseLeave={e=>e.currentTarget.style.background="white"}>
                    {v.name} <span style={{color:"#888",fontSize:12}}>· Dist. {v.district}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",border:"1.5px dashed #ddd",borderRadius:10,cursor:"pointer",marginBottom:10}}>
            <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>setImgFile(e.target.files[0]||null)}/>
            <span style={{fontSize:20}}>📷</span>
            <span style={{fontFamily:"var(--body)",fontSize:13,fontWeight:600,color:"#888"}}>{imgFile?imgFile.name:"Add cover photo"}</span>
          </label>
          <button className="btn-black" onClick={submitEvent} style={{opacity:saving||!form.title.trim()||!form.venue_id||!form.event_date||!form.event_time?0.5:1}}>
            {saving?"submitting...":"submit for approval →"}
          </button>
        </div>
      )}

      {loading
        ?<div style={{textAlign:"center",padding:32}}><div style={{width:28,height:28,border:"3px solid rgba(0,0,0,.15)",borderTop:"3px solid var(--red)",borderRadius:"50%",animation:"spin .8s linear infinite",display:"inline-block"}}/></div>
        :events.length===0
          ?<div className="empty"><div className="empty-icon">🗓</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No events yet</div></div>
          :events.map(ev=>(
            <div key={ev.id} className="admin-card" style={{marginBottom:10}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
                <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15,flex:1}}>{ev.title}</div>
                <StatusPill status={ev.status}/>
              </div>
              {ev.venues&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600}}>📍 {ev.venues.name}</div>}
              {ev.event_date&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginBottom:8}}>📅 {new Date(ev.event_date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div>}
              <button onClick={()=>deleteEvent(ev.id)} disabled={deletingId===ev.id}
                style={{background:"transparent",border:"1.5px solid #F8D7DA",borderRadius:8,padding:"6px 12px",fontFamily:"var(--display)",fontWeight:700,fontSize:11,color:"#58151C",cursor:"pointer",letterSpacing:".04em",opacity:deletingId===ev.id?0.5:1}}>

    </div>
  );

// ── DRAGGABLE IMAGE GRID ─────────────────────
function DraggableImageGrid({previews, onMove, onRemove, onAdd, maxPhotos=5}) {
  const [selectedIdx, setSelectedIdx] = React.useState(null);

  function handleTap(i){
    if(selectedIdx===null){
      // First tap: select
      setSelectedIdx(i);
    } else if(selectedIdx===i){
      // Tap same: deselect
      setSelectedIdx(null);
    } else {
      // Tap different: move
      onMove(selectedIdx, i);
      setSelectedIdx(null);
    }
  }

  return (
    <div>
      {selectedIdx!==null&&(
        <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:600,color:"var(--red)",marginBottom:8,textAlign:"center"}}>
          tap another photo to swap positions
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {previews.map((src,i)=>(
          <div key={i}
            onClick={()=>handleTap(i)}
            style={{
              position:"relative",
              aspectRatio:"1",
              borderRadius:10,
              overflow:"hidden",
              cursor:"pointer",
              outline: selectedIdx===i?"3px solid var(--red)":"2px solid transparent",
              transform: selectedIdx===i?"scale(0.95)":"scale(1)",
              transition:"all .15s",
              boxSizing:"border-box"
            }}>
            <img src={src.url||src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <button
              onClick={e=>{e.stopPropagation();onRemove(i);}}
              style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:"50%",width:24,height:24,color:"white",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>
              ✕
            </button>
            {i===0&&<div style={{position:"absolute",bottom:4,left:4,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"2px 6px",fontFamily:"var(--display)",fontWeight:700,fontSize:10,color:"white"}}>MAIN</div>}
            {selectedIdx===null&&<div style={{position:"absolute",top:4,left:4,background:"rgba(0,0,0,.4)",borderRadius:6,padding:"3px 5px",fontSize:11,color:"rgba(255,255,255,.8)"}}>⠿</div>}
            {selectedIdx===i&&<div style={{position:"absolute",inset:0,background:"rgba(220,38,38,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"var(--red)",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:14}}>✓</div>
            </div>}
          </div>
        ))}
        {previews.length<maxPhotos&&(
          <label style={{aspectRatio:"1",borderRadius:10,border:"2px dashed #ddd",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:4}}>
            <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={onAdd}/>
            <span style={{fontSize:24}}>📷</span>
            <span style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#888"}}>Add</span>
          </label>
        )}
      </div>
    </div>
  );
}

function ScoutScreen({navigate, allVenues, onMenu, showToast, setAllVenues, user, cities}) {
  const [tab,setTab]=useState("add");
  const [editingVenue, setEditingVenue]=useState(null);
  const [editForm, setEditForm]=useState({});
  const [editSubmitting, setEditSubmitting]=useState(false);
  const [categoryCustomTags, setCategoryCustomTags] = useState({});

  async function loadCustomTagsForCategory(category){
    if(!category || categoryCustomTags[category]) return;
    const {data} = await supabase.from("category_tags").select("tag").eq("category",category).order("count",{ascending:false});
    if(data) setCategoryCustomTags(prev=>({...prev,[category]:data.map(r=>r.tag)}));
  }

  async function saveCustomTag(category, tag){
    if(!category||!tag) return;
    await supabase.from("category_tags").upsert({category,tag,count:1},{onConflict:"category,tag",ignoreDuplicates:false});
    // increment count
    await supabase.rpc("increment_tag_count",{p_category:category,p_tag:tag}).catch(()=>{});
    setCategoryCustomTags(prev=>({
      ...prev,
      [category]: prev[category] ? [...new Set([...prev[category],tag])] : [tag]
    }));
  }

  const [scoutEditImgFiles, setScoutEditImgFiles] = useState([]);
  const [scoutEditImgPreviews, setScoutEditImgPreviews] = useState([]);
  const [scoutExistingImages, setScoutExistingImages] = useState([]);

  async function loadScoutExistingImages(venueId){
    const {data} = await supabase.from("venue_images").select("id,url").eq("venue_id",venueId).order("sort_order");
    if(data) setScoutExistingImages(data);
  }
  function handleScoutEditImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - scoutExistingImages.length - scoutEditImgFiles.length;
    const newFiles = files.slice(0, remaining);
    setScoutEditImgFiles(prev=>[...prev,...newFiles]);
    setScoutEditImgPreviews(prev=>[...prev,...newFiles.map(f=>URL.createObjectURL(f))]);
  }
  function removeScoutExistingImg(img){
    supabase.from("venue_images").delete().eq("id",img.id);
    setScoutExistingImages(prev=>prev.filter(i=>i.id!==img.id));
  }
  function removeScoutEditImg(idx){
    setScoutEditImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setScoutEditImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }
  function moveScoutExistingImg(from,to){
    if(to<0||to>=scoutExistingImages.length) return;
    setScoutExistingImages(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }
  function moveScoutEditImg(from,to){
    if(to<0||to>=scoutEditImgPreviews.length) return;
    setScoutEditImgFiles(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
    setScoutEditImgPreviews(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }
  // Only submitted_by, fallback to scout_alias if submitted_by is null
  const myVenues=allVenues.filter(v=>
    v.submitted_by===user?.id ||
    (!v.submitted_by && v.scout_alias && user?.name && v.scout_alias.toLowerCase().startsWith(user.name.split(" ")[0].toLowerCase()))
  );

  function startScoutEdit(v){
    setScoutEditImgFiles([]);
    setScoutEditImgPreviews([]);
    setScoutExistingImages([]);
    loadScoutExistingImages(v.id);
    loadCustomTagsForCategory(v.category);
    setEditForm({
      name: v.name||"",
      address: v.address||"",
      district: v.district||"",
      category: v.category||"",
      cuisine: v.cuisine||"",
      price_level: v.price_level||v.price||"",
      capacity: v.capacity||"",
      google_maps_url: v.google_maps_url||"",
      instagram_url: v.instagram_url||"",
      reservation_url: v.reservation_url||"",
      why: v.why||"",
      occasions: v.occasions||[],
      is_city_pick: v.is_city_pick||false,
      subcategory: v.subcategory||"",
      tags: v.tags||[],
    });
    setEditingVenue(v);
  }

  async function submitScoutEdit(){
    setEditSubmitting(true);
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      subcategory: editForm.subcategory||null,
      cuisine: editForm.cuisine||null,
      price_level: editForm.price_level,

      instagram_url: editForm.instagram_url||null,
      reservation_url: editForm.reservation_url||null,

      occasions: editForm.occasions||[],
      tags: editForm.tags||[],
      status: "pending",
      edit_comment: null,
    }).eq("id", editingVenue.id);
    setEditSubmitting(false);
    if(error){showToast("Error: "+error.message);return;}
    // Save any custom tags
    const scoutCustomTags = (editForm.tags||[]).filter(t=>!TAGS.includes(t));
    for(const tag of scoutCustomTags) await saveCustomTag(editForm.category, tag);

    // Update existing image sort order
    for(let i=0;i<scoutExistingImages.length;i++){
      await supabase.from("venue_images").update({sort_order:i,is_primary:i===0}).eq("id",scoutExistingImages[i].id);
    }
    // Upload new images
    for(let i=0;i<scoutEditImgFiles.length;i++){
      const file = scoutEditImgFiles[i];
      const ext = file.name.split(".").pop();
      const path = `${editingVenue.id}/${Date.now()}_${i}.${ext}`;
      const {error: uploadErr} = await supabase.storage.from("venue-images").upload(path, file);
      if(!uploadErr){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("venue_images").insert({venue_id:editingVenue.id, url:urlData.publicUrl, is_primary:scoutExistingImages.length===0&&i===0, sort_order:scoutExistingImages.length+i});
      }
    }
    setAllVenues(p=>p.map(v=>v.id===editingVenue.id?{...v,...editForm,status:"pending",edit_comment:null,price:editForm.price_level}:v));
    showToast("Resubmitted for review ✓");
    setEditingVenue(null);
    setTab("activity");
  }

  // Add Venue form state
  const [form,setForm]=useState({name:"",address:"",district:"",category:"",subcategory:"",cuisine:"",price_level:"",capacity:"",terrace:"",instagram_url:"",reservation_url:"",google_maps_url:"",why:"",city_id:user?.city_id||"",google_place_id:"",latitude:null,longitude:null,dietary:[],tags:[]});
  const [duplicates, setDuplicates]=useState([]);
  const [checkingDupe, setCheckingDupe]=useState(false);
  const [selOccasions,setSelOccasions]=useState([]);
  const [customOccasion,setCustomOccasion]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [formError,setFormError]=useState(null);
  const [geocoding,setGeocoding]=useState(false);
  const [geocodeResult,setGeocodeResult]=useState(null); // {lat,lng,display_name}
  // Google Places Autocomplete
  const [placeSuggestions,setPlaceSuggestions]=useState([]);
  const [placeSearchVal,setPlaceSearchVal]=useState("");
  const [placeSelected,setPlaceSelected]=useState(false);
  const [loadingPlace,setLoadingPlace]=useState(false);
  const placeSessionToken=React.useRef(null);
  const placeSvc=React.useRef(null);
  const placeDetailSvc=React.useRef(null);

  // Helper: get autocomplete service (lazy init after google loads)
  function getPlaceSvc(){
    if(!window.google?.maps?.places) return null;
    if(!placeSvc.current) placeSvc.current=new window.google.maps.places.AutocompleteService();
    if(!placeDetailSvc.current){
      const mapDiv=document.createElement("div");
      placeDetailSvc.current=new window.google.maps.places.PlacesService(mapDiv);
    }
    if(!placeSessionToken.current) placeSessionToken.current=new window.google.maps.places.AutocompleteSessionToken();
    return placeSvc.current;
  }

  // Debounced place search
  function handlePlaceSearch(val){
    setPlaceSearchVal(val);
    setPlaceSelected(false);
    setF("name",val);
    if(val.trim().length<2){setPlaceSuggestions([]);return;}
    const svc=getPlaceSvc();
    if(!svc){
      // fallback: no google loaded yet, just use regular name field
      setPlaceSuggestions([]);
      return;
    }
    clearTimeout(window._placeTimeout);
    window._placeTimeout=setTimeout(()=>{
      setLoadingPlace(true);
      svc.getPlacePredictions({
        input:val,
        types:["establishment"],
        componentRestrictions:{country:"hu"},
        sessionToken:placeSessionToken.current
      },(preds,status)=>{
        setLoadingPlace(false);
        if(status===window.google.maps.places.PlacesServiceStatus.OK && preds){
          setPlaceSuggestions(preds.slice(0,5));
        } else {
          setPlaceSuggestions([]);
        }
      });
    },350);
  }

  // Budapest district mapping from postal code
  function districtFromPostal(postal){
    const code=parseInt(postal);
    if(!code) return "";
    const map={1011:"I",1012:"I",1013:"I",1014:"I",1015:"I",1016:"I",1021:"II",1022:"II",1023:"II",1024:"II",1025:"II",1026:"II",1027:"II",1028:"II",1029:"II",1031:"III",1032:"III",1033:"III",1034:"III",1035:"III",1036:"III",1037:"III",1038:"III",1039:"III",1041:"IV",1042:"IV",1043:"IV",1044:"IV",1045:"IV",1046:"IV",1047:"IV",1048:"IV",1051:"V",1052:"V",1053:"V",1054:"V",1055:"V",1056:"V",1061:"VI",1062:"VI",1063:"VI",1064:"VI",1065:"VI",1066:"VI",1067:"VI",1068:"VI",1071:"VII",1072:"VII",1073:"VII",1074:"VII",1075:"VII",1076:"VII",1077:"VII",1078:"VII",1081:"VIII",1082:"VIII",1083:"VIII",1084:"VIII",1085:"VIII",1086:"VIII",1087:"VIII",1088:"VIII",1089:"VIII",1091:"IX",1092:"IX",1093:"IX",1094:"IX",1095:"IX",1096:"IX",1097:"IX",1098:"IX",1101:"X",1102:"X",1103:"X",1104:"X",1105:"X",1106:"X",1107:"X",1108:"X",1111:"XI",1112:"XI",1113:"XI",1114:"XI",1115:"XI",1116:"XI",1117:"XI",1118:"XI",1119:"XI",1121:"XII",1122:"XII",1123:"XII",1124:"XII",1125:"XII",1126:"XII",1131:"XIII",1132:"XIII",1133:"XIII",1134:"XIII",1135:"XIII",1136:"XIII",1137:"XIII",1138:"XIII",1139:"XIII",1141:"XIV",1142:"XIV",1143:"XIV",1144:"XIV",1145:"XIV",1146:"XIV",1147:"XIV",1148:"XIV",1149:"XIV",1151:"XV",1152:"XV",1153:"XV",1154:"XV",1158:"XV",1161:"XVI",1162:"XVI",1163:"XVI",1164:"XVI",1165:"XVI",1172:"XVII",1173:"XVII",1174:"XVII",1175:"XVII",1181:"XVIII",1182:"XVIII",1183:"XVIII",1184:"XVIII",1185:"XVIII",1186:"XVIII",1188:"XVIII",1191:"XIX",1192:"XIX",1193:"XIX",1194:"XIX",1195:"XIX",1196:"XIX",1201:"XX",1202:"XX",1203:"XX",1204:"XX",1211:"XXI",1212:"XXI",1213:"XXI",1214:"XXI",1215:"XXI",1221:"XXII",1222:"XXII",1223:"XXII",1224:"XXII",1225:"XXII",1231:"XXIII",1237:"XXIII",1238:"XXIII",1239:"XXIII"};
    return map[code]||"";
  }

  // On place selection: fetch details and fill form
  function selectPlace(pred){
    if(!placeDetailSvc.current) return;
    setPlaceSuggestions([]);
    setLoadingPlace(true);
    const name=pred.structured_formatting?.main_text||pred.description;
    setPlaceSearchVal(name);
    setF("name",name);
    placeDetailSvc.current.getDetails({
      placeId:pred.place_id,
      fields:["name","formatted_address","address_components","url","place_id"],
      sessionToken:placeSessionToken.current
    },(place,status)=>{
      setLoadingPlace(false);
      placeSessionToken.current=null; // reset token after detail fetch
      if(status!==window.google.maps.places.PlacesServiceStatus.OK||!place) return;
      // Extract postal code for district
      const postalComp=place.address_components?.find(c=>c.types.includes("postal_code"));
      const postal=postalComp?.long_name||"";
      const district=districtFromPostal(postal);
      // Build clean address (street + number)
      const route=place.address_components?.find(c=>c.types.includes("route"))?.long_name||"";
      const num=place.address_components?.find(c=>c.types.includes("street_number"))?.long_name||"";
      const cleanAddr=route&&num?`${route} ${num}`:place.formatted_address||"";
      // Google Maps URL
      const mapsUrl=place.url||`https://maps.google.com/?cid=${place.place_id}`;
      setForm(f=>({...f,
        name:place.name||name,
        address:cleanAddr,
        district:district,
        google_maps_url:mapsUrl,
        google_place_id:place.place_id||""
      }));
      setPlaceSearchVal(place.name||name);
      setPlaceSelected(true);
      // Also trigger dupe check on the filled name
      if(place.name&&place.name.trim().length>=2){
        setCheckingDupe(true);
        supabase.from("venues").select("id,name,district,status").ilike("name",`%${place.name.trim()}%`).limit(3).then(({data})=>{
          setDuplicates(data||[]);
          setCheckingDupe(false);
        });
      }
    });
  }

  function setF(k,v){
    setForm(f=>({...f,[k]:v}));
    if(k==="name" && v.trim().length>=2){
      setCheckingDupe(true);
      clearTimeout(window._dupeTimeout);
      window._dupeTimeout = setTimeout(async()=>{
        const {data} = await supabase.from("venues")
          .select("id,name,district,status")
          .ilike("name", `%${v.trim()}%`)
          .limit(3);
        setDuplicates(data||[]);
        setCheckingDupe(false);
      }, 500);

    }

  function handleImgSelect(e){

    const newFiles = files.slice(0, remaining);

    setImgPreviews(prev=>[...prev, ...newFiles.map(f=>URL.createObjectURL(f))]);

  function removeImg(idx){
    setImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }

  function moveImg(from, to){
    if(to<0||to>=imgPreviews.length) return;
    setImgFiles(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });

  async function getCoordinates(){
    const query=[form.name,form.address,"Budapest"].filter(Boolean).join(", ");
    if(!form.address){setFormError("Please enter an address first.");return;}
    setGeocoding(true);setGeocodeResult(null);setFormError(null);
    try{
      const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=hu`;
      const res=await fetch(url,{headers:{"Accept-Language":"en","User-Agent":"Lokalz/1.0"}});
      const data=await res.json();
      if(!data||data.length===0){
        setGeocodeResult({error:true});
        setGeocoding(false);
        return;
      }
      const r=data[0];
      const lat=parseFloat(r.lat);
      const lng=parseFloat(r.lon);
      const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(form.name+", "+form.address+", Budapest")}`;
      setGeocodeResult({lat,lng,display_name:r.display_name});
      setF("google_maps_url",mapsUrl);
      setF("latitude",lat);
      setF("longitude",lng);
    }catch(e){
      setGeocodeResult({error:true});
    }
    setGeocoding(false);
  }

    setSubmitting(true);

    try {

      setGeocodeResult(null);
      setPlaceSearchVal("");
      setPlaceSelected(false);
      setPlaceSuggestions([]);
      setSelOccasions([]);
      setCustomOccasion("");
      setImgFiles([]);
      setImgPreviews([]);
      showToast("Submitted for review ✓");
      setTab("activity");
    } catch(e){
      setFormError(e.message||"Submit failed. Try again.");
