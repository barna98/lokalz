<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Bricolage Grotesque',sans-serif;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#root{width:100%;max-width:430px;height:100dvh;max-height:932px;position:relative;overflow:hidden;background:#F5B8EC;}
@media(max-width:430px){#root{max-height:100dvh;}}

/* TOKENS */
:root{
  --bg: #F5B8EC;
  --red: #FD0100;
  --red-dark: #CC0000;
  --blue: #FD0100;
  --blue-dark: #CC0000;
  --black: #000000;
  --white: #FFFFFF;
  --card-bg: #FFFFFF;
  --input-bg: #f5f5f5;
  --border: #eeeeee;
  --text-muted: rgba(0,0,0,.5);
  --display: 'Climate Crisis', sans-serif;
  --body: 'Bricolage Grotesque', sans-serif;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skeleton 1.5s infinite;}
@keyframes glow-pulse{
  0%,100%{box-shadow:0 0 16px 4px rgba(220,38,38,.3),0 0 40px 8px rgba(255,255,255,.2);}
  50%{box-shadow:0 0 28px 10px rgba(220,38,38,.5),0 0 60px 20px rgba(255,255,255,.3);}
}
@keyframes shimmer{
  0%{background-position:200% center;}
  100%{background-position:-200% center;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideInUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes staggerUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes imgFadeIn{from{opacity:0}to{opacity:1}}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);animation:fadeUp .2s cubic-bezier(.25,.46,.45,.94) both;}

/* Tap feedback */
.tap{transition:transform .12s ease,opacity .12s ease;}
.tap:active{transform:scale(.96);opacity:.85;}

/* Staggered cards */
.stagger-1{animation:staggerUp .3s .04s ease both;}
.stagger-2{animation:staggerUp .3s .08s ease both;}
.stagger-3{animation:staggerUp .3s .12s ease both;}
.stagger-4{animation:staggerUp .3s .16s ease both;}
.stagger-5{animation:staggerUp .3s .20s ease both;}

/* Smooth image load */
.img-fade{animation:imgFadeIn .4s ease both;}

/* Bottom nav tap */
.nav-btn{transition:transform .1s ease;}
.nav-btn:active{transform:scale(.88);}

/* LOGO — large on auth screens, medium on inner screens */
.logo{font-family:var(--display);font-size:52px;color:var(--red);line-height:.88;letter-spacing:0;user-select:none;}
.logo-md{font-family:var(--display);font-size:40px;color:var(--red);line-height:.9;letter-spacing:0;user-select:none;}
.logo-white{color:var(--white);}

/* TAGLINE */
.tagline{font-family:var(--body);font-weight:400;font-size:17px;color:var(--black);margin-top:8px;line-height:1.3;}

/* SCRIPT TEXT */
.script{font-family:var(--body);font-size:26px;font-weight:600;color:var(--black);}
.script-white{color:var(--white);}
.script-sm{font-size:20px;}

/* INPUTS — blue background, white bold uppercase, pill shape */
.input-field{
  background:var(--white);
  border-radius:50px;
  padding:12px 22px;
  font-family:var(--body);
  font-weight:400;
  font-size:16px;
  color:var(--black);
  width:100%;
  border:1.5px solid var(--black);
  outline:none;
  cursor:text;
  display:block;
}
.input-field::placeholder{color:var(--text-muted);font-weight:400;}

/* BUTTONS */
.btn-black{
  background:var(--black);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:12px 28px;
  font-family:var(--body);
  font-weight:400;
  font-size:16px;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s,opacity .12s;
  display:block;
}
.btn-black:active{transform:scale(.97);}

.btn-black-half{
  background:var(--white);
  color:var(--black);
  border:1.5px solid var(--black);
  border-radius:50px;
  padding:18px 20px;
  font-family:var(--body);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  flex:1;
  text-align:center;
  transition:transform .12s;
}
.btn-black-half:active{transform:scale(.97);}

.btn-blue{
  background:var(--red);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:18px 28px;
  font-family:var(--body);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s;
  display:block;
}
.btn-blue:active{transform:scale(.97);}

/* OCCASION CARDS — horizontal scroll */
.cards-row{
  display:flex;
  gap:14px;
  padding:0 24px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  padding-bottom:8px;
  flex-shrink:0;
}
.cards-row::-webkit-scrollbar{display:none;}

.occ-card{
  flex-shrink:0;
  width:210px;
  height:260px;
  background:var(--black);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  scroll-snap-align:center;
  transition:transform .15s,opacity .15s,outline .1s;
  position:relative;
  overflow:hidden;
}
.occ-card:active{transform:scale(.97);}
.occ-card.sel{outline:3px solid var(--red);background:#111;}
.occ-card-label{font-family:var(--body);font-size:22px;font-weight:600;color:var(--white);line-height:1.25;position:relative;z-index:1;}

/* SOMETHING ELSE EXPANDED */
.else-card{
  width:210px;
  min-height:260px;
  background:var(--black);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  flex-shrink:0;
  scroll-snap-align:center;
}
.else-item{
  font-family:var(--body);
  font-size:18px;
  font-weight:500;
  color:var(--white);
  padding:10px 6px;
  border-bottom:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:opacity .15s;
  border-radius:8px;
}
.else-item:last-child{border-bottom:none;}
.else-item:active{opacity:.7;}

/* MENU */
.menu-panel{
  position:absolute;inset:0;
  background:var(--black);
  z-index:101;
  animation:fadeIn .22s ease;
  display:flex;flex-direction:column;
  padding:56px 36px 44px;
}
.menu-close{position:absolute;top:24px;right:28px;background:none;border:none;color:rgba(255,255,255,.7);font-size:32px;cursor:pointer;font-weight:200;line-height:1;}
.menu-item{
  font-family:var(--body);
  font-weight:700;
  font-size:40px;
  color:var(--white);
  padding:10px 0;
  cursor:pointer;
  transition:opacity .15s;
  line-height:1.1;
}
.menu-item:active{opacity:.6;}
.menu-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.menu-bottom-item{font-family:var(--body);font-weight:700;font-size:14px;color:rgba(255,255,255,.55);cursor:pointer;transition:color .15s;}
.menu-bottom-item:active{color:var(--white);}

/* HAMBURGER */
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:7px;}
.hamburger span{display:block;width:26px;height:2px;background:var(--black);border-radius:2px;}

/* OPTION BUTTONS (location, budget, etc) */
.opt-btn{
  background:var(--white);
  border:1.5px solid rgba(0,0,0,.2);
  border-radius:16px;
  padding:18px 22px;
  font-family:var(--body);
  font-weight:500;
  font-size:16px;
  color:var(--black);
  cursor:pointer;
  width:100%;
  text-align:left;
  transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;
}
.opt-btn.sel{background:var(--black);color:var(--white);border-color:var(--black);}
.opt-btn:active{transform:scale(.98);}
.opt-check{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-check.on{background:var(--black);border-color:var(--black);}
.opt-check.on::after{content:'✓';font-size:12px;color:var(--white);font-weight:700;}

/* VENUE CARDS */
.venue-card{
  background:var(--white);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .13s cubic-bezier(.2,.8,.4,1), box-shadow .13s ease;
  margin-bottom:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
}
.venue-card:active{transform:scale(.97);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.venue-img{width:100%;height:200px;background:var(--black);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;}
.venue-body{padding:16px 18px;}
.venue-name{font-family:var(--body);font-weight:700;font-size:20px;color:var(--black);margin-bottom:5px;}
.venue-meta{font-family:var(--body);font-size:13px;color:var(--text-muted);font-weight:400;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.venue-tag{display:inline-block;background:#F0D8EC;color:#000;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}
.tab{flex:1;padding:14px 6px;font-family:var(--body);font-size:13px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;text-transform:uppercase;letter-spacing:.04em;transition:all .15s;}
.tab.on{color:var(--black);border-bottom-color:var(--black);}

/* MISC */
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.scroll::-webkit-scrollbar{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0;flex-shrink:0;}
.back-btn{background:var(--black);border:none;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;line-height:1;flex-shrink:0;}
.back-btn:active{opacity:.7;}
.text-link{font-family:var(--body);font-size:14px;font-weight:700;color:var(--black);text-decoration:underline;cursor:pointer;}
.text-link-blue{color:var(--red);}
.divider{height:1px;background:rgba(0,0,0,.1);margin:4px 0;}
.empty{text-align:center;padding:48px 20px;color:#888;display:flex;flex-direction:column;align-items:center;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--white);padding:13px 26px;border-radius:50px;font-family:var(--body);font-size:14px;font-weight:600;letter-spacing:.02em;animation:popIn .25s ease both;white-space:nowrap;z-index:9999;max-width:320px;text-overflow:ellipsis;overflow:hidden;}
.status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.04em;font-family:var(--body);}
.pill-pending{background:#FFF3CD;color:#856404;}
.pill-active{background:#D1E7DD;color:#0A3622;}
.pill-rejected{background:#F8D7DA;color:#58151C;}
.pill-needs_edit{background:#CFF4FC;color:#055160;}
.admin-card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.input-wrap-light{background:var(--white);border:1.5px solid rgba(0,0,0,.15);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;width:100%;}
.input-wrap-light input{border:none;outline:none;background:transparent;font-family:var(--body);font-size:15px;font-weight:400;color:var(--black);flex:1;}
.input-wrap-light input::placeholder{color:rgba(0,0,0,.3);}
.prog-dots{display:flex;gap:7px;justify-content:center;padding:10px 0 4px;}
.prog-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.13);transition:all .2s;}
.prog-dot.on{background:var(--black);width:24px;border-radius:5px;}

function translateOpenHours(hoursArr) {
  if(!hoursArr || _lang === "en") return hoursArr;
  const days_hu = {"Monday":"Hétfő","Tuesday":"Kedd","Wednesday":"Szerda","Thursday":"Csütörtök","Friday":"Péntek","Saturday":"Szombat","Sunday":"Vasárnap"};
  const days_es = {"Monday":"Lunes","Tuesday":"Martes","Wednesday":"Miércoles","Thursday":"Jueves","Friday":"Viernes","Saturday":"Sábado","Sunday":"Domingo"};
  const days = _lang === "hu" ? days_hu : _lang === "es" ? days_es : null;
  if(!days) return hoursArr;
  return hoursArr.map(h => {
    let result = h;
    Object.entries(days).forEach(([en, tr]) => { result = result.replace(en, tr); });
    return result;
  });
}

// Weekly city picks - seeded by week number so everyone sees the same picks
function getWeekNumber() {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return d.getFullYear() * 100 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7) + 1;
}
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function getWeeklyPicks(venues, cat, n=5) {
  const pool = venues.filter(v => v.status==="active" && v.is_city_pick && v.category===cat);
  if(pool.length===0) return [];
  const seed = getWeekNumber() * 31 + cat.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng = seededRandom(seed);
  const shuffled = [...pool].sort(()=>rng()-0.5);
  return shuffled.slice(0, n);
}

function useOpenStatus(placeId) {
  const [status, setStatus] = React.useState(null);
  React.useEffect(()=>{
    if(!placeId) return;
    function fetchStatus(){
      if(!window.google?.maps?.places) return false;
      const svc = new window.google.maps.places.PlacesService(document.createElement("div"));
      svc.getDetails({placeId, fields:["opening_hours","utc_offset_minutes"]}, (place, s)=>{
        if(s==="OK"&&place?.opening_hours?.periods){
          try {
            // Calculate current time in Budapest (CET/CEST)
            const now = new Date();
            const utcOffset = place.utc_offset_minutes ?? 60;
            const localMinutes = now.getUTCHours()*60 + now.getUTCMinutes() + utcOffset;
            const localDay = (now.getUTCDay() + Math.floor(localMinutes/1440)) % 7;
            const timeOfDay = localMinutes % 1440;
            const currentTime = Math.floor(timeOfDay/60)*100 + (timeOfDay%60);

            const isOpen = place.opening_hours.periods.some(p=>{
              if(p.open.day !== localDay) return false;
              const openTime = p.open.time ? parseInt(p.open.time) : 0;
              const closeTime = p.close ? parseInt(p.close.time) : 2359;
              // Handle overnight (close < open)
              if(closeTime < openTime) return currentTime >= openTime || currentTime < closeTime;
              return currentTime >= openTime && currentTime < closeTime;
            });
            setStatus(isOpen?"open":"closed");
          } catch(e){ try { setStatus(place.opening_hours.isOpen()?"open":"closed"); } catch(e2){} }
        }
      });
      return true;
    }
    if(!fetchStatus()){
      // Wait for Google Maps to load
      const t = setInterval(()=>{ if(fetchStatus()) clearInterval(t); }, 500);
      return ()=>clearInterval(t);
    }
  },[placeId]);
  return status;
}

function ShimmerImg({src, style, fallback=null}) {
  const [loaded, setLoaded] = useState(false);
  if(!src) return fallback;
  return (
    <>
      {!loaded&&<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear",zIndex:1}}/>}
      <img src={src} onLoad={()=>setLoaded(true)} style={{...style,opacity:loaded?1:0,transition:"opacity .3s ease"}}/>
    </>
  );
}

function VenueCard({venue, onClick}) {
  const [imgUrl, setImgUrl] = useState(null);
  const [imgFetched, setImgFetched] = useState(false);
  const grads={
    "Wine bar":"linear-gradient(135deg,#2C1654,#000000)",
    "Hungarian":"linear-gradient(135deg,#8B0000,#000000)",
    "Bar":"linear-gradient(135deg,#000000,#000000)",
    "Coffee & Bakery":"linear-gradient(135deg,#3B2010,#000000)",
    "Street food":"linear-gradient(135deg,#000000,#000000)",
    "Brunch":"linear-gradient(135deg,#222222,#000000)",
    "Fine dining":"linear-gradient(135deg,#000000,#000000)",
    "Italian":"linear-gradient(135deg,#1a4a1a,#000000)",
    default:"linear-gradient(135deg,#000000,#000000)",
  };

  const [imgLoaded, setImgLoaded] = useState(false);
  const openStatus = useOpenStatus(venue.google_place_id);
  useEffect(()=>{
    setImgLoaded(false);
    setImgFetched(false);
    setImgUrl(null);
    supabase.from("venue_images").select("url").eq("venue_id",venue.id).eq("is_primary",true).limit(1).then(({data})=>{
      if(data&&data.length>0) setImgUrl(data[0].url);
      setImgFetched(true);
    });
  },[venue.id]);

  function openMaps(e){
    e.stopPropagation();
    const q = encodeURIComponent(venue.name+", Budapest");
    window.open(venue.google_maps_url||`https://www.google.com/maps/search/?api=1&query=${q}`,"_blank");
  }

  return (
    <div className="venue-card" onClick={onClick}>
      <div className="venue-img" style={{background:!imgFetched||imgUrl?(imgLoaded?"#111":"#e8e8e8"):grads[venue.cuisine]||grads.default,padding:0}}>
        {!imgFetched
          ?<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear"}}/>
          :imgUrl
            ?<>
              {!imgLoaded&&<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear"}}/>}
              <img src={imgUrl} onLoad={()=>setImgLoaded(true)} style={{width:"100%",height:"100%",objectFit:"cover",transition:"opacity .35s ease",opacity:imgLoaded?1:0}}/>
            </>
            :<span style={{fontSize:52}}>🍽</span>
        }
      </div>
      <div className="venue-body">
        <div className="venue-name">{venue.name}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6,gap:8}}>
          <div className="venue-meta" style={{flex:1}}>
            <span>{tCat(venue.category)||tCui(venue.cuisine)}</span><span>·</span>
            <span>{t("venue.dist")} {venue.district}</span><span>·</span>
            <span>{venue.price_level||venue.price}</span>
            {openStatus&&<span style={{color:openStatus==="open"?"#16a34a":"#dc2626",fontWeight:700,fontSize:11,background:openStatus==="open"?"#dcfce7":"#fee2e2",padding:"2px 7px",borderRadius:10}}>
              {openStatus==="open"?t("venue.open_now"):t("venue.closed")}
            </span>}
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <button onClick={openMaps} style={{background:"var(--red)",border:"none",cursor:"pointer",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            </button>

function BottomNav({screen, navigate, onMenu, menuOpen}) {
  const tabs = [
    {id:"home",       label:t("nav.home")},
    {id:"q1",         label:t("nav.discover")},
    {id:"saved",      label:t("nav.saved")},
    {id:"all_venues", label:t("nav.all_venues")},
    {id:"menu",       label:t("nav.menu")},
  ];
  const active = (id) => {
    if(menuOpen) return id==="menu";
    if(id==="home") return screen==="home"||screen==="results_list";
    if(id==="q1") return ["q1","q2","q3","q4","q5","q6","results"].includes(screen);
    if(id==="menu") return false;
    return screen===id;
  };
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,display:"flex",zIndex:200,justifyContent:"center",paddingBottom:"calc(env(safe-area-inset-bottom) + 12px)",padding:"8px 16px calc(env(safe-area-inset-bottom) + 12px)"}}>

        {tabs.map(t=>(
          <button key={t.id}

            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",gap:4,transition:"transform .1s ease"}}
            onTouchStart={e=>e.currentTarget.style.transform="scale(.88)"}

            <span style={{fontFamily:"var(--body)",fontSize:10,fontWeight:active(t.id)?700:400,color:active(t.id)?"white":"rgba(255,255,255,.4)"}}>{t.label}</span>

function SignInScreen({navigate, onLogin}) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  async function go() {
    if(!email||!pw) return;
    setLoading(true);
    setError(null);
    try {
      const {data, error} = await supabase.auth.signInWithPassword({email, password:pw});
      if(error) throw error;
      if(!data.user.email_confirmed_at) {
        await supabase.auth.signOut();
        throw new Error("Please confirm your email before signing in. Check your inbox.");
      }
      const {data: profile} = await supabase.from("users").select("*").eq("id", data.user.id).single();
      const u = {
        id: data.user.id,
        name: profile?.name || email.split("@")[0],
        email: data.user.email,
        role: (()=>{ const r=(profile?.role||"explorer").toLowerCase(); return r==="user"?"explorer":r; })(),
        city_id: profile?.city_id || null,
        badge: profile?.badge || null,
        profile_image: profile?.profile_image || null,
      };
      onLogin(u);
      // navigation handled by onLogin
    } catch(e) {
      setError(e.message || "Sign in failed. Check your email and password.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="screen" style={{padding:"80px 28px 32px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
      <div>
        <div style={{fontFamily:"var(--display)",fontSize:"56px",color:"var(--red)",lineHeight:.88,letterSpacing:0,userSelect:"none"}}>LOKAL&#39;Z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:10}}>{t("onboard.beyond")}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:160}}>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)",marginBottom:2}}>{t("auth.login_with")}</div>
        <input className="input-field" placeholder={t("auth.email")} type="email" value={email} onChange={e=>{setEmail(e.target.value);setError(null);}}/>
        <input className="input-field" placeholder={t("auth.password")} type="password" value={pw} onChange={e=>{setPw(e.target.value);setError(null);}} onKeyDown={e=>e.key==="Enter"&&go()}/>
        {error&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#c00",fontWeight:400,background:"rgba(255,0,0,.08)",padding:"10px 14px",borderRadius:10}}>{error}</div>}
        <div style={{display:"flex",justifyContent:"center"}}>
          <button style={{background:"black",color:"white",border:"none",borderRadius:50,padding:"12px 0",fontFamily:"var(--body)",fontWeight:400,fontSize:16,cursor:"pointer",width:"60%",opacity:loading?0.6:1}} onClick={go}>
            {loading ? t("auth.signing_in") : t("auth.login")}
          </button>
        </div>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)",marginTop:4,marginBottom:2}}>{t("misc.or")}...</div>

function SignUpScreen({navigate, onLogin}) {
  const [firstName,setFirstName]=useState("");
  const [lastName,setLastName]=useState("");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [dob,setDob]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [success,setSuccess]=useState(false);

  async function go() {
    if(!firstName||!lastName||!email||!pw) return setError(t("err.fill_all"));
    if(pw!==pw2) return setError(t("auth.password_mismatch"));
    if(pw.length<6) return setError(t("auth.password_short"));
    setLoading(true);
    setError(null);
    const fullName = firstName.trim()+" "+lastName.trim();
    try {
      const {data, error} = await supabase.auth.signUp({email, password:pw});
      if(error) throw error;
      // Create user profile
      await supabase.from("users").insert({
        id: data.user.id,
        name: fullName,
        email,
        role: "USER",
        ...(dob ? {date_of_birth: dob} : {})
      });
      setSuccess(true);
    } catch(e) {
      setError(e.message || t("err.signup_failed"));
    } finally {
      setLoading(false);
    }
  }

  if(success) return (
    <div className="screen" style={{padding:"36px 28px",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:20,textAlign:"center"}}>
      <div style={{fontFamily:"var(--display)",fontSize:"52px",color:"var(--red)",lineHeight:.88}}>LOKAL&#39;Z</div>
      <div style={{fontFamily:"var(--body)",fontSize:20,fontWeight:700,color:"var(--black)",marginTop:10}}>{t("auth.check_email")}</div>
      <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:400,color:"#555",lineHeight:1.6}}>
        {t("auth.confirm_sent")} <strong>{email}</strong>. {t("auth.click_activate")}
      </div>
      <button className="btn-black" style={{marginTop:20}} onClick={()=>navigate("signin")}>{t("auth.back_signin")}</button>
    </div>
  );

  return (
    <div className="screen" style={{padding:"80px 28px 32px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
      <div>
        <div style={{fontFamily:"var(--display)",fontSize:"56px",color:"var(--red)",lineHeight:.88,letterSpacing:0,userSelect:"none"}}>LOKAL&#39;Z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:10}}>{t("onboard.beyond")}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:80}}>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)",marginBottom:2}}>{t("auth.sign_up")}</div>
        <div style={{display:"flex",gap:10}}>
          <input className="input-field" placeholder={t("auth.first_name")} value={firstName} onChange={e=>setFirstName(e.target.value)} style={{flex:1}}/>
          <input className="input-field" placeholder={t("auth.last_name")} value={lastName} onChange={e=>setLastName(e.target.value)} style={{flex:1}}/>
        </div>
        <input className="input-field" placeholder={t("auth.email")} type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input className="input-field" placeholder={t("auth.password")} type="password" value={pw} onChange={e=>setPw(e.target.value)}/>
        <input className="input-field" placeholder={t("auth.confirm_password")} type="password" value={pw2} onChange={e=>setPw2(e.target.value)}/>
        <input className="input-field" type="date" value={dob} onChange={e=>setDob(e.target.value)}

function HomeScreen({navigate, onMenu, setAnswers, user, partner, venuesLoading, allVenues}) {
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const PARTNER_SHORTCUTS = [
    {label:t("ps.dinner_hotel"), icon:"🍽", occasions:["Dinner with friends","Date night"]},
    {label:t("ps.wine_bars"), icon:"🍷", occasions:["Drinks"]},
    {label:t("ps.coffee"), icon:"☕", occasions:["Coffee & Bakery"]},
    {label:t("ps.brunch"), icon:"🥞", occasions:["Brunch"]},
    {label:t("ps.birthday"), icon:"🎂", occasions:["Birthday"]},
  ];

  async function savePartnerSearch(data){
    if(!partner?.id) return;
    await supabase.from("partner_searches").insert({
      partner_id: partner.id,
      user_id: user?.id||null,
      query: data.query||null,
      occasions: data.occasions||null,
      cuisines: data.cuisines||null,
      budget: data.budget||null,
      group_size: data.group||null,
    });
  }

  async function handleAISearch() {
    if(!query.trim()) return;
    setLoading(true);
    setError(null);
    try {
      const result = await supabase.functions.invoke("ai-search", {
        body: { query }
      });
      if(result.error) throw result.error;
      const parsed = result.data||{};
      const VALID_CAT = ["Restaurant","Café","Bar","Bakery","Patisserie","Street food","Other"];
      const VALID_OCC = ["Casual dining","Fine dining","Dinner with friends","Date night","Lunch","Breakfast and brunch","Quick bite","Coffee","Quiet work spot","Pre-drinks / drinks","Late night","Celebration","Family outing"];
      const VALID_TAGS = ["Specialty coffee","Matcha","Hidden gem","Cozy","Chill","Quiet","Grab & go","Cocktails","Wine bar","Speakeasy","Live music","Good music","Good for groups","Romantic","Lively","Upscale","Scenic","Underrated","Aesthetic","Outdoor seating","Indoor seating"];
      const VALID_CUI = ["Japanese","Chinese","Korean","Thai","Vietnamese","Indian","Italian","French","Spanish","Greek","Mexican","American","Hungarian","Middle Eastern","Mediterranean"];
      const VALID_DIS = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV",t("q.anywhere")];
      const VALID_DIE = ["Gluten-free","Vegan","Vegetarian","Halal","Kosher","Dairy-free","Nut-free","Pescatarian"];
      const VALID_BUD = ["$","$$","$$$","$$$$"];
      const VALID_GRP = ["solo","2","3-6","6-8","9+"];
      const aiData = {
        category:  VALID_CAT.includes(parsed.category)?parsed.category:null,
        occasions: Array.isArray(parsed.occasions)?parsed.occasions.filter(o=>VALID_OCC.includes(o)):[],
        tags:      Array.isArray(parsed.tags)?parsed.tags.filter(t=>VALID_TAGS.includes(t)):[],
        cuisines:  Array.isArray(parsed.cuisines)?parsed.cuisines.filter(c=>VALID_CUI.includes(c)):[],
        budget:    VALID_BUD.includes(parsed.budget)?parsed.budget:null,
        group:     VALID_GRP.includes(parsed.group)?parsed.group:null,
        locations: Array.isArray(parsed.locations)?parsed.locations.filter(l=>VALID_DIS.includes(l)):[],
        dietary:   Array.isArray(parsed.dietary)?parsed.dietary.filter(d=>VALID_DIE.includes(d)):[],
        whySearch: typeof parsed.whySearch==="string"&&parsed.whySearch.trim()?parsed.whySearch.trim():null,

function RecentVenueThumb({venueId, category}) {
  const [imgUrl, setImgUrl] = React.useState(null);
  const [imgFetched, setImgFetched] = React.useState(false);
  const [heroLoaded, setHeroLoaded] = React.useState(false);
  React.useEffect(()=>{
    setImgUrl(null); setImgFetched(false); setHeroLoaded(false);
    supabase.from("venue_images").select("url").eq("venue_id",venueId).eq("is_primary",true).limit(1).then(({data})=>{
      if(data&&data.length>0) setImgUrl(data[0].url);
      setImgFetched(true);
    });
  },[venueId]);
  const catEmoji = {Restaurant:"🍽️","Street food":"🌮",Bakery:"🥐",Café:"☕",Patisserie:"🍰",Bar:"🍸"};
  return (
    <div style={{width:"100%",height:110,background:"#e8e8e8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0,position:"relative",overflow:"hidden"}}>
      {!imgFetched
        ?<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear"}}/>
        :imgUrl
          ?<>
            {!heroLoaded&&<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear"}}/>}
            <img src={imgUrl} onLoad={()=>setHeroLoaded(true)} style={{width:"100%",height:"100%",objectFit:"cover",opacity:heroLoaded?1:0,transition:"opacity .35s ease"}}/>
          </>
          :<span>{catEmoji[category]||"🍽️"}</span>
      }
    </div>
  );
}

function Q3Screen({navigate, onMenu, answers, setAnswers, partnerDistrict, allVenues}) {
  const [sel, setSel] = useState(answers.locations||(partnerDistrict?[partnerDistrict]:[]));
  const [showMore, setShowMore] = useState(false);
  const [locLoading, setLocLoading] = useState(false);

  function detectLocation(){
    setLocLoading(true);
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        setLocationGranted(true); // remember user granted location
        const {latitude:lat, longitude:lng} = pos.coords;
        function runGeocode(){
          if(!window.google?.maps) return false;
          const geocoder = new window.google.maps.Geocoder();
          geocoder.geocode({location:{lat,lng}}, (results, status)=>{
            let district = null;
            if(status==="OK"&&results){
              const postalComp = results.flatMap(r=>r.address_components||[]).find(c=>c.types?.includes("postal_code"));
              const postal = postalComp?.short_name;
              if(postal){
                const code=parseInt(postal);
                if(code>=1011&&code<=1239){
                  const num=Math.floor((code-1000)/10);
                  const R=["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII","XIX","XX","XXI","XXII","XXIII"];
                  district=R[num]||null;
                }
              }
            }
            if(district){
              setSel([district]);
              if(!["V","VI","VII"].includes(district)) setShowMore(true);
            }
            setLocLoading(false);
          });
          return true;
        }
        if(!runGeocode()){
          const _t=setInterval(()=>{ if(runGeocode()) clearInterval(_t); },300);
        }
      },
      ()=>{ setLocationGranted(false); setLocLoading(false); },
      {enableHighAccuracy:true, timeout:10000, maximumAge:0}
    );
  }

  // Auto-detect location if user previously granted permission
  React.useEffect(()=>{
    if(getStoredLocation()==="1" && !sel.length){
      detectLocation();
    }
  },[]);

  function toggle(d){
    haptic("light");
    setSel(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d]);
  }

  function next(){setAnswers(a=>({...a,locations:sel}));navigate("q4");}
  const PILL = {border:"1.5px solid black",borderRadius:50,height:44,fontFamily:"var(--body)",fontWeight:400,fontSize:15,cursor:"pointer",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",transition:"transform .1s ease"};
  return (
    <div className="screen" style={{background:"var(--bg)",display:"flex",flexDirection:"column"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <button onClick={()=>navigate("q2")} className="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:4}}>{t("onboard.beyond")}</div>
          </div>
        </div>
      </div>
      <QProgress step="q3"/>
      <div style={{padding:"8px 20px 16px",flexShrink:0}}>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)",marginTop:8}}>{t("q3.where_city")}</div>
      </div>
      <div className="scroll" style={{padding:"0 20px 100px",display:"flex",flexDirection:"column",gap:9}}>
        <button onClick={detectLocation}
          style={{...PILL,background:sel.length>0&&!["V","VI","VII"].includes(sel[0])&&![t("q.anywhere")].includes(sel[0])&&sel.length===1?"var(--black)":"white",color:sel.length>0&&!["V","VI","VII"].includes(sel[0])&&![t("q.anywhere")].includes(sel[0])&&sel.length===1?"white":"var(--black)",border:"1.5px solid black"}}>
          <span>{locLoading?t("q.locating"):t("q.detect_location")}</span>

function getOccasionsForCategory(category) {
  if(!category) return OCCASIONS.map(o=>o.id);
  const list = CATEGORY_OCCASIONS[category];
  return list || OCCASIONS.map(o=>o.id);
}

function getTagsForCategory(category, extraTags=[]) {
  const base = (!category || !CATEGORY_TAGS[category]) ? TAGS : CATEGORY_TAGS[category];
  // Merge in any custom tags learned for this category
  const merged = [...base];
  extraTags.forEach(t=>{ if(!merged.includes(t)) merged.push(t); });
  return merged;
}

// Capacity matching — "2 főre keresek" → Up to 6, Up to 8, 8+ is megfelelő
function capacityMatches(venueCapacity, searchGroup) {
  if(!venueCapacity || !searchGroup) return true;
  if(searchGroup === "solo") return true; // 1 person fits anywhere
  const order = ["2", "3-6", "6-8", "9+"];
  const vIdx = order.indexOf(venueCapacity);
  const sIdx = order.indexOf(searchGroup);
  if(vIdx === -1 || sIdx === -1) return true;
  return vIdx >= sIdx;
}

function ResultsScreen({navigate, onMenu, answers, setAnswers, allVenues, partner, user}) {
  const BATCH=5;
  const active = allVenues.filter(v=>v.status==="active").sort((a,b)=>a.name.localeCompare(b.name));
  const filtered = active.filter(v=>{
    // 0. Category — strict match
    if(answers.category && v.category!==answers.category) return false;
    // 1. Occasions — legalább egy egyezzen
    if(answers.occasions?.length>0 && !answers.occasions.some(o=>(v.occasions||[]).includes(o))) return false;
    // 1b. Tags — at least one must match
    // 2. Budget — singular (AI) vagy plural (discover flow) egyaránt
    const vPrice = (v.price_level||v.price||"").trim();
    const budgetList = answers.budgets?.length>0 ? answers.budgets : (answers.budget ? [answers.budget.trim()] : []);
    if(budgetList.length>0 && !budgetList.includes(vPrice)) return false;
    // 3. Cuisines — legalább egy egyezzen
    if(answers.cuisines?.length>0 && v.cuisine && !answers.cuisines.some(c=>v.cuisine.toLowerCase().includes(c.toLowerCase()))) return false;
    // 4. Group / capacity
    if(answers.group && !capacityMatches(v.capacity, answers.group)) return false;

    // 6. District/location — normalizált összehasonlítás (pl. "District V." == district "V")
    if(answers.locations?.length>0 && !answers.locations.includes(t("q.anywhere")) && !answers.locations.includes("near me")) {
      if(!answers.locations.some(l=>String(l).trim()===String(v.district).trim())) return false;
    }
    // 7. Dietary
    if(answers.dietary?.length>0) {
      if(!answers.dietary.some(d=>(v.dietary||[]).includes(d))) return false;
    }
    // Tags filter
    if(answers.tags?.length>0){
      const vTags = v.tags||[];
      if(!answers.tags.some(t=>vTags.includes(t))) return false;
    }
    // whySearch: kizáró szűrő — csak ha az AI kinyerte (vibe/mood ami más szűrőbe nem fért)
    if(answers.whySearch&&answers.whySearch.trim()) {
      const wq=answers.whySearch.toLowerCase();
      if(!(v.why||"").toLowerCase().includes(wq)&&!(v.name||"").toLowerCase().includes(wq)) return false;
    }
    // Partner district bias — partner's district gets priority but is not exclusive
    return true;
  });
  // Partner district: venues from partner's district appear first
  const partnerDistrict = answers.partnerDistrict || partner?.district;
  const whyQ = answers.whySearch?.toLowerCase();
  const sorted = [...filtered].sort((a,b)=>{
    // whySearch egyezés előre kerül
    if(whyQ) {
      const aWhy = (a.why||"").toLowerCase().includes(whyQ)||(a.name||"").toLowerCase().includes(whyQ);
      const bWhy = (b.why||"").toLowerCase().includes(whyQ)||(b.name||"").toLowerCase().includes(whyQ);
      if(aWhy && !bWhy) return -1;
      if(!aWhy && bWhy) return 1;
    }
    // Partner district előre kerül
    if(partnerDistrict) {
      const aMatch = a.district===partnerDistrict ? -1 : 1;
      const bMatch = b.district===partnerDistrict ? -1 : 1;
      return aMatch - bMatch;
    }
    return 0;
  });
  const pool = React.useMemo(()=>shuffle(sorted),[filtered.length, answers]);
  const [shownCount, setShownCount] = useState(BATCH);
  const shown = pool.slice(0, shownCount);
  const noMore = shownCount >= pool.length;

  // Reset when answers change
  React.useEffect(()=>{
    setShownCount(BATCH);
  },[answers]);

  // Save partner analytics on first render
  useEffect(()=>{
    if(!partner?.id) return;
    supabase.from("partner_searches").insert({
      partner_id: partner.id,
      user_id: user?.id||null,
      query: answers.aiQuery||null,
      occasions: answers.occasions||null,
      cuisines: answers.cuisines||null,
      budget: answers.budget||null,
      group_size: answers.group||null,
      results_count: pool.length,
    });
  },[]);

  function showMore(){
    setShownCount(c=>Math.min(c+BATCH, pool.length));
  }

  const pullRef = React.useRef(null);
  const pullStartY = React.useRef(null);
  const [pullDist, setPullDist] = React.useState(0);
  const [refreshing, setRefreshing] = React.useState(false);

  function onPullStart(e){ pullStartY.current = e.touches[0].clientY; }
  function onPullMove(e){
    if(pullStartY.current===null||pullRef.current?.scrollTop>0) return;
    const dist = Math.max(0, Math.min(80, e.touches[0].clientY - pullStartY.current));
    setPullDist(dist);
  }
  function onPullEnd(){
    if(pullDist>60){
      setRefreshing(true);
      haptic("medium");
      setTimeout(()=>{ setRefreshing(false); setShownCount(BATCH); }, 800);
    }
    setPullDist(0);
    pullStartY.current = null;
  }

  return (
    <div className="screen" style={{background:"var(--bg)"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <button onClick={()=>navigate(-1)} className="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:4}}>{t("onboard.beyond")}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"8px 20px 12px",flexShrink:0}}>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)"}}>{t("results.our_picks")}</div>
        {(()=>{
          const pills = [];
          if(answers.category) pills.push(answers.category);
          if(answers.locations?.length>0&&!answers.locations.includes(t("q.anywhere"))) pills.push(...answers.locations.map(l=>`${t("venue.dist")} ${l}`));
          if(answers.budgets?.length>0) pills.push(...answers.budgets);
          if(answers.occasions?.length>0) pills.push(answers.occasions[0]);
          if(pills.length===0) return null;
          return <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
            {pills.map((p,i)=>(

                {p}
              </span>
            ))}
          </div>;
        })()}
      </div>
      <div className="scroll" style={{padding:"0 20px 80px"}} ref={pullRef}
        onTouchStart={onPullStart} onTouchMove={onPullMove} onTouchEnd={onPullEnd}>
        {(pullDist>0||refreshing)&&(
          <div style={{textAlign:"center",padding:"8px",fontFamily:"var(--body)",fontSize:13,color:"#888",transform:`translateY(${pullDist}px)`,transition:pullDist===0?"all .3s":"none"}}>

        {refreshing&&[1,2,3].map(i=><SkeletonCard key={i}/>)}
        {!refreshing&&shown.length===0&&(

        if(data){
          const c={still_recommended:0,needs_review:0,report_closed:0};
          data.forEach(r=>{ if(c[r.feedback_type]!==undefined) c[r.feedback_type]++; });
          setCounts(c);
        }
      });
  },[venue.id, user?.id]);

  async function submitFeedback(type){
    if(!user?.id) return;
    if(existing?.feedback_type === type) return; // már ki van választva
    setSubmitting(true);
    const prevType = existing?.feedback_type;
    if(existing){
      const {error} = await supabase.from("venue_feedback").update({feedback_type:type}).eq("id",existing.id);
      if(!error){
        setExisting(e=>({...e,feedback_type:type}));
        setCounts(c=>({...c,[prevType]:c[prevType]-1,[type]:c[type]+1}));
      }
    } else {
      const {data,error} = await supabase.from("venue_feedback").insert({
        venue_id: venue.id,
        scout_id: user.id,
        feedback_type: type
      }).select().single();
      if(!error){
        setExisting(data);
        setCounts(c=>({...c,[type]:c[type]+1}));
      }
    }
    setSubmitting(false);
    showToast(t("toast.feedback"));
  }

  const options = [
    {type:"still_recommended", label:t("scout.still_rec"), icon:"✅"},
    {type:"needs_review", label:t("scout.needs_review"), icon:"⚠️"},
    {type:"report_closed", label:t("scout.rep_closed"), icon:"🚫"},
  ];

  return (
    <div style={{background:"#F5F5F5",borderRadius:16,padding:16,marginTop:4}}>
      <div style={{fontFamily:"var(--display)",fontSize:13,fontWeight:800,color:"var(--red)",letterSpacing:".06em",marginBottom:10}}>{t("scout.feedback_title")}</div>
      {options.map(o=>(
        <button key={o.type} onClick={()=>!submitting&&submitFeedback(o.type)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"space-between",
            background:existing?.feedback_type===o.type?"var(--red)":"none",
            color:existing?.feedback_type===o.type?"white":"var(--black)",
            border:"1.5px solid",
            borderColor:existing?.feedback_type===o.type?"var(--red)":"#ddd",
            borderRadius:10,padding:"10px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8,transition:"all .15s"}}>
          <span>{o.icon} {o.label}</span>
          <span style={{background:existing?.feedback_type===o.type?"rgba(255,255,255,.25)":"#e0e0e0",borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:800,color:existing?.feedback_type===o.type?"white":"#555"}}>
            {counts[o.type]}
          </span>
        </button>
      ))}
      {existing&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:4}}>{t("misc.last_updated")} {new Date(existing.created_at).toLocaleDateString()}</div>}
    </div>
  );
}

function VenueDetailScreen({venue, navigate, savedIds, toggleSave, showToast, isScout, user, allVenues}) {
  const [imgIdx,setImgIdx]=useState(0);
  const [images,setImages]=useState([]);
  const [imagesFetched,setImagesFetched]=useState(false);
  const [galleryLoaded,setGalleryLoaded]=useState(false);
  React.useEffect(()=>{ setGalleryLoaded(false); },[imgIdx]);
  const openStatus = useOpenStatus(venue.google_place_id);
  const [openHours, setOpenHours] = React.useState(null);
  React.useEffect(()=>{
    if(!venue.google_place_id||!window.google?.maps?.places) return;
    const svc = new window.google.maps.places.PlacesService(document.createElement("div"));
    svc.getDetails({placeId:venue.google_place_id, fields:["opening_hours"]}, (place, s)=>{
      if(s==="OK"&&place?.opening_hours?.weekday_text){
        setOpenHours(place.opening_hours.weekday_text);
      }
    });
  },[venue.google_place_id]);
  const [showReport,setShowReport]=useState(false);
  const [reportType,setReportType]=useState("");
  const [reportSubmitting,setReportSubmitting]=useState(false);
  const [swingDir,setSwingDir]=useState(null);
  const [votes,setVotes]=useState({like:0,neutral:0,dislike:0});
  const [myVote,setMyVote]=useState(null);
  const [votingLoading,setVotingLoading]=useState(false);
  const saved=savedIds.has(venue.id);

  // Load votes
  useEffect(()=>{
    supabase.from("venue_feedback").select("feedback_type, scout_id").eq("venue_id",venue.id)
      .then(({data})=>{
        if(!data) return;
        const v={like:0,neutral:0,dislike:0};
        data.forEach(r=>{
          if(r.feedback_type==="like") v.like++;
          else if(r.feedback_type==="neutral") v.neutral++;
          else if(r.feedback_type==="dislike") v.dislike++;
          if(user?.id&&r.scout_id===user.id) setMyVote(r.feedback_type);
        });
        setVotes(v);
      });
  },[venue.id,user?.id]);

  async function submitVote(type){
    if(!user?.id||votingLoading) return;
    setVotingLoading(true);
    if(myVote===type){
      // Remove vote
      await supabase.from("venue_feedback").delete().eq("venue_id",venue.id).eq("scout_id",user.id);
      setVotes(v=>({...v,[type]:Math.max(0,v[type]-1)}));
      setMyVote(null);
    } else {
      if(myVote){
        // Change vote
        await supabase.from("venue_feedback").update({feedback_type:type}).eq("venue_id",venue.id).eq("scout_id",user.id);
        setVotes(v=>({...v,[myVote]:Math.max(0,v[myVote]-1),[type]:v[type]+1}));
      } else {
        await supabase.from("venue_feedback").insert({venue_id:venue.id,scout_id:user.id,feedback_type:type});
        setVotes(v=>({...v,[type]:v[type]+1}));
      }
      setMyVote(type);
    }
    setVotingLoading(false);
  }

  async function submitReport(){
    if(!reportType) return;
    setReportSubmitting(true);
    const {error} = await supabase.from("venue_reports").insert({
      venue_id: venue.id,
      user_id: user?.id||null,
      report_type: reportType
    });
    setReportSubmitting(false);
    if(error){
      showToast("Error: " + error.message);
      return;
    }
    setShowReport(false);
    setReportType("");
    showToast(t("toast.report_sent"));
  }

  useEffect(()=>{
    setImagesFetched(false);
    supabase.from("venue_images").select("url").eq("venue_id",venue.id).order("sort_order").then(({data})=>{
      if(data&&data.length>0) setImages(data.map(d=>d.url));
      setImagesFetched(true);
    });
  },[venue.id]);

  function swipeTo(dir){
    if(images.length<=1) return;
    setSwingDir(dir);
    setTimeout(()=>{
      setImgIdx(i=> dir==="left" ? (i+1)%images.length : (i-1+images.length)%images.length);
      setSwingDir(null);
    },200);
  }

  const grads={
    "Wine bar":"linear-gradient(160deg,#1a0a2e,#000000)",
    "Hungarian":"linear-gradient(160deg,#8B0000,#222)",
    "Bar":"linear-gradient(160deg,#111,#000)",
    "Coffee & Bakery":"linear-gradient(160deg,#3B2010,#111)",
    "Fine dining":"linear-gradient(160deg,#111,#000)",
    default:"linear-gradient(160deg,#111,#000)",
  };

  const touchStartX = React.useRef(null);

  const swingStyle = swingDir==="left"
    ? {transform:"translateX(-60px) rotate(-8deg)",opacity:0,transition:"all .2s ease"}
    : swingDir==="right"
    ? {transform:"translateX(60px) rotate(8deg)",opacity:0,transition:"all .2s ease"}
    : {transform:"translateX(0) rotate(0deg)",opacity:1,transition:"all .15s ease"};

        onTouchStart={e=>{ touchStartX.current = e.touches[0].clientX; }}
        onTouchEnd={e=>{
          if(touchStartX.current===null||images.length<=1) return;
          const diff = touchStartX.current - e.changedTouches[0].clientX;
          if(Math.abs(diff)>40) swipeTo(diff>0?"left":"right");
          touchStartX.current = null;
        }}>
        {!imagesFetched
          ?<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear"}}/>
          :images.length>0
            ?<>
              {!galleryLoaded&&<div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.2s infinite linear",zIndex:1}}/>}
              <img src={images[imgIdx]} className="img-fade" onLoad={()=>setGalleryLoaded(true)} style={{width:"100%",height:"100%",objectFit:"cover",...swingStyle}}/>
            </>
            :<span>🍽</span>
        }
        {images.length>1&&(
          <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
            {images.map((_,i)=>(
              <div key={i} onClick={()=>setImgIdx(i)} style={{width:6,height:6,borderRadius:"50%",background:i===imgIdx?"white":"rgba(255,255,255,.5)",cursor:"pointer"}}/>
            ))}
          </div>
        )}
        <button className="back-btn" style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.4)",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:22}} onClick={()=>navigate(-1)}>‹</button>
        <button onClick={()=>{haptic("medium");toggleSave(venue.id);showToast(saved?t("toast.removed"):t("toast.saved"));}}
          style={{position:"absolute",top:16,right:16,background:"rgba(0,0,0,.4)",border:"none",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,color:saved?"#F97B30":"white"}}>
          {saved?"♥":"♡"}
        </button>
      </div>
      <div className="scroll" style={{padding:"20px 24px 80px"}}>

        {/* 1. Name + open status */}
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:6}}>
          <div style={{fontFamily:"var(--display)",fontSize:"36px",color:"var(--red)",lineHeight:1,letterSpacing:0}}>{venue.name}</div>
          {openStatus&&<span style={{color:openStatus==="open"?"#16a34a":"#dc2626",fontWeight:700,fontSize:12,background:openStatus==="open"?"#dcfce7":"#fee2e2",padding:"3px 10px",borderRadius:12,flexShrink:0}}>
            {openStatus==="open"?t("venue.open_now"):t("venue.closed")}
          </span>}
        </div>

        {/* 2. Category pills */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          <span className="venue-tag">{tCat(venue.subcategory||venue.category)||tCui(venue.cuisine)}</span>
          <span className="venue-tag">{t("venue.dist")} {venue.district}</span>
          <span className="venue-tag">{venue.price_level||venue.price}</span>
          {venue.is_city_pick&&(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")&&<span className="venue-tag" style={{background:"#FFF3CD",color:"#856404"}}>{t("vd.city_pick")}</span>}
        </div>

        {/* 3. Tags */}
        {venue.tags&&venue.tags.length>0&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {venue.tags.map(tag=><span key={tag} style={{fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:"#555",background:"#f0f0f0",borderRadius:20,padding:"4px 10px"}}>{tTag(tag)}</span>)}

        {/* 4. Action links row */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <a href={venue.google_maps_url||`https://maps.google.com/?q=${encodeURIComponent(venue.address||venue.name)}`} target="_blank" rel="noreferrer"

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            {t("vd.directions")}
          </a>
          {venue.instagram_url&&<a href={venue.instagram_url} target="_blank" rel="noreferrer"
            style={{display:"flex",alignItems:"center",gap:6,background:"white",border:"1.5px solid #ddd",color:"var(--black)",borderRadius:10,padding:"9px 14px",fontFamily:"var(--body)",fontWeight:600,fontSize:13,textDecoration:"none"}}>
            📸 Instagram
          </a>}
          {venue.reservation_url&&<a href={venue.reservation_url} target="_blank" rel="noreferrer"
            style={{display:"flex",alignItems:"center",gap:6,background:"white",border:"1.5px solid #ddd",color:"var(--black)",borderRadius:10,padding:"9px 14px",fontFamily:"var(--body)",fontWeight:600,fontSize:13,textDecoration:"none"}}>
            {t("vd.reserve")}
          </a>}
          {venue.website_url&&<a href={venue.website_url} target="_blank" rel="noreferrer"
            style={{display:"flex",alignItems:"center",gap:6,background:"white",border:"1.5px solid #ddd",color:"var(--black)",borderRadius:10,padding:"9px 14px",fontFamily:"var(--body)",fontWeight:600,fontSize:13,textDecoration:"none"}}>
            {t("vd.website")}
          </a>}
        </div>

        <div style={{height:1,background:"#f0f0f0",marginBottom:20}}/>

        {/* 5. Address */}
        <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:14}}>
          <span style={{fontSize:16,flexShrink:0,marginTop:1}}>📍</span>
          <div>
            <div style={{fontFamily:"var(--body)",fontSize:13,fontWeight:400,color:"#444",lineHeight:1.5}}>{venue.address}</div>
            <div style={{fontFamily:"var(--body)",fontSize:12,color:"var(--red)",fontWeight:600,marginTop:2}}>Budapest, {t("venue.dist_label")} {venue.district}</div>
          </div>
        </div>

        {/* 6. Opening hours */}
        {openHours&&(
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:16}}>
            <span style={{fontSize:16,flexShrink:0,marginTop:1}}>🕐</span>
            <div>
              <div style={{fontFamily:"var(--body)",fontSize:13,fontWeight:700,color:"var(--black)",marginBottom:4}}>
                {openStatus==="open"
                  ?<span style={{color:"#16a34a"}}>{t("vd.open_now")}</span>
                  :<span style={{color:"#dc2626"}}>{t("vd.closed")}</span>}
              </div>
              {translateOpenHours(openHours).map((h,i)=>(
                <div key={i} style={{fontFamily:"var(--body)",fontSize:12,color:"#666",lineHeight:1.7}}>{h}</div>
              ))}
            </div>
          </div>
        )}

        <div style={{height:1,background:"#f0f0f0",marginBottom:20}}/>

        {/* 7. Why locals go here */}
        <div style={{fontFamily:"var(--body)",fontSize:13,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>{t("vd.why_title")}</div>
        <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:400,color:"#222",lineHeight:1.8,marginBottom:12}}>{venue.why}</div>
        <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:400,marginBottom:20,display:"flex",alignItems:"center",gap:6}}>
          <span>—</span>
          <span
            style={{color:(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")?"var(--red)":"#aaa",
              cursor:(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")?"pointer":"default",
              fontWeight:700}}
            onClick={()=>{
              if((user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")&&venue.submitted_by)
                navigate("scout_profile", venue.submitted_by);
            }}>
            {venue.scout_alias}
          </span>
          {(user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead")&&venue.submitted_by&&
            <span style={{fontSize:11,color:"#bbb"}}>{t("vd.view_picks")}</span>}
        </div>

        <div style={{height:1,background:"#f0f0f0",marginBottom:20}}/>

        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {[["like","👍",t("vd.love_it")],["neutral","😐",t("vd.its_ok")],["dislike","👎",t("vd.not_for_me")]].map(([type,icon,label])=>(
            <button key={type} onClick={()=>submitVote(type)} disabled={!user?.id||votingLoading}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 6px",borderRadius:12,border:"1.5px solid",borderColor:myVote===type?"var(--black)":"#ddd",background:myVote===type?"var(--black)":"white",cursor:user?.id?"pointer":"default",transition:"all .15s"}}>
              <span style={{fontSize:18}}>{icon}</span>
              <span style={{fontFamily:"var(--body)",fontWeight:400,fontSize:11,color:myVote===type?"white":"#888"}}>{label}</span>
              <span style={{fontFamily:"var(--body)",fontWeight:700,fontSize:12,color:myVote===type?"white":"var(--black)"}}>{votes[type]}</span>
            </button>
          ))}
        </div>

        {/* 9. Share + Report */}
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button style={{flex:1,background:"var(--black)",color:"white",border:"none",borderRadius:12,padding:"13px",fontFamily:"var(--body)",fontWeight:600,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}
            onClick={()=>{if(navigator.share){navigator.share({title:venue.name,text:`Check out ${venue.name} on LOKAL'Z`,url:window.location.href});}else{navigator.clipboard?.writeText(window.location.href);showToast(t("venue.link_copied"));}}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            {t("btn.share")}
          </button>
          <button style={{flex:1,background:"transparent",color:"#888",border:"1.5px solid #ddd",borderRadius:12,padding:"13px",fontFamily:"var(--body)",fontWeight:400,fontSize:13,cursor:"pointer"}}
            onClick={()=>setShowReport(true)}>
            {t("venue.report")}
          </button>
        </div>
        {showReport&&(
          <div style={{background:"#FFF8F8",border:"1.5px solid #F8D7DA",borderRadius:16,padding:16,marginBottom:12,animation:"fadeUp .2s ease both"}}>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"#58151C",marginBottom:10}}>{t("vd.report_title")}</div>
            {[["closed",t("vd.report_closed")],["wrong_address",t("vd.report_wrong_addr")],["photos_outdated",t("vd.report_photos")],["other",t("vd.report_other")]].map(([val,label])=>(
              <button key={val} onClick={()=>setReportType(val)}
                style={{display:"block",width:"100%",textAlign:"left",background:reportType===val?"#F8D7DA":"none",border:"1.5px solid",borderColor:reportType===val?"#dc3545":"#ddd",borderRadius:10,padding:"10px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--black)",cursor:"pointer",marginBottom:8}}>
                {label}
              </button>
            ))}
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={submitReport} disabled={!reportType||reportSubmitting}
                style={{flex:1,background:"#58151C",color:"white",border:"none",borderRadius:10,padding:"11px",fontFamily:"var(--body)",fontWeight:400,fontSize:13,cursor:reportType?"pointer":"default",opacity:reportType?1:.5}}>
                {reportSubmitting?t("btn.sending"):t("btn.send_report")}
              </button>
              <button onClick={()=>{setShowReport(false);setReportType("");}}
                style={{background:"#eee",border:"none",borderRadius:10,padding:"11px 16px",fontFamily:"var(--body)",fontWeight:400,fontSize:13,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          </div>
        )}
        {isScout&&(
          <ScoutFeedbackSection venue={venue} user={user} showToast={showToast}/>
        )}

        {/* Similar venues */}
        {(()=>{
          if(!allVenues) return null;
          const active = allVenues.filter(v=>v.status==="active"&&v.id!==venue.id);

          // Score each venue by similarity
          function score(v){
            let s = 0;
            if(v.category===venue.category) s+=10;
            // Restaurant: cuisine match
            if(venue.category==="Restaurant"&&venue.cuisine&&v.cuisine&&
               v.cuisine.toLowerCase()===venue.cuisine.toLowerCase()) s+=8;
            // Bar: subcategory match
            if(venue.category==="Bar"&&venue.subcategory&&v.subcategory&&
               v.subcategory===venue.subcategory) s+=8;
            // Tags overlap
            const venueTags = venue.tags||[];
            const candidateTags = v.tags||[];
            const tagOverlap = venueTags.filter(t=>candidateTags.includes(t)).length;
            s += tagOverlap * 3;
            // Same district bonus
            if(v.district&&venue.district&&v.district===venue.district) s+=2;
            // Same price level
            if((v.price_level||v.price)===(venue.price_level||venue.price)) s+=1;
            return s;
          }

          const similar = active
            .filter(v=>v.category===venue.category) // must be same category
            .map(v=>({...v,_score:score(v)}))
            .sort((a,b)=>b._score-a._score)
            .slice(0,3);

          if(similar.length===0) return null;

          const label = t("vd.more_like");

          return (
            <div style={{marginTop:24}}>
              <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15,color:"var(--black)",marginBottom:12}}>
                {label}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {similar.map(v=>(
                  <button key={v.id} onClick={()=>navigate("venue",v)}
                    style={{display:"flex",alignItems:"center",gap:12,background:"white",border:"1.5px solid #eee",borderRadius:14,padding:"12px 14px",cursor:"pointer",textAlign:"left",width:"100%"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"var(--black)",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.name}</div>
                      <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#888"}}>
                        {v.cuisine&&<span>{tCui(v.cuisine)} · </span>}{t("venue.dist_label")} {v.district} · {v.price_level||v.price||""}
                        {v.is_city_pick&&<span style={{marginLeft:6}}>⭐</span>}
                      </div>
                    </div>
                    <span style={{color:"#ccc",fontSize:18,flexShrink:0}}>›</span>
                  </button>

function ScoutEventsTab({user, allVenues, showToast}) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [form, setForm] = useState({title:"", description:"", event_date:"", event_time:"", venue_id:"", venue_name:""});
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [imgFile, setImgFile] = useState(null);
  const [saving, setSaving] = useState(false);
  const [deletingId, setDeletingId] = useState(null);

  useEffect(()=>{
    supabase.from("events").select("*, venues(name,district)")
      .eq("created_by", user.id).order("created_at",{ascending:false})
      .then(({data})=>{ setEvents(data||[]); setLoading(false); });
  },[]);

  // Venue autocomplete
  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      allVenues.filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||
        (v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch, allVenues]);

  function selectVenue(v){
    setForm(f=>({...f, venue_id:v.id, venue_name:v.name}));
    setVenueSearch(v.name+" · Dist. "+v.district);
    setVenueSuggestions([]);
  }

  async function submitEvent(){
    if(!form.title.trim()) return;
    if(!form.venue_id){ showToast(t("scout.select_venue")); return; }
    if(!form.event_date||!form.event_time){ showToast(t("scout.set_datetime")); return; }
    setSaving(true);
    const event_date = new Date(`${form.event_date}T${form.event_time}`).toISOString();
    const {data, error} = await supabase.from("events").insert({
      city_id: user.city_id,
      created_by: user.id,
      title: form.title.trim(),
      description: form.description.trim()||null,
      event_date,
      venue_id: form.venue_id||null,
      status: "pending",
    }).select("*, venues(name,district)").single();
    if(error){ showToast("Error: "+error.message); setSaving(false); return; }
    if(imgFile && data?.id){
      const ext = imgFile.name.split(".").pop();
      const path = `events/${data.id}/cover.${ext}`;
      const {data: up} = await supabase.storage.from("venue-images").upload(path, imgFile, {upsert:true});
      if(up){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("events").update({cover_image: urlData.publicUrl}).eq("id", data.id);
        data.cover_image = urlData.publicUrl;
      }
    }
    setEvents(e=>[{...data}, ...e]);
    setForm({title:"",description:"",event_date:"",event_time:"",venue_id:"",venue_name:""});
    setVenueSearch("");
    setImgFile(null);
    setShowCreate(false);
    showToast(t("toast.event_submitted"));
    setSaving(false);
  }

  async function deleteEvent(id){
    setDeletingId(id);
    await supabase.from("events").delete().eq("id",id);
    setEvents(e=>e.filter(ev=>ev.id!==id));
    setDeletingId(null);
    showToast(t("scout.event_deleted"));
  }

  const inputStyle = {width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,outline:"none",background:"white",marginBottom:10};

  return (
    <div className="scroll" style={{padding:"14px 20px 80px"}}>
      <button className="btn-black" style={{marginBottom:16}} onClick={()=>setShowCreate(v=>!v)}>
        {showCreate?t("btn.cancel"):t("btn.add_event")}
      </button>

      {showCreate&&(
        <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"#888",letterSpacing:".06em",marginBottom:12}}>{t("ev.new_event")}</div>
          <input placeholder="Event title *" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={inputStyle}/>
          <textarea placeholder="Description" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={2} style={{...inputStyle,resize:"none"}}/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input type="date" value={form.event_date} onChange={e=>setForm(f=>({...f,event_date:e.target.value}))} style={{...inputStyle,flex:1,marginBottom:0}}/>
            <input type="time" value={form.event_time} onChange={e=>setForm(f=>({...f,event_time:e.target.value}))} style={{...inputStyle,flex:1,marginBottom:0}}/>
          </div>
          {/* Venue autocomplete */}

                {deletingId===ev.id?"DELETING...":"🗑 DELETE"}
              </button>
            </div>
          ))
      }
    </div>
  );
}
