function App() {
  const [screen, setScreen] = useState("signin");
  const [appLoading, setAppLoading] = useState(true);
  const [history, setHistory] = useState([]);
  const [selectedVenue, setSelectedVenue] = useState(null);
  const [selectedScout, setSelectedScout] = useState(null);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [pendingInvite, setPendingInvite] = useState(null);
  const [showMenu, setShowMenu] = useState(false);
  const [toast, setToast] = useState(null);
  const [user, setUser] = useState(null);
  const [savedIds, setSavedIds] = useState(new Set());
  const [allVenues, setAllVenues] = useState([]);
  const [venuesLoading, setVenuesLoading] = useState(true);
  const [answers, setAnswers] = useState({});
  const [partner, setPartner] = useState(null);
  const [cities, setCities] = useState([]);

  // Load cities from Supabase
  useEffect(()=>{
    supabase.from("cities").select("id, name").order("name").then(({data})=>{
      if(data) setCities(data);
    });
  },[]);

  // Detect partner slug from URL path
  useEffect(()=>{
    const path = window.location.pathname.replace("/","").trim();
    if(path && path.length > 0){
      supabase.from("partners").select("*").eq("slug", path).single().then(({data})=>{
        if(data) setPartner(data);
      });
    }
  },[]);

  // Load venues from Supabase — only after city is known
  const loadVenues = React.useCallback(async function(cityId){
    setVenuesLoading(true);
    let query = supabase
      .from("venues")
      .select("*")
      .in("status",["active","pending","needs_edit"]);
    if(cityId) query = query.eq("city_id", cityId);
    const {data, error} = await query;
    if(!error && data) setAllVenues(data.map(v=>({
      ...v,
      price: v.price_level,
      why: v.why,
      emoji: "🍽",
      occasions: v.occasions || []
    })));
    setVenuesLoading(false);
  }, []);

  // Reload venues when user city changes
  useEffect(()=>{
    if(!user?.city_id) return;
    loadVenues(user.city_id);
  },[user?.city_id]);

  useEffect(()=>{
    // Safety timeout — max 5 másodperc loading
    const timeout = setTimeout(()=>setAppLoading(false), 5000);

    async function restoreSession(){
      try {
        const {data:{session}} = await supabase.auth.getSession();
        if(session){
          // Email megerősítés ellenőrzés
          if(!session.user.email_confirmed_at){
            await supabase.auth.signOut();
            clearTimeout(timeout);
            setAppLoading(false);
            return;
          }
          const {data:profile} = await supabase.from("users").select("*").eq("id",session.user.id).single();
          // Auto-create profile if doesn't exist (Google auth)
          if(!profile){
            await supabase.from("users").insert({
              id: session.user.id,
              name: session.user.user_metadata?.full_name || session.user.email.split("@")[0],
              email: session.user.email,
              role: "USER"
            });
          }
          // Trial expiry check
          if(profile?.role?.toLowerCase()==="explorer_pro" && profile?.trial_expires_at && new Date(profile.trial_expires_at) < new Date()){
            await supabase.from("users").update({role:"USER"}).eq("id", session.user.id);
            if(profile) profile.role = "USER";
          }
          const u = {
            id: session.user.id,
            name: profile?.name || session.user.user_metadata?.full_name || session.user.email.split("@")[0],
            email: session.user.email,
            role: (()=>{ const r=(profile?.role||"explorer").toLowerCase(); return r==="user"?"explorer":r; })(),
            city_id: profile?.city_id || null,
            badge: profile?.badge || null,
            partner_id: profile?.partner_id || null,
            partner_access_expires_at: profile?.partner_access_expires_at || null,
          };
          setUser(u);
          loadSavedIds(u.id);
          if(partner){
            const hasActiveAccess = u.partner_id && u.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
            setScreen(hasActiveAccess ? "home" : "partner_activate");
          } else {
            setScreen(u.city_id ? "home" : "onboarding");
          }
        }
      } catch(e){
        console.log("Session restore error:", e);
      } finally {
        clearTimeout(timeout);
        setAppLoading(false);
      }
    }

    restoreSession();

    // Trial lejárat ellenőrzés
    async function checkTrialExpiry(userId){
      const {data: u} = await supabase.from("users").select("role, trial_expires_at").eq("id", userId).single();
      if(u?.role==="explorer_pro" && u?.trial_expires_at && new Date(u.trial_expires_at) < new Date()){
        await supabase.from("users").update({role:"USER"}).eq("id", userId);
        return "explorer";
      }
      return null;
    }

    const {data: authListener} = supabase.auth.onAuthStateChange(async (event, session)=>{
      if(event==="SIGNED_OUT"){
        setUser(null);
        setSavedIds(new Set());
        setScreen("signin");
      }
      // Google OAuth callback — csak ha nincs még user betöltve
      if(event==="SIGNED_IN" && session && !appLoading){
        const {data:profile} = await supabase.from("users").select("*").eq("id",session.user.id).single();
        if(!profile){
          await supabase.from("users").insert({
            id: session.user.id,
            name: session.user.user_metadata?.full_name || session.user.email.split("@")[0],
            email: session.user.email,
            role: "USER"
          });
        }
        const u = {
          id: session.user.id,
          name: profile?.name || session.user.user_metadata?.full_name || session.user.email.split("@")[0],
          email: session.user.email,
          role: (()=>{ const r=(profile?.role||"explorer").toLowerCase(); return r==="user"?"explorer":r; })(),
          city_id: profile?.city_id || null,
          badge: profile?.badge || null,
          partner_id: profile?.partner_id || null,
          partner_access_expires_at: profile?.partner_access_expires_at || null,
        };
        setUser(u);
        loadSavedIds(u.id);
        setAppLoading(false);
        if(partner){
          const hasActiveAccess = u.partner_id && u.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
          setScreen(hasActiveAccess ? "home" : "partner_activate");
        } else {
          setScreen(u.city_id ? "home" : "onboarding");
        }
      }
    });

    return ()=>{ authListener?.subscription?.unsubscribe(); };
  },[]);

  function navigate(target, data) {
    if(target===-1||target==="back"){
      setHistory(h=>{
        if(h.length===0){setScreen("home");return h;}
        const prev=h[h.length-1];
        setScreen(prev.screen);
        if(prev.venue) setSelectedVenue(prev.venue);
        if(prev.scout) setSelectedScout(prev.scout);
        if(prev.event) setSelectedEvent(prev.event);
        if(prev.plan) setSelectedPlan(prev.plan);
        return h.slice(0,-1);
      });
      setShowMenu(false);
      return;
    }
    setHistory(h=>[...h,{screen,venue:selectedVenue,scout:selectedScout,event:selectedEvent,plan:selectedPlan}]);
    if(target==="venue"&&data){setSelectedVenue(data);}
    if(target==="scout_profile"&&data){setSelectedScout(data);}
    if(target==="event_detail"&&data){setSelectedEvent(data);}
    if(target==="event_plan_detail"&&data){setSelectedPlan(data);}
    setScreen(target);
    setShowMenu(false);
  }
  function showToastMsg(msg){setToast(msg);setTimeout(()=>setToast(null),3000);}

  async function loadSavedIds(userId){
    const {data, error} = await supabase
      .from("saved_venues")
      .select("venue_id")
      .eq("user_id", userId);
    if(data) setSavedIds(new Set(data.map(r=>r.venue_id)));
  }

  async function toggleSave(id){
    if(!user) return;
    const isSaved = savedIds.has(id);
    if(isSaved){
      setSavedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
      await supabase.from("saved_venues").delete().eq("user_id",user.id).eq("venue_id",id);
    } else {
      setSavedIds(prev=>new Set(prev).add(id));
      await supabase.from("saved_venues").insert({user_id:user.id, venue_id:id});
    }
  }

  function onLogin(u){
    setUser(u);
    if(u?.id) loadSavedIds(u.id);
    // If pending invite → go to event directly
    if(pendingInvite){
      setSelectedPlan(pendingInvite);
      setPendingInvite(null);
      setScreen(u.city_id ? "event_plan_detail" : "onboarding");
      return;
    }
    // If partner context → go to activate screen (or home if already has active access)
    if(partner){
      const hasActiveAccess = u?.partner_id===partner.id && u?.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
      if(hasActiveAccess) setScreen("home");
      else setScreen("partner_activate");
      return;
    }
    // Normal login → home or onboarding
    if(!u.city_id) setScreen("onboarding");
    else setScreen("home");
  }
  async function signOut(){
    await supabase.auth.signOut();
    setUser(null);
    setSavedIds(new Set());
    setAnswers({});
    setHistory([]);
    setSelectedVenue(null);
    setSelectedScout(null);
    setSelectedEvent(null);
    setSelectedPlan(null);
    setScreen("signin");
  }

  const isScout = user?.role==="scout"||user?.role==="city_lead";
  const isPartnerActive = user?.partner_id && user?.partner_access_expires_at && new Date(user.partner_access_expires_at) > new Date();

  // If partner detected in URL and user not logged in → show partner landing
  useEffect(()=>{
    if(partner && screen==="signin"){
      setScreen("partner_landing");
    }
  },[partner]);

  // Pending invite flow
  useEffect(()=>{
    if(!pendingInvite || appLoading) return;
    setSelectedPlan(pendingInvite);
    if(!user){
      // Not logged in → go to signup, plan waiting
      setScreen("signup");
    } else {
      // Logged in → open event directly (free users can also RSVP)
      setScreen("event_plan_detail");
      setPendingInvite(null);
    }
  },[pendingInvite, appLoading, user]);

  const screens = {
    signin: <SignInScreen navigate={navigate} onLogin={onLogin}/>,
    signup: <SignUpScreen navigate={navigate} onLogin={onLogin}/>,
    onboarding: <OnboardingScreen navigate={navigate} user={user} setUser={setUser}/>,
    home: <HomeScreen navigate={navigate} onMenu={()=>setShowMenu(true)} setAnswers={setAnswers} user={user} partner={isPartnerActive ? partner : null} venuesLoading={venuesLoading}/>,
    q1: <Q1Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q2: <Q2Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q3: <Q3Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers} partnerDistrict={isPartnerActive ? partner?.district : null}/>,
    q4: <Q4Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q5: <Q5Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q6: <Q6Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    results: <ResultsScreen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} allVenues={allVenues} partner={isPartnerActive ? partner : null} user={user}/>,
    venue: selectedVenue&&<VenueDetailScreen venue={selectedVenue} navigate={navigate} savedIds={savedIds} toggleSave={toggleSave} showToast={showToastMsg} isScout={isScout} user={user}/>,
    saved: <SavedScreen navigate={navigate} savedIds={savedIds} allVenues={allVenues} onMenu={()=>setShowMenu(true)} user={user}/>,
    scouts: <ScoutsScreen navigate={navigate} onMenu={()=>setShowMenu(true)} user={user}/>,
    all_venues: <AllVenuesScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)}/>,
    scout: <ScoutScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} setAllVenues={setAllVenues} user={user} cities={cities}/>,
    city_lead: <CityLeadScreen navigate={navigate} allVenues={allVenues} setAllVenues={setAllVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} user={user}/>,
    profile: <ProfileScreen navigate={navigate} user={user} setUser={setUser} onMenu={()=>setShowMenu(true)} onSignOut={signOut} cities={cities}/>,
    about: <AboutScreen navigate={navigate}/>,
    upgrade: <UpgradeScreen navigate={navigate} user={user}/>,
    event_calendar: <EventCalendarScreen navigate={navigate} onMenu={()=>setShowMenu(true)} user={user} allVenues={allVenues} showToast={showToastMsg}/>,
    event_detail: selectedEvent&&<EventDetailScreen navigate={navigate} event={selectedEvent} user={user} showToast={showToastMsg}/>,

    event_plan_detail: selectedPlan&&<EventPlanDetailScreen navigate={navigate} plan={selectedPlan} user={user} allVenues={allVenues} showToast={showToastMsg}/>,
    scout_profile: selectedScout&&<ScoutProfileScreen navigate={navigate} scoutId={selectedScout} allVenues={allVenues} savedIds={savedIds} user={user}/>,
    partner_activate: partner&&user&&<PartnerActivateScreen partner={partner} navigate={navigate} user={user} onActivate={u=>{setUser(u);}} showToast={showToastMsg}/>,
    partner_signup: <SignUpScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
    partner_signin: <SignInScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
  };

  return (
    <div style={{width:"100%",height:"100%",position:"relative"}}>
      {appLoading
        ? <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20,background:"var(--bg)"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"40px",color:"var(--red)",lineHeight:.88,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{width:24,height:24,border:"2.5px solid rgba(253,1,0,.2)",borderTop:"2.5px solid var(--red)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          </div>
        : <>
            {screens[screen]||screens.signin}
            {showMenu&&<Menu onClose={()=>setShowMenu(false)} navigate={navigate} role={user?.role||"explorer"} onSignOut={signOut}/>}
            {toast&&<div className="toast">{toast}</div>}
          </>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
