<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Bricolage Grotesque',sans-serif;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#root{width:100%;max-width:430px;height:100dvh;max-height:932px;position:relative;overflow:hidden;background:#F5B8EC;}
@media(max-width:430px){#root{max-height:100dvh;}}

/* TOKENS */
:root{
  --bg: #F5B8EC;
  --red: #FD0100;
  --red-dark: #CC0000;
  --blue: #FD0100;
  --blue-dark: #CC0000;
  --black: #000000;
  --white: #FFFFFF;
  --display: 'Climate Crisis', sans-serif;
  --body: 'Bricolage Grotesque', sans-serif;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideInUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);animation:fadeUp .28s ease both;}

/* LOGO — large on auth screens, medium on inner screens */
.logo{font-family:var(--display);font-size:52px;color:var(--red);line-height:.88;letter-spacing:0;user-select:none;}
.logo-md{font-family:var(--display);font-size:40px;color:var(--red);line-height:.9;letter-spacing:0;user-select:none;}
.logo-white{color:var(--white);}

/* TAGLINE */
.tagline{font-family:var(--body);font-weight:400;font-size:17px;color:var(--black);margin-top:8px;line-height:1.3;}

/* SCRIPT TEXT */
.script{font-family:var(--body);font-size:26px;font-weight:600;color:var(--black);}
.script-white{color:var(--white);}
.script-sm{font-size:20px;}

/* INPUTS — blue background, white bold uppercase, pill shape */
.input-field{
  background:var(--white);
  border-radius:50px;
  padding:12px 22px;
  font-family:var(--body);
  font-weight:400;
  font-size:16px;
  color:var(--black);
  width:100%;
  border:1.5px solid var(--black);
  outline:none;
  cursor:text;
  display:block;
}
.input-field::placeholder{color:rgba(0,0,0,.4);font-weight:400;}

/* BUTTONS */
.btn-black{
  background:var(--black);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:12px 28px;
  font-family:var(--body);
  font-weight:400;
  font-size:16px;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s,opacity .12s;
  display:block;
}
.btn-black:active{transform:scale(.97);}

.btn-black-half{
  background:var(--white);
  color:var(--black);
  border:1.5px solid var(--black);
  border-radius:50px;
  padding:18px 20px;
  font-family:var(--body);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  flex:1;
  text-align:center;
  transition:transform .12s;
}
.btn-black-half:active{transform:scale(.97);}

.btn-blue{
  background:var(--red);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:18px 28px;
  font-family:var(--body);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s;
  display:block;
}
.btn-blue:active{transform:scale(.97);}

/* OCCASION CARDS — horizontal scroll */
.cards-row{
  display:flex;
  gap:14px;
  padding:0 24px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  padding-bottom:8px;
  flex-shrink:0;
}
.cards-row::-webkit-scrollbar{display:none;}

.occ-card{
  flex-shrink:0;
  width:210px;
  height:260px;
  background:var(--black);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  scroll-snap-align:center;
  transition:transform .15s,opacity .15s,outline .1s;
  position:relative;
  overflow:hidden;
}
.occ-card:active{transform:scale(.97);}
.occ-card.sel{outline:3px solid var(--red);background:#111;}
.occ-card-label{font-family:var(--body);font-size:22px;font-weight:600;color:var(--white);line-height:1.25;position:relative;z-index:1;}

/* SOMETHING ELSE EXPANDED */
.else-card{
  width:210px;
  min-height:260px;
  background:var(--black);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  flex-shrink:0;
  scroll-snap-align:center;
}
.else-item{
  font-family:var(--body);
  font-size:18px;
  font-weight:500;
  color:var(--white);
  padding:10px 6px;
  border-bottom:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:opacity .15s;
  border-radius:8px;
}
.else-item:last-child{border-bottom:none;}
.else-item:active{opacity:.7;}

/* MENU */
.menu-panel{
  position:absolute;inset:0;
  background:var(--black);
  z-index:101;
  animation:fadeIn .22s ease;
  display:flex;flex-direction:column;
  padding:56px 36px 44px;
}
.menu-close{position:absolute;top:24px;right:28px;background:none;border:none;color:rgba(255,255,255,.7);font-size:32px;cursor:pointer;font-weight:200;line-height:1;}
.menu-item{
  font-family:var(--body);
  font-weight:700;
  font-size:40px;
  color:var(--white);
  padding:10px 0;
  cursor:pointer;
  transition:opacity .15s;
  line-height:1.1;
}
.menu-item:active{opacity:.6;}
.menu-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.menu-bottom-item{font-family:var(--body);font-weight:700;font-size:14px;color:rgba(255,255,255,.55);cursor:pointer;transition:color .15s;}
.menu-bottom-item:active{color:var(--white);}

/* HAMBURGER */
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:6px;}
.hamburger span{display:block;width:28px;height:2.5px;background:var(--black);border-radius:2px;}

/* OPTION BUTTONS (location, budget, etc) */
.opt-btn{
  background:var(--white);
  border:1.5px solid rgba(0,0,0,.2);
  border-radius:16px;
  padding:18px 22px;
  font-family:var(--body);
  font-weight:500;
  font-size:16px;
  color:var(--black);
  cursor:pointer;
  width:100%;
  text-align:left;
  transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;
}
.opt-btn.sel{background:var(--black);color:var(--white);border-color:var(--black);}
.opt-btn:active{transform:scale(.98);}
.opt-check{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-check.on{background:var(--black);border-color:var(--black);}
.opt-check.on::after{content:'✓';font-size:12px;color:var(--white);font-weight:700;}

/* VENUE CARDS */
.venue-card{
  background:#FFFFFF;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s;
  margin-bottom:14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}
.venue-card:active{transform:scale(.98);}
.venue-img{width:100%;height:170px;background:var(--black);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;}
.venue-body{padding:16px 18px;}
.venue-name{font-family:var(--body);font-weight:700;font-size:20px;color:var(--black);margin-bottom:5px;}
.venue-meta{font-family:var(--body);font-size:13px;color:#666;font-weight:400;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.venue-tag{display:inline-block;background:#F0D8EC;color:#000;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}
.tab{flex:1;padding:14px 6px;font-family:var(--body);font-size:13px;font-weight:600;color:rgba(0,0,0,.35);background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;text-transform:uppercase;letter-spacing:.04em;transition:all .15s;}
.tab.on{color:var(--black);border-bottom-color:var(--black);}

/* MISC */
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0;flex-shrink:0;}
.back-btn{background:none;border:none;font-size:32px;color:var(--black);cursor:pointer;padding:0;line-height:1;font-weight:300;}
.text-link{font-family:var(--body);font-size:14px;font-weight:700;color:var(--black);text-decoration:underline;cursor:pointer;}
.text-link-blue{color:var(--red);}
.divider{height:1px;background:rgba(0,0,0,.1);margin:4px 0;}
.empty{text-align:center;padding:48px 20px;color:#888;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.toast{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--white);padding:13px 26px;border-radius:50px;font-family:var(--body);font-size:14px;font-weight:600;letter-spacing:.02em;animation:popIn .25s ease both;white-space:nowrap;z-index:300;}
.status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.04em;font-family:var(--body);}
.pill-pending{background:#FFF3CD;color:#856404;}
.pill-active{background:#D1E7DD;color:#0A3622;}
.pill-rejected{background:#F8D7DA;color:#58151C;}
.pill-needs_edit{background:#CFF4FC;color:#055160;}
.admin-card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.input-wrap-light{background:var(--white);border:1.5px solid rgba(0,0,0,.15);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;width:100%;}
.input-wrap-light input{border:none;outline:none;background:transparent;font-family:var(--body);font-size:15px;font-weight:400;color:var(--black);flex:1;}
.input-wrap-light input::placeholder{color:rgba(0,0,0,.3);}
.prog-dots{display:flex;gap:7px;justify-content:center;padding:10px 0 4px;}
.prog-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.13);transition:all .2s;}
.prog-dot.on{background:var(--black);width:24px;border-radius:5px;}

/* DARK MODE — disabled in new design */

</head>

function SignInScreen({navigate, onLogin}) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  async function go() {
    if(!email||!pw) return;
    setLoading(true);
    setError(null);
    try {
      const {data, error} = await supabase.auth.signInWithPassword({email, password:pw});
      if(error) throw error;
      if(!data.user.email_confirmed_at) {
        await supabase.auth.signOut();
        throw new Error("Please confirm your email before signing in. Check your inbox.");
      }
      const {data: profile} = await supabase.from("users").select("*").eq("id", data.user.id).single();
      const u = {
        id: data.user.id,
        name: profile?.name || email.split("@")[0],
        email: data.user.email,
        role: profile?.role?.toLowerCase() || "user",
        city_id: profile?.city_id || null,
        badge: profile?.badge || null,
      };
      onLogin(u);
      // navigation handled by onLogin

      setError(e.message || "Sign in failed. Check your email and password.");

function SignUpScreen({navigate, onLogin}) {

  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [success,setSuccess]=useState(false);

  async function go() {
    if(!name||!email||!pw) return setError("Please fill in all required fields.");
    if(pw!==pw2) return setError("Passwords don't match.");
    if(pw.length<6) return setError("Password must be at least 6 characters.");
    setLoading(true);
    setError(null);
    try {
      const {data, error} = await supabase.auth.signUp({email, password:pw});
      if(error) throw error;
      // Create user profile
      await supabase.from("users").insert({
        id: data.user.id,
        name,
        email,
        role: "USER"
      });
      setSuccess(true);

      setError(e.message || "Sign up failed. Please try again.");

function OnboardingScreen({navigate, user, setUser}) {
  const isScout = user?.role==="scout"||user?.role==="city_lead";
  const [step, setStep] = useState(1); // 1 = city, 2 = badge (scouts only)
  const [city, setCity] = useState(null);
  const [badge, setBadge] = useState(null);
  const [saving, setSaving] = useState(false);
  const [citiesList, setCitiesList] = useState([]);

  useEffect(()=>{
    supabase.from("cities").select("id,name").order("name").then(({data})=>{
      if(data) setCitiesList(data);
    });
  },[]);

  async function goNext(){
    if(step===1){
      if(!city) return;
      if(isScout){ setStep(2); return; }
      // non-scout: save city and go home
      await saveAndNavigate(city, null);
      return;
    }
    // step 2: badge
    await saveAndNavigate(city, badge);
  }

  async function saveAndNavigate(selectedCity, selectedBadge){
    setSaving(true);
    const found = citiesList.find(c=>c.name===selectedCity);
    const updates = { city_id: found?.id||null };
    if(selectedBadge) updates.badge = selectedBadge;
    if(found && user?.id){
      await supabase.from("users").update(updates).eq("id", user.id);
      setUser(u=>({...u, city_id: found.id, city: selectedCity, badge: selectedBadge}));
    }
    setSaving(false);
    navigate("home");
  }

  const displayCities = citiesList.length>0 ? citiesList.map(c=>c.name) : CITIES;

  // Step 1: City pick
  if(step===1) return (
    <div className="screen" style={{padding:"48px 28px 48px",justifyContent:"space-between"}}>
      <div>
        <div className="logo">Lokal'z</div>
        <div style={{marginTop:32}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)"}} style={{marginBottom:4}}>Welcome!</div>
          <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:600,color:"#555",lineHeight:1.5}}>
            Pick your city to get started.
          </div>
        </div>
        {isScout&&(
          <div style={{display:"flex",gap:6,marginTop:16}}>
            {[1,2].map(s=>(
              <div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?"var(--red)":"rgba(0,0,0,.15)"}}/>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {displayCities.map(c=>(
          <button key={c} className={`opt-btn${city===c?" sel":""}`} onClick={()=>setCity(c)}>
            {c}
            <div className={`opt-check${city===c?" on":""}`}/>
          </button>
        ))}
      </div>
      <button className="btn-black" onClick={goNext} style={{opacity:city?1:.4}}>
        {isScout ? "next →" : (saving?"saving...":"let's go →")}
      </button>
    </div>
  );

  // Step 2: Badge pick (scouts only)
  return (
    <div className="screen" style={{padding:"48px 28px 48px",justifyContent:"space-between"}}>
      <div>
        <div className="logo">Lokal'z</div>
        <div style={{marginTop:32}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)"}} style={{marginBottom:4}}>Your scout badge</div>
          <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:600,color:"#555",lineHeight:1.5}}>
            Pick the one that fits you best. This shows on every place you add.
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:16}}>
          {[1,2].map(s=>(
            <div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?"var(--red)":"rgba(0,0,0,.15)"}}/>
          ))}
        </div>
      </div>
      <div className="scroll" style={{flex:1,padding:"16px 0",display:"flex",flexDirection:"column",gap:10}}>
        {SCOUT_BADGES.map(b=>(
          <button key={b.id} className={`opt-btn${badge===b.id?" sel":""}`} onClick={()=>setBadge(b.id)}
            style={{padding:"16px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:24}}>{b.emoji}</span>
              <div>
                <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,letterSpacing:".02em"}}>{b.id}</div>
                <div style={{fontFamily:"var(--body)",fontWeight:600,fontSize:12,opacity:.65,marginTop:1}}>{b.desc}</div>
              </div>
            </div>
            <div className={`opt-check${badge===b.id?" on":""}`}/>
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:10,flexShrink:0,paddingTop:8}}>
        <button onClick={()=>setStep(1)} style={{background:"none",border:"2px solid rgba(0,0,0,.2)",borderRadius:50,padding:"18px 22px",fontFamily:"var(--display)",fontWeight:800,fontSize:15,cursor:"pointer",color:"var(--black)"}}>←</button>
        <button className="btn-black" onClick={goNext} style={{flex:1,opacity:badge?1:.4}}>
          {saving?"saving...":"let's go →"}
        </button>
      </div>
    </div>
  );

// Capacity matching — "2 főre keresek" → Up to 6, Up to 8, 8+ is megfelelő
function capacityMatches(venueCapacity, searchGroup) {
  if(!venueCapacity || !searchGroup) return true;
  const order = ["2", "Up to 6", "Up to 8", "8+"];
  const vIdx = order.indexOf(venueCapacity);
  const sIdx = order.indexOf(searchGroup);
  if(vIdx === -1 || sIdx === -1) return true;
  return vIdx >= sIdx; // venue kapacitása >= keresett csoport
}

function ResultsScreen({navigate, onMenu, answers, allVenues, partner, user}) {
  const BATCH=5;
  const active = allVenues.filter(v=>v.status==="active");
  const filtered = active.filter(v=>{
    // 1. Occasions — legalább egy egyezzen
    if(answers.occasions?.length>0 && !answers.occasions.some(o=>(v.occasions||[]).includes(o))) return false;
    // 2. Budget — pontos egyezés
    if(answers.budget && (v.price_level||v.price||"").trim()!==answers.budget.trim()) return false;
    // 3. Cuisines — legalább egy egyezzen
    if(answers.cuisines?.length>0 && v.cuisine && !answers.cuisines.some(c=>v.cuisine.toLowerCase().includes(c.toLowerCase()))) return false;
    // 4. Group / capacity
    if(answers.group && !capacityMatches(v.capacity, answers.group)) return false;
    // 5. Terrace
    if(answers.terrace===true && !v.terrace) return false;
    // 6. District/location
    if(answers.locations?.length>0 && !answers.locations.includes("Anywhere in Budapest") && !answers.locations.includes("near me")) {
      const vDist = "District "+v.district+".";
      if(!answers.locations.some(l=>l===vDist)) return false;
    }
    // 7. Dietary
    if(answers.dietary?.length>0) {
      if(!answers.dietary.some(d=>(v.dietary||[]).includes(d))) return false;
    }
    // whySearch: kizáró szűrő — csak ha az AI kinyerte (vibe/mood ami más szűrőbe nem fért)
    if(answers.whySearch&&answers.whySearch.trim()) {
      const wq=answers.whySearch.toLowerCase();
      if(!(v.why||"").toLowerCase().includes(wq)&&!(v.name||"").toLowerCase().includes(wq)) return false;
    }
    // Partner district bias — partner kerülete előnybe kerül de nem kizáró szűrő
    return true;
  });
  // Partner district: partner kerületéből való venue-k kerüljenek előre
  const partnerDistrict = answers.partnerDistrict || partner?.district;
  const whyQ = answers.whySearch?.toLowerCase();
  const sorted = [...filtered].sort((a,b)=>{
    // whySearch egyezés előre kerül
    if(whyQ) {
      const aWhy = (a.why||"").toLowerCase().includes(whyQ)||(a.name||"").toLowerCase().includes(whyQ);
      const bWhy = (b.why||"").toLowerCase().includes(whyQ)||(b.name||"").toLowerCase().includes(whyQ);
      if(aWhy && !bWhy) return -1;
      if(!aWhy && bWhy) return 1;
    }
    // Partner district előre kerül
    if(partnerDistrict) {
      const aMatch = a.district===partnerDistrict ? -1 : 1;
      const bMatch = b.district===partnerDistrict ? -1 : 1;
      return aMatch - bMatch;
    }
    return 0;
  });
  const pool = shuffle(sorted.length>0?sorted:active);
  const [shown,setShown]=useState(pool.slice(0,BATCH));
  const [page,setPage]=useState(1);
  const noMore=page*BATCH>=pool.length;

  // Save partner analytics on first render
  useEffect(()=>{
    if(!partner?.id) return;
    supabase.from("partner_searches").insert({
      partner_id: partner.id,
      user_id: user?.id||null,
      query: answers.aiQuery||null,
      occasions: answers.occasions||null,
      cuisines: answers.cuisines||null,
      budget: answers.budget||null,
      group_size: answers.group||null,
      results_count: pool.length,
    });
  },[]);

  function showMore(){
    const next=pool.slice(page*BATCH,(page+1)*BATCH);
    setShown(p=>[...p,...next]);
    setPage(p=>p+1);
  }

  return (
    <div className="screen" style={{padding:"20px 0 0"}}>
      <div style={{padding:"20px 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <Hamburger onClick={onMenu}/>
        <div/>
      </div>
      <div style={{padding:"8px 24px 12px"}}>
        <div style={{fontFamily:"var(--display)",fontSize:"52px",color:"var(--red)",lineHeight:.88,letterSpacing:0,userSelect:"none"}}>LOKAL'Z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:16,color:"var(--black)",marginTop:6}}>Beyond the obvious.</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:12}}>our picks for you</div>
      </div>
      <div className="scroll" style={{padding:"0 20px"}}>
        {shown.length===0&&(
          <div className="empty">
            <div className="empty-icon">😕</div>
            <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:600,color:"#777",lineHeight:1.6}}>
              No venues matched your filters.<br/>Try different options!
            </div>
            <button className="btn-blue" style={{marginTop:20,width:"auto",padding:"14px 28px"}} onClick={()=>navigate("q1")}>
              START OVER
            </button>
          </div>
        )}
        {shown.map((v,i)=>(
          <div key={v.id} style={{animation:`fadeUp .3s ${Math.min(i,.4)*0.07}s ease both`,opacity:0,animationFillMode:"forwards"}}>
            <VenueCard venue={v} onClick={()=>navigate("venue",v)}/>
          </div>
        ))}
        {shown.length>0&&!noMore&&(
          <button className="btn-blue" style={{marginBottom:16,borderRadius:14}} onClick={showMore}>
            SHOW ME MORE ↻
          </button>
        )}
        {noMore&&shown.length>0&&(
          <div style={{textAlign:"center",color:"#888",fontFamily:"var(--body)",fontSize:13,fontWeight:600,marginBottom:16}}>
            That's all! <span className="text-link text-link-blue" onClick={()=>navigate("q1")}>Start over</span>
          </div>
        )}
      </div>
    </div>
  );
}

function ScoutFeedbackSection({venue, user, showToast}) {
  const [existing, setExisting] = useState(null);
  const [counts, setCounts] = useState({still_recommended:0, needs_review:0, report_closed:0});
  const [submitting, setSubmitting] = useState(false);

  useEffect(()=>{
    // Load own feedback
    if(user?.id){
      supabase.from("venue_feedback")
        .select("*")
        .eq("venue_id", venue.id)
        .eq("scout_id", user.id)
        .single()
        .then(({data})=>{ if(data) setExisting(data); });
    }
    // Load counts
    supabase.from("venue_feedback")
      .select("feedback_type")
      .eq("venue_id", venue.id)
      .then(({data})=>{
        if(data){
          const c={still_recommended:0,needs_review:0,report_closed:0};
          data.forEach(r=>{ if(c[r.feedback_type]!==undefined) c[r.feedback_type]++; });
          setCounts(c);
        }
      });
  },[venue.id, user?.id]);

  async function submitFeedback(type){
    if(!user?.id) return;
    if(existing?.feedback_type === type) return; // már ki van választva
    setSubmitting(true);
    const prevType = existing?.feedback_type;
    if(existing){
      const {error} = await supabase.from("venue_feedback").update({feedback_type:type}).eq("id",existing.id);
      if(!error){
        setExisting(e=>({...e,feedback_type:type}));
        setCounts(c=>({...c,[prevType]:c[prevType]-1,[type]:c[type]+1}));
      }
    } else {
      const {data,error} = await supabase.from("venue_feedback").insert({
        venue_id: venue.id,
        scout_id: user.id,
        feedback_type: type
      }).select().single();
      if(!error){
        setExisting(data);
        setCounts(c=>({...c,[type]:c[type]+1}));
      }
    }
    setSubmitting(false);
    showToast("Feedback submitted ✓");
  }

  const options = [
    {type:"still_recommended", label:"Still recommended", icon:"✅"},
    {type:"needs_review", label:"Needs review", icon:"⚠️"},
    {type:"report_closed", label:"Report closed", icon:"🚫"},
  ];

  return (
    <div style={{background:"#F5F5F5",borderRadius:16,padding:16,marginTop:4}}>
      <div style={{fontFamily:"var(--display)",fontSize:13,fontWeight:800,color:"var(--red)",letterSpacing:".06em",marginBottom:10}}>SCOUT FEEDBACK</div>
      {options.map(o=>(
        <button key={o.type} onClick={()=>!submitting&&submitFeedback(o.type)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"space-between",
            background:existing?.feedback_type===o.type?"var(--red)":"none",
            color:existing?.feedback_type===o.type?"white":"var(--black)",
            border:"1.5px solid",
            borderColor:existing?.feedback_type===o.type?"var(--red)":"#ddd",
            borderRadius:10,padding:"10px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8,transition:"all .15s"}}>
          <span>{o.icon} {o.label}</span>
          <span style={{background:existing?.feedback_type===o.type?"rgba(255,255,255,.25)":"#e0e0e0",borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:800,color:existing?.feedback_type===o.type?"white":"#555"}}>
            {counts[o.type]}
          </span>
        </button>
      ))}
      {existing&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:4}}>Last updated: {new Date(existing.created_at).toLocaleDateString()}</div>}
    </div>
  );
}

function VenueDetailScreen({venue, navigate, savedIds, toggleSave, showToast, isScout, user}) {
  const [imgIdx,setImgIdx]=useState(0);
  const [images,setImages]=useState([]);
  const [showReport,setShowReport]=useState(false);
  const [reportType,setReportType]=useState("");
  const [reportSubmitting,setReportSubmitting]=useState(false);
  const saved=savedIds.has(venue.id);

  async function submitReport(){
    if(!reportType) return;
    setReportSubmitting(true);
    const {error} = await supabase.from("venue_reports").insert({
      venue_id: venue.id,
      user_id: user?.id||null,
      report_type: reportType
    });
    setReportSubmitting(false);
    if(error){
      console.log("Report error:", error);
      showToast("Error: " + error.message);
      return;
    }
    setShowReport(false);
    setReportType("");
    showToast("Report sent ✓ Thank you!");
  }

  useEffect(()=>{
    supabase.from("venue_images").select("url").eq("venue_id",venue.id).order("sort_order").then(({data})=>{
      if(data&&data.length>0) setImages(data.map(d=>d.url));
    });
  },[venue.id]);

  const grads={
    "Wine bar":"linear-gradient(160deg,#1a0a2e,#000000)",
    "Hungarian":"linear-gradient(160deg,#8B0000,#222)",
    "Bar":"linear-gradient(160deg,#111,#000)",
    "Coffee":"linear-gradient(160deg,#3B2010,#111)",
    "Fine dining":"linear-gradient(160deg,#111,#000)",
    default:"linear-gradient(160deg,#111,#000)",
  };

  const touchStartX = React.useRef(null);

  return (
    <div className="screen">
      <div style={{width:"100%",aspectRatio:"1/1",background:images.length>0?"#111":grads[venue.cuisine]||grads.default,flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",fontSize:72,overflow:"hidden"}}
        onTouchStart={e=>{ touchStartX.current = e.touches[0].clientX; }}
        onTouchEnd={e=>{
          if(touchStartX.current===null||images.length<=1) return;
          const diff = touchStartX.current - e.changedTouches[0].clientX;
          if(Math.abs(diff)>40){
            setImgIdx(i=> diff>0 ? (i+1)%images.length : (i-1+images.length)%images.length);
          }
          touchStartX.current = null;
        }}>
        {images.length>0
          ?<img src={images[imgIdx]} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<span>🍽</span>
        }
        {images.length>1&&(
          <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
            {images.map((_,i)=>(
              <div key={i} onClick={()=>setImgIdx(i)} style={{width:6,height:6,borderRadius:"50%",background:i===imgIdx?"white":"rgba(255,255,255,.5)",cursor:"pointer"}}/>
            ))}
          </div>
        )}
        <button className="back-btn" style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.4)",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:22}} onClick={()=>navigate(-1)}>‹</button>
        <button onClick={()=>{toggleSave(venue.id);showToast(saved?"removed":"saved ♥");}}
          style={{position:"absolute",top:16,right:16,background:"rgba(0,0,0,.4)",border:"none",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,color:saved?"#F97B30":"white"}}>
          {saved?"♥":"♡"}
        </button>
      </div>
      <div className="scroll" style={{padding:"20px 24px"}}>
        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:28,color:"var(--black)",marginBottom:6,letterSpacing:".02em"}}>{venue.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          <span className="venue-tag">{venue.cuisine}</span>
          <span className="venue-tag">Dist. {venue.district}</span>
          <span className="venue-tag">{venue.price}</span>
          {venue.terrace&&<span className="venue-tag">🌿 Terrace</span>}

        <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#444",lineHeight:1.7,marginBottom:4}}>{venue.why}</div>
        {venue.is_city_pick&&(user?.role==="premium"||user?.role==="scout"||user?.role==="city_lead")&&(

              cursor:(user?.role==="premium"||user?.role==="scout"||user?.role==="city_lead")?"pointer":"default",
              fontWeight:700}}

                navigate("scout_profile", venue.submitted_by);

        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
          {[
            ["📍","Google Maps", venue.google_maps_url],
            ["🗺","Apple Maps", venue.apple_maps_url||venue.google_maps_url],
            ["📸","Instagram", venue.instagram_url],
            ["🍽","Reservation", venue.reservation_url]
          ].filter(([,,url])=>url).map(([ico,label,url])=>(
            <button key={label}
              onClick={()=>window.open(url,"_blank")}
              style={{background:"var(--white)",border:"2px solid #ddd",borderRadius:12,padding:"12px 8px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,color:"var(--black)",cursor:"pointer",letterSpacing:".03em",transition:"all .15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--red)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#ddd"}>
              {ico} {label}

          ))}

          <div style={{background:"#FFF8F8",border:"1.5px solid #F8D7DA",borderRadius:16,padding:16,marginBottom:12,animation:"fadeUp .2s ease both"}}>

            {[["closed","This place is closed"],["wrong_address","Wrong address"],["photos_outdated","Photos are outdated"],["other","Other issue"]].map(([val,label])=>(

                {label}

            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button onClick={submitReport} disabled={!reportType||reportSubmitting}

        )}
        {isScout&&(

      </div>

  );

function AllVenuesScreen({navigate, allVenues, onMenu}) {
  const [search,setSearch]=useState("");
  const [category,setCategory]=useState("");
  const [occasion,setOccasion]=useState("");
  const [cuisine,setCuisine]=useState("");
  const [budget,setBudget]=useState("");
  const [district,setDistrict]=useState("");
  const [terrace,setTerrace]=useState("");

  const CATEGORIES = ["Restaurant","Café","Bar","Brunch","Street food","Bakery","Other"];
  const isFoodOccasion = FOOD_OCCASIONS.includes(occasion);
  const allOccasions = [...OCCASIONS.filter(o=>o.id!=="Something else...").map(o=>o.id), ...ELSE_OPTIONS];

  const active=allVenues.filter(v=>v.status==="active");
  const filtered=active.filter(v=>{
    if(search){
      const q=search.toLowerCase();
      const inName=(v.name||"").toLowerCase().includes(q);
      const inWhy=(v.why||"").toLowerCase().includes(q);
      const inCuisine=(v.cuisine||"").toLowerCase().includes(q);
      if(!inName&&!inWhy&&!inCuisine) return false;
    }
    if(category&&v.category!==category) return false;
    if(occasion&&!(v.occasions||[]).includes(occasion)) return false;
    if(cuisine&&v.cuisine!==cuisine) return false;
    if(budget&&(v.price_level||v.price||"").trim()!==budget.trim()) return false;
    if(district&&v.district!==district.replace("District ","").replace(".","")) return false;
    if(terrace==="yes"&&!v.terrace) return false;
    if(terrace==="no"&&v.terrace) return false;
    return true;
  });
  const sorted=[...filtered].sort((a,b)=>a.name.localeCompare(b.name));
  const selectStyle={background:"var(--white)",border:"1.5px solid #ddd",borderRadius:12,padding:"11px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:14,cursor:"pointer",outline:"none",width:"100%"};

  return (
    <div className="screen">
      <div className="hdr"><Hamburger onClick={onMenu}/><div/></div>
      <div style={{padding:"12px 24px 16px"}}>
        <div className="logo-md">Lokal'z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)"}} style={{marginTop:6}}>All venues</div>
      </div>
      <div style={{padding:"0 20px 12px",display:"flex",flexDirection:"column",gap:10}}>
        <div className="input-wrap-light">
          <span style={{color:"#888"}}>🔍</span>
          <input placeholder="Search venue..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <select value={category} onChange={e=>{setCategory(e.target.value);setCuisine("");}} style={{...selectStyle,color:category?"var(--red)":"#888"}}>
            <option value="">All categories</option>
            {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select value={occasion} onChange={e=>{setOccasion(e.target.value);setCuisine("");}} style={{...selectStyle,color:occasion?"var(--red)":"#888"}}>
            <option value="">All occasions</option>
            {allOccasions.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        {category==="Restaurant"&&(
          <select value={cuisine} onChange={e=>setCuisine(e.target.value)} style={{...selectStyle,color:cuisine?"var(--red)":"#888",animation:"fadeUp .2s ease both"}}>
            <option value="">All cuisines</option>
            {CUISINES_FILTER.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        )}
        <div style={{display:"flex",gap:10}}>
          <select value={budget} onChange={e=>setBudget(e.target.value)} style={{...selectStyle,color:budget?"var(--red)":"#888"}}>
            <option value="">All prices</option>
            {BUDGETS.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
          <select value={district} onChange={e=>setDistrict(e.target.value)} style={{...selectStyle,color:district?"var(--red)":"#888"}}>
            <option value="">All districts</option>
            {ALL_DISTRICTS.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <select value={terrace} onChange={e=>setTerrace(e.target.value)} style={{...selectStyle,color:terrace?"var(--red)":"#888"}}>
          <option value="">Terrace: any</option>
          <option value="yes">🌿 Has terrace</option>
          <option value="no">🏠 Indoor only</option>
        </select>
      </div>
      <div className="scroll" style={{padding:"0 20px"}}>
        {sorted.length===0
          ?<div className="empty"><div className="empty-icon">🍽</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No venues found</div></div>
          :sorted.map(v=><VenueCard key={v.id} venue={v} onClick={()=>navigate("venue",v)}/>)
        }
      </div>
    </div>
  );
}

function ScoutEventsTab({user, allVenues, showToast}) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [form, setForm] = useState({title:"", description:"", event_date:"", event_time:"", venue_id:"", venue_name:""});
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [imgFile, setImgFile] = useState(null);
  const [saving, setSaving] = useState(false);
  const [deletingId, setDeletingId] = useState(null);

  useEffect(()=>{
    supabase.from("events").select("*, venues(name,district)")
      .eq("created_by", user.id).order("created_at",{ascending:false})
      .then(({data})=>{ setEvents(data||[]); setLoading(false); });
  },[]);

  // Venue autocomplete
  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      allVenues.filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||
        (v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch, allVenues]);

  function selectVenue(v){
    setForm(f=>({...f, venue_id:v.id, venue_name:v.name}));
    setVenueSearch(v.name+" · Dist. "+v.district);
    setVenueSuggestions([]);
  }

  async function submitEvent(){
    if(!form.title.trim()) return;
    if(!form.venue_id){ showToast("Please select a venue"); return; }
    if(!form.event_date||!form.event_time){ showToast("Please set a date and time"); return; }
    setSaving(true);
    const event_date = new Date(`${form.event_date}T${form.event_time}`).toISOString();
    const {data, error} = await supabase.from("events").insert({
      city_id: user.city_id,
      created_by: user.id,

      {loading

        :events.length===0

            <div key={ev.id} className="admin-card" style={{marginBottom:10}}>

                <StatusPill status={ev.status}/>
              </div>
              {ev.venues&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600}}>📍 {ev.venues.name}</div>}

                {deletingId===ev.id?"DELETING...":"🗑 DELETE"}
              </button>
            </div>
          ))
      }
    </div>
  );
}

function ScoutScreen({navigate, allVenues, onMenu, showToast, setAllVenues, user, cities}) {
  const [tab,setTab]=useState("all");
  const [search,setSearch]=useState("");
  const [editingVenue, setEditingVenue]=useState(null);
  const [editForm, setEditForm]=useState({});
  const [editSubmitting, setEditSubmitting]=useState(false);
  // Only show venues from user's city
  const myVenues=allVenues.filter(v=>(v.submitted_by===user?.id || v.scout_alias===user?.name));
  const filtered=allVenues.filter(v=>(!search||v.name.toLowerCase().includes(search.toLowerCase())));

  function startScoutEdit(v){
    setEditForm({
      name: v.name||"",
      address: v.address||"",
      district: v.district||"",
      category: v.category||"",
      cuisine: v.cuisine||"",
      price_level: v.price_level||v.price||"",
      capacity: v.capacity||"",
      terrace: v.terrace?"yes":"no",
      google_maps_url: v.google_maps_url||"",
      instagram_url: v.instagram_url||"",
      reservation_url: v.reservation_url||"",
      why: v.why||"",
    });
    setEditingVenue(v);
  }

  async function submitScoutEdit(){
    setEditSubmitting(true);
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      cuisine: editForm.cuisine||null,
      price_level: editForm.price_level,
      capacity: editForm.capacity||null,
      terrace: editForm.terrace==="yes",
      google_maps_url: editForm.google_maps_url||null,
      instagram_url: editForm.instagram_url||null,
      reservation_url: editForm.reservation_url||null,
      why: editForm.why,
      status: "pending",
      edit_comment: null,
    }).eq("id", editingVenue.id);
    setEditSubmitting(false);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===editingVenue.id?{...v,...editForm,status:"pending",edit_comment:null,price:editForm.price_level}:v));
    showToast("Resubmitted for review ✓");
    setEditingVenue(null);
    setTab("activity");
  }

  // Add Venue form state
  const [form,setForm]=useState({name:"",address:"",district:"",category:"",cuisine:"",price_level:"",capacity:"",terrace:"",instagram_url:"",reservation_url:"",google_maps_url:"",why:"",city_id:user?.city_id||"",google_place_id:"",latitude:null,longitude:null,dietary:[]});
  const [duplicates, setDuplicates]=useState([]);
  const [checkingDupe, setCheckingDupe]=useState(false);
  const [selOccasions,setSelOccasions]=useState([]);
  const [customOccasion,setCustomOccasion]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [formError,setFormError]=useState(null);
  const [geocoding,setGeocoding]=useState(false);
  const [geocodeResult,setGeocodeResult]=useState(null); // {lat,lng,display_name}
  // Google Places Autocomplete
  const [placeSuggestions,setPlaceSuggestions]=useState([]);
  const [placeSearchVal,setPlaceSearchVal]=useState("");
  const [placeSelected,setPlaceSelected]=useState(false);
  const [loadingPlace,setLoadingPlace]=useState(false);
  const placeSessionToken=React.useRef(null);
  const placeSvc=React.useRef(null);
  const placeDetailSvc=React.useRef(null);

  // Helper: get autocomplete service (lazy init after google loads)
  function getPlaceSvc(){
    if(!window.google?.maps?.places) return null;
    if(!placeSvc.current) placeSvc.current=new window.google.maps.places.AutocompleteService();
    if(!placeDetailSvc.current){
      const mapDiv=document.createElement("div");
      placeDetailSvc.current=new window.google.maps.places.PlacesService(mapDiv);
    }
    if(!placeSessionToken.current) placeSessionToken.current=new window.google.maps.places.AutocompleteSessionToken();
    return placeSvc.current;
  }

  // Debounced place search
  function handlePlaceSearch(val){
    setPlaceSearchVal(val);
    setPlaceSelected(false);
    setF("name",val);
    if(val.trim().length<2){setPlaceSuggestions([]);return;}
    const svc=getPlaceSvc();
    if(!svc){
      // fallback: no google loaded yet, just use regular name field
      setPlaceSuggestions([]);
      return;
    }
    clearTimeout(window._placeTimeout);
    window._placeTimeout=setTimeout(()=>{
      setLoadingPlace(true);
      svc.getPlacePredictions({
        input:val,
        types:["establishment"],
        componentRestrictions:{country:"hu"},
        sessionToken:placeSessionToken.current
      },(preds,status)=>{
        setLoadingPlace(false);
        if(status===window.google.maps.places.PlacesServiceStatus.OK && preds){
          setPlaceSuggestions(preds.slice(0,5));
        } else {
          setPlaceSuggestions([]);
        }
      });
    },350);
  }

  // Budapest district mapping from postal code
  function districtFromPostal(postal){
    const code=parseInt(postal);
    if(!code) return "";
    const map={1011:"I",1012:"I",1013:"I",1014:"I",1015:"I",1016:"I",1021:"II",1022:"II",1023:"II",1024:"II",1025:"II",1026:"II",1027:"II",1028:"II",1029:"II",1031:"III",1032:"III",1033:"III",1034:"III",1035:"III",1036:"III",1037:"III",1038:"III",1039:"III",1041:"IV",1042:"IV",1043:"IV",1044:"IV",1045:"IV",1046:"IV",1047:"IV",1048:"IV",1051:"V",1052:"V",1053:"V",1054:"V",1055:"V",1056:"V",1061:"VI",1062:"VI",1063:"VI",1064:"VI",1065:"VI",1066:"VI",1067:"VI",1068:"VI",1071:"VII",1072:"VII",1073:"VII",1074:"VII",1075:"VII",1076:"VII",1077:"VII",1078:"VII",1081:"VIII",1082:"VIII",1083:"VIII",1084:"VIII",1085:"VIII",1086:"VIII",1087:"VIII",1088:"VIII",1089:"VIII",1091:"IX",1092:"IX",1093:"IX",1094:"IX",1095:"IX",1096:"IX",1097:"IX",1098:"IX",1101:"X",1102:"X",1103:"X",1104:"X",1105:"X",1106:"X",1107:"X",1108:"X",1111:"XI",1112:"XI",1113:"XI",1114:"XI",1115:"XI",1116:"XI",1117:"XI",1118:"XI",1119:"XI",1121:"XII",1122:"XII",1123:"XII",1124:"XII",1125:"XII",1126:"XII",1131:"XIII",1132:"XIII",1133:"XIII",1134:"XIII",1135:"XIII",1136:"XIII",1137:"XIII",1138:"XIII",1139:"XIII",1141:"XIV",1142:"XIV",1143:"XIV",1144:"XIV",1145:"XIV",1146:"XIV",1147:"XIV",1148:"XIV",1149:"XIV",1151:"XV",1152:"XV",1153:"XV",1154:"XV",1158:"XV",1161:"XVI",1162:"XVI",1163:"XVI",1164:"XVI",1165:"XVI",1172:"XVII",1173:"XVII",1174:"XVII",1175:"XVII",1181:"XVIII",1182:"XVIII",1183:"XVIII",1184:"XVIII",1185:"XVIII",1186:"XVIII",1188:"XVIII",1191:"XIX",1192:"XIX",1193:"XIX",1194:"XIX",1195:"XIX",1196:"XIX",1201:"XX",1202:"XX",1203:"XX",1204:"XX",1211:"XXI",1212:"XXI",1213:"XXI",1214:"XXI",1215:"XXI",1221:"XXII",1222:"XXII",1223:"XXII",1224:"XXII",1225:"XXII",1231:"XXIII",1237:"XXIII",1238:"XXIII",1239:"XXIII"};
    return map[code]||"";
  }

  // On place selection: fetch details and fill form
  function selectPlace(pred){
    if(!placeDetailSvc.current) return;
    setPlaceSuggestions([]);
    setLoadingPlace(true);
    const name=pred.structured_formatting?.main_text||pred.description;
    setPlaceSearchVal(name);
    setF("name",name);
    placeDetailSvc.current.getDetails({
      placeId:pred.place_id,
      fields:["name","formatted_address","address_components","url","place_id"],
      sessionToken:placeSessionToken.current
    },(place,status)=>{
      setLoadingPlace(false);
      placeSessionToken.current=null; // reset token after detail fetch
      if(status!==window.google.maps.places.PlacesServiceStatus.OK||!place) return;
      // Extract postal code for district
      const postalComp=place.address_components?.find(c=>c.types.includes("postal_code"));
      const postal=postalComp?.long_name||"";
      const district=districtFromPostal(postal);
      // Build clean address (street + number)
      const route=place.address_components?.find(c=>c.types.includes("route"))?.long_name||"";
      const num=place.address_components?.find(c=>c.types.includes("street_number"))?.long_name||"";
      const cleanAddr=route&&num?`${route} ${num}`:place.formatted_address||"";
      // Google Maps URL
      const mapsUrl=place.url||`https://maps.google.com/?cid=${place.place_id}`;
      setForm(f=>({...f,
        name:place.name||name,
        address:cleanAddr,
        district:district,
        google_maps_url:mapsUrl,
        google_place_id:place.place_id||""
      }));
      setPlaceSearchVal(place.name||name);
      setPlaceSelected(true);
      // Also trigger dupe check on the filled name
      if(place.name&&place.name.trim().length>=2){
        setCheckingDupe(true);
        supabase.from("venues").select("id,name,district,status").ilike("name",`%${place.name.trim()}%`).limit(3).then(({data})=>{
          setDuplicates(data||[]);
          setCheckingDupe(false);
        });
      }
    });
  }

  function setF(k,v){
    setForm(f=>({...f,[k]:v}));
    if(k==="name" && v.trim().length>=2){
      setCheckingDupe(true);
      clearTimeout(window._dupeTimeout);
      window._dupeTimeout = setTimeout(async()=>{
        const {data} = await supabase.from("venues")
          .select("id,name,district,status")
          .ilike("name", `%${v.trim()}%`)
          .limit(3);
        setDuplicates(data||[]);
        setCheckingDupe(false);
      }, 500);
    } else if(k==="name") {
      setDuplicates([]);
    }

  function toggleOcc(o){setSelOccasions(prev=>prev.includes(o)?prev.filter(x=>x!==o):[...prev,o]);}

  function handleImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - imgFiles.length;
    const newFiles = files.slice(0, remaining);
    setImgFiles(prev=>[...prev, ...newFiles]);
    setImgPreviews(prev=>[...prev, ...newFiles.map(f=>URL.createObjectURL(f))]);
  }

  function removeImg(idx){
    setImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setImgPreviews(prev=>prev.filter((_,i)=>i!==idx));

  async function getCoordinates(){
    const query=[form.name,form.address,"Budapest"].filter(Boolean).join(", ");
    if(!form.address){setFormError("Please enter an address first.");return;}
    setGeocoding(true);setGeocodeResult(null);setFormError(null);
    try{
      const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=hu`;
      const res=await fetch(url,{headers:{"Accept-Language":"en","User-Agent":"Lokalz/1.0"}});
      const data=await res.json();
      if(!data||data.length===0){
        setGeocodeResult({error:true});
        setGeocoding(false);
        return;
      }
      const r=data[0];
      const lat=parseFloat(r.lat);
      const lng=parseFloat(r.lon);
      const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(form.name+", "+form.address+", Budapest")}`;
      setGeocodeResult({lat,lng,display_name:r.display_name});
      setF("google_maps_url",mapsUrl);
      setF("latitude",lat);
      setF("longitude",lng);
    }catch(e){
      setGeocodeResult({error:true});
    }
    setGeocoding(false);

      }).select().single();

      if(imgFiles.length>0 && data?.id){

          if(!uploadErr){
            const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
            await supabase.from("venue_images").insert({venue_id:data.id, url:urlData.publicUrl, is_primary:i===0, sort_order:i});
          }

      setGeocodeResult(null);
      setPlaceSearchVal("");
      setPlaceSelected(false);
      setPlaceSuggestions([]);
      setSelOccasions([]);
      setCustomOccasion("");
      setImgFiles([]);

        {[["name","Name *"],["address","Address *"],["district","District *"],["google_maps_url","Google Maps URL"],["instagram_url","Instagram URL"],["reservation_url","Reservation URL"]].map(([k,p])=>(

          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select style={selectStyle} value={editForm.cuisine} onChange={e=>setEditForm(f=>({...f,cuisine:e.target.value}))}>

        </select>

function CityLeadScreen({navigate, allVenues, setAllVenues, onMenu, showToast, user}) {
  const [tab,setTab]=useState("pending");
  const [editComment,setEditComment]=useState({});
  const [showEditFor,setShowEditFor]=useState(null);
  const [editingVenue,setEditingVenue]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [uploadingImg,setUploadingImg]=useState(false);
  const [saving,setSaving]=useState(false);
  const [reports,setReports]=useState([]);
  const [clSearch,setClSearch]=useState("");
  const [pendingEvents,setPendingEvents]=useState([]);

  useEffect(()=>{
    supabase.from("events").select("*, venues(name), users(name)")
      .eq("status","pending").order("created_at",{ascending:false})
      .then(({data})=>{ if(data) setPendingEvents(data); });
  },[]);

  async function approveEvent(id){
    await supabase.from("events").update({status:"active"}).eq("id",id);
    setPendingEvents(p=>p.filter(e=>e.id!==id));
    showToast("Event approved ✓");
  }
  async function rejectEvent(id){
    await supabase.from("events").update({status:"rejected"}).eq("id",id);
    setPendingEvents(p=>p.filter(e=>e.id!==id));
    showToast("Event rejected");
  }

  const CATEGORIES = ["Restaurant","Café","Bar","Brunch","Street food","Bakery","Other"];
  const CAPACITIES = ["2","Up to 6","Up to 8","8+"];

  // City Lead csak a saját városának venue-jait látja
  const cityVenues = user?.city_id
    ? allVenues.filter(v=>v.city_id===user.city_id)
    : allVenues;

  const pending=cityVenues.filter(v=>v.status==="pending"||v.status==="needs_edit"||v.status==="rejected");
  const active=[...cityVenues.filter(v=>v.status==="active")].reverse();

  useEffect(()=>{
    supabase.from("venue_reports")
      .select("*, venues(name)")
      .order("created_at",{ascending:false})
      .then(({data})=>{ if(data) setReports(data); });
  },[]);

  async function sendEmailNotification(type, venueId, editComment=""){
    try {
      const {data: venue} = await supabase.from("venues").select("name, submitted_by").eq("id", venueId).single();
      if(!venue?.submitted_by) return;
      const {data: scout} = await supabase.from("users").select("email").eq("id", venue.submitted_by).single();
      if(!scout?.email) return;
      await supabase.functions.invoke("send-email", {
        body: { type, to: scout.email, venue_name: venue.name, edit_comment: editComment }
      });
    } catch(e) { console.log("Email error:", e); }
  }

  async function updateStatus(id, status){
    const {error} = await supabase.from("venues").update({status}).eq("id", id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===id?{...v,status}:v));
    showToast("Updated: "+status);
    if(status==="active") sendEmailNotification("approved", id);
    if(status==="rejected") sendEmailNotification("rejected", id);
  }

  async function deleteVenue(id){
    const {error} = await supabase.from("venues").delete().eq("id",id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.filter(v=>v.id!==id));
    showToast("Venue deleted ✓");
  }

  async function sendEdit(id){
    const comment=editComment[id]||"";
    const {error} = await supabase.from("venues").update({status:"needs_edit", edit_comment:comment}).eq("id", id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===id?{...v,status:"needs_edit",edit_comment:comment}:v));
    setShowEditFor(null);
    setEditComment(e=>({...e,[id]:""}));
    showToast("Edit request sent ✓");
    sendEmailNotification("needs_edit", id, comment);
  }

  const [editImgFiles, setEditImgFiles] = useState([]);
  const [editImgPreviews, setEditImgPreviews] = useState([]);
  const [existingImages, setExistingImages] = useState([]);

  async function loadExistingImages(venueId){
    const {data} = await supabase.from("venue_images").select("id,url").eq("venue_id",venueId).order("sort_order");
    if(data) setExistingImages(data);
  }

  function handleEditImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - existingImages.length - editImgFiles.length;
    const newFiles = files.slice(0, remaining);
    setEditImgFiles(prev=>[...prev,...newFiles]);
    setEditImgPreviews(prev=>[...prev,...newFiles.map(f=>URL.createObjectURL(f))]);
  }

  function removeEditImg(idx){
    setEditImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setEditImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }

  async function removeExistingImg(img){
    await supabase.from("venue_images").delete().eq("id",img.id);
    setExistingImages(prev=>prev.filter(i=>i.id!==img.id));
  }

  function startEdit(v){
    setEditImgFiles([]);
    setEditImgPreviews([]);
    setExistingImages([]);
    loadExistingImages(v.id);
    setEditForm({
      name: v.name||"",
      address: v.address||"",
      district: v.district||"",
      category: v.category||"",
      cuisine: v.cuisine||"",
      price_level: v.price_level||v.price||"",
      capacity: v.capacity||"",
      terrace: v.terrace?"yes":"no",
      google_maps_url: v.google_maps_url||"",
      instagram_url: v.instagram_url||"",
      reservation_url: v.reservation_url||"",
      why: v.why||"",
      scout_alias: v.scout_alias||"",
      occasions: v.occasions||[],
      is_city_pick: v.is_city_pick||false,
      dietary: v.dietary||[],
      website_url: v.website_url||"",
    });
    setEditingVenue(v);
  }

  async function uploadImage(file, venueId){
    setUploadingImg(true);
    const ext = file.name.split(".").pop();
    const path = `${venueId}/${Date.now()}.${ext}`;
    const {error} = await supabase.storage.from("venue-images").upload(path, file);
    if(error){showToast("Upload error: "+error.message);setUploadingImg(false);return;}
    const {data} = supabase.storage.from("venue-images").getPublicUrl(path);
    await supabase.from("venue_images").insert({venue_id:venueId, url:data.publicUrl, is_primary:true});
    showToast("Image uploaded ✓");
    setUploadingImg(false);
  }

  async function saveEdit(){
    setSaving(true);
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      cuisine: editForm.cuisine||null,
      price_level: editForm.price_level,
      capacity: editForm.capacity||null,
      terrace: editForm.terrace==="yes",
      google_maps_url: editForm.google_maps_url||null,
      instagram_url: editForm.instagram_url||null,
      reservation_url: editForm.reservation_url||null,
      why: editForm.why,
      scout_alias: editForm.scout_alias||null,
      occasions: editForm.customOccasion?.trim() ? [...(editForm.occasions||[]), editForm.customOccasion.trim()] : editForm.occasions||[],
      is_city_pick: editForm.is_city_pick||false,
      dietary: editForm.dietary||[],
      website_url: editForm.website_url||null,
    }).eq("id", editingVenue.id);
    if(error){showToast("Error: "+error.message);setSaving(false);return;}
    // Upload new images
    for(let i=0;i<editImgFiles.length;i++){
      const file = editImgFiles[i];
      const ext = file.name.split(".").pop();
      const path = `${editingVenue.id}/${Date.now()}_${i}.${ext}`;
      const {error: uploadErr} = await supabase.storage.from("venue-images").upload(path, file);
      if(!uploadErr){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("venue_images").insert({venue_id:editingVenue.id, url:urlData.publicUrl, is_primary:existingImages.length===0&&i===0, sort_order:existingImages.length+i});
      }
    }
    setAllVenues(p=>p.map(v=>v.id===editingVenue.id?{...v,...editForm,occasions:editForm.occasions||[],is_city_pick:editForm.is_city_pick||false,dietary:editForm.dietary||[],price:editForm.price_level}:v));
    showToast("Venue updated ✓");
    setSaving(false);
    setEditingVenue(null);
  }

  const inputStyle={width:"100%",background:"var(--white)",border:"1.5px solid #ddd",borderRadius:12,padding:"12px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",marginBottom:10,outline:"none"};
  const selectStyle={...inputStyle,cursor:"pointer"};

  // Edit venue screen
  if(editingVenue) return (
    <div className="screen">
      <div className="hdr">
        <button className="back-btn" onClick={()=>setEditingVenue(null)}>&#8249;</button>
        <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,color:"var(--red)"}}>EDIT VENUE</div>
        <div style={{width:26}}/>
      </div>
      <div className="scroll" style={{padding:"14px 20px"}}>
        {[["name","Name *"],["address","Address *"],["district","District *"],["scout_alias","Scout alias"],
          ["google_maps_url","Google Maps URL"],["instagram_url","Instagram URL"],
          ["reservation_url","Reservation URL"],["website_url","Website URL"]].map(([k,p])=>(
          <input key={k} style={inputStyle} placeholder={p} value={editForm[k]||""} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))}/>
        ))}
        <select style={selectStyle} value={editForm.category||""} onChange={e=>setEditForm(f=>({...f,category:e.target.value}))}>
          <option value="">Category</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select style={selectStyle} value={editForm.cuisine||""} onChange={e=>setEditForm(f=>({...f,cuisine:e.target.value}))}>
          <option value="">Cuisine</option>
          {CUISINES_FILTER.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select style={selectStyle} value={editForm.price_level||""} onChange={e=>setEditForm(f=>({...f,price_level:e.target.value}))}>
          <option value="">Price level *</option>
          {BUDGETS.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
        <select style={selectStyle} value={editForm.capacity||""} onChange={e=>setEditForm(f=>({...f,capacity:e.target.value}))}>
          <option value="">Capacity</option>
          {CAPACITIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select style={selectStyle} value={editForm.terrace||""} onChange={e=>setEditForm(f=>({...f,terrace:e.target.value}))}>
          <option value="">Terrace?</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#FFFFFF",border:"1.5px solid #ddd",borderRadius:12,marginBottom:10,cursor:"pointer"}} onClick={()=>setEditForm(f=>({...f,is_city_pick:!f.is_city_pick}))}>
          <div style={{width:20,height:20,borderRadius:5,border:"2px solid var(--blue)",background:editForm.is_city_pick?"var(--red)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {editForm.is_city_pick&&<span style={{color:"white",fontSize:12,fontWeight:800}}>✓</span>}
          </div>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"var(--black)"}}>⭐ City pick <span style={{color:"#888",fontWeight:600,fontSize:12}}>(Premium only)</span></div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".05em",marginBottom:8}}>OCCASIONS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {["Date night","Dinner with friends","Birthday","Brunch","Lunch","Coffee","Drinks","Late night","Business lunch","Solo","Family"].map(occ=>{
              const sel=(editForm.occasions||[]).includes(occ);
              return <button key={occ} type="button"
                style={{padding:"7px 14px",borderRadius:20,border:"2px solid",fontFamily:"var(--body)",fontWeight:700,fontSize:12,cursor:"pointer",
                  background:sel?"var(--red)":"transparent",color:sel?"var(--white)":"var(--red)",borderColor:"var(--red)"}}
                onClick={()=>setEditForm(f=>{const cur=f.occasions||[];return{...f,occasions:sel?cur.filter(o=>o!==occ):[...cur,occ]};})}
              >{occ}</button>;
            })}
          </div>
          <input style={{...inputStyle,marginTop:8,marginBottom:0}} placeholder="Other occasion... (free text)"
            value={editForm.customOccasion||""} onChange={e=>setEditForm(f=>({...f,customOccasion:e.target.value}))}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".05em",marginBottom:8}}>DIETARY OPTIONS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {DIETARY_OPTIONS.map(d=>{
              const sel=(editForm.dietary||[]).includes(d);
              return <button key={d} type="button"
                style={{padding:"7px 14px",borderRadius:20,border:"2px solid",fontFamily:"var(--body)",fontWeight:700,fontSize:12,cursor:"pointer",
                  background:sel?"var(--red)":"transparent",color:sel?"var(--white)":"var(--red)",borderColor:"var(--red)"}}
                onClick={()=>setEditForm(f=>{const cur=f.dietary||[];return{...f,dietary:sel?cur.filter(x=>x!==d):[...cur,d]};})}
              >{d}</button>;
            })}
          </div>
        </div>
        <textarea style={{...inputStyle,resize:"none",minHeight:100}} placeholder="Why locals go here *" maxLength={280} value={editForm.why||""} onChange={e=>setEditForm(f=>({...f,why:e.target.value}))}/>
        
        {/* Image upload */}
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".05em",marginBottom:8}}>PHOTOS ({existingImages.length + editImgPreviews.length}/5)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
            {existingImages.map((img,i)=>(
              <div key={img.id} style={{position:"relative",aspectRatio:"1",borderRadius:10,overflow:"hidden"}}>

                <img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <button onClick={()=>removeEditImg(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:"50%",width:22,height:22,color:"white",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
            ))}
            {existingImages.length+editImgPreviews.length<5&&(
              <label style={{aspectRatio:"1",borderRadius:10,border:"2px dashed #ddd",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:4}}>
                <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleEditImgSelect}/>
                <span style={{fontSize:24}}>📷</span>
                <span style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#888"}}>Add</span>
              </label>
            )}
          </div>
        </div>

        <button className="btn-blue" style={{borderRadius:14,opacity:saving?0.6:1}} onClick={saveEdit}>
          {saving?"saving...":"SAVE CHANGES"}
        </button>
      </div>
    </div>
  );

  return (
    <div className="screen">
      <div style={{background:"var(--black)",padding:"16px 20px 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <Hamburger onClick={onMenu}/>
          <div style={{fontFamily:"var(--display)",fontSize:"36px",color:"var(--red)",lineHeight:1,letterSpacing:0}}>LOKAL'Z</div>
          <div style={{width:36}}/>
        </div>
        <div style={{textAlign:"right",fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"white",paddingBottom:12}}>city lead</div>
      </div>
      <div style={{display:"flex",gap:0,background:"var(--black)",padding:"10px 20px 12px",flexShrink:0}}>
        {[["pending","pending",pending.length],["all","all",active.length],["events","events",pendingEvents.length],["reports","reports",reports.length],["partners","partners",""]].map(([k,l,c])=>(
          <button key={k} style={{flex:1,background:"none",border:"none",cursor:"pointer",color:tab===k?"white":"rgba(255,255,255,.5)",fontFamily:"var(--body)",fontWeight:400,fontSize:14,paddingBottom:4,borderBottom:tab===k?"2.5px solid white":"2.5px solid transparent"}} onClick={()=>setTab(k)}>
            {l} <span style={{background:"rgba(255,255,255,.2)",borderRadius:10,padding:"1px 6px",fontSize:11}}>{c}</span>

                  </div>

                </div>
                {showEditFor===v.id&&(
                  <div style={{marginBottom:10,animation:"fadeUp .2s ease both"}}>
                    <textarea
                      value={editComment[v.id]||""}
                      onChange={e=>setEditComment(prev=>({...prev,[v.id]:e.target.value}))}
                      placeholder="Describe what needs to be changed..."

                      style={{width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"10px 12px",fontFamily:"var(--body)",fontSize:13,fontWeight:600,resize:"none",outline:"none",marginBottom:6}}
                    />
                    <div style={{display:"flex",gap:8}}>
                      <button style={{flex:1,background:"#FFF3CD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#664D03",cursor:"pointer"}} onClick={()=>sendEdit(v.id)}>Send to scout</button>
                      <button style={{background:"#eee",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#666",cursor:"pointer"}} onClick={()=>setShowEditFor(null)}>Cancel</button>
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginTop:showEditFor===v.id?0:10,flexWrap:"wrap"}}>
                  {v.status!=="rejected"&&<button style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#0A3622",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"active")}>✓ Approve</button>}
                  {showEditFor!==v.id&&v.status!=="rejected"&&<button style={{background:"#FFF3CD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#664D03",cursor:"pointer"}} onClick={()=>setShowEditFor(v.id)}>✏ Request edit</button>}
                  {v.status!=="rejected"&&<button style={{background:"#F8D7DA",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#58151C",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"rejected")}>✕ Reject</button>}
                  {v.status==="rejected"&&<button style={{background:"#58151C",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"white",cursor:"pointer"}} onClick={()=>deleteVenue(v.id)}>🗑 Delete permanently</button>}
                  {v.status==="rejected"&&<button style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#0A3622",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"pending")}>↩ Restore</button>}
                </div>
              </div>
            ))
          }
        </div>
      )}
      {tab==="all"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          <div className="input-wrap-light" style={{marginBottom:12}}>
            <span style={{color:"#888",fontSize:16}}>🔍</span>
            <input placeholder="Search venue..." value={clSearch} onChange={e=>setClSearch(e.target.value)}
              style={{border:"none",outline:"none",background:"transparent",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",flex:1}}/>
            {clSearch&&<button onClick={()=>setClSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:16}}>✕</button>}
          </div>
          {active
            .filter(v=>!clSearch||v.name.toLowerCase().includes(clSearch.toLowerCase())||v.cuisine?.toLowerCase().includes(clSearch.toLowerCase())||v.district?.toLowerCase().includes(clSearch.toLowerCase()))
            .map(v=>(
            <div key={v.id} className="admin-card" style={{marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{flex:1,marginRight:8}}>
                  <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{v.name}</div>
                  <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>
                    {v.cuisine} · Dist. {v.district} · {v.price_level||v.price}
                    {v.terrace&&<span style={{marginLeft:6}}>🌿</span>}
                    {v.is_city_pick&&<span style={{marginLeft:6}}>⭐</span>}
                  </div>
                  {v.occasions?.length>0&&<div style={{fontFamily:"var(--body)",fontSize:11,color:"#888",fontWeight:600,marginTop:2}}>{v.occasions.join(" · ")}</div>}
                </div>
                <StatusPill status={v.status}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={{background:"var(--red)",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"white",cursor:"pointer"}} onClick={()=>startEdit(v)}>✏ Edit</button>
                <button style={{background:"#F8D7DA",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#58151C",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"closed")}>✕ Close</button>
              </div>
            </div>
          ))}
          {active.filter(v=>!clSearch||v.name.toLowerCase().includes(clSearch.toLowerCase())||v.cuisine?.toLowerCase().includes(clSearch.toLowerCase())||v.district?.toLowerCase().includes(clSearch.toLowerCase())).length===0&&(
