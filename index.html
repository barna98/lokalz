// ── EVENT CALENDAR SCREEN ────────────────────
function EventCalendarScreen({navigate, onMenu, user, allVenues, showToast}) {
  const [tab, setTab] = useState("public");
  const [events, setEvents] = useState([]);
  const [myEvents, setMyEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const isPremium = user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead";

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const {data} = await supabase
        .from("events")
        .select("*, venues(name, address, district)")
        .eq("status","active")
        .gte("event_date", new Date().toISOString())
        .order("event_date");
      setEvents(data||[]);
      if(user?.id){
        const {data:mine} = await supabase
          .from("event_rsvps")
          .select("event_id, events(*, venues(name, address, district))")
          .eq("user_id", user.id)
          .eq("status","going");
        const rsvpd = (mine||[]).map(r=>r.events).filter(Boolean);

        const {data:created} = await supabase
          .from("events")
          .select("*, venues(name, address, district)")
          .eq("created_by", user.id);
        const createdEvents = created||[];

        // Merge, deduplicate
        const merged = [...createdEvents];
        rsvpd.forEach(e=>{ if(!merged.find(m=>m.id===e.id)) merged.push(e); });
        merged.sort((a,b)=>new Date(a.event_date)-new Date(b.event_date));
        setMyEvents(merged);
      }
      setLoading(false);
    }
    load();
  },[user?.id]);

  function formatDate(dt){
    const d = new Date(dt);
    return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }

  const displayEvents = tab==="my" ? myEvents : events;

  return (
    <div className="screen" style={{background:"var(--bg)"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <button onClick={()=>{onMenu&&onMenu();}} className="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"var(--black)",marginTop:4}}>{t("menu.events")}</div>
          </div>
        </div>
      </div>
      <div style={{background:"var(--black)",flexShrink:0,display:"flex",alignItems:"center"}}>
        {[["public","public events"],["my","my events"]].map(([k,l])=>(
          <button key={k} style={{flex:1,padding:"14px 6px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:tab===k?"white":"rgba(255,255,255,.4)",background:"none",border:"none",cursor:"pointer",borderBottom:tab===k?"2.5px solid white":"2.5px solid transparent",marginBottom:-1,transition:"all .15s"}} onClick={()=>setTab(k)}>{l}</button>
        ))}
        {isPremium&&(
          <button onClick={()=>setShowCreate(true)} style={{flex:1,padding:"14px 6px",fontFamily:"var(--body)",fontSize:12,fontWeight:700,color:"white",background:"none",border:"none",borderBottom:"2.5px solid transparent",cursor:"pointer",marginBottom:-1}}>+ add event</button>
        )}
      </div>

      {loading
        ? <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:28,height:28,border:"2.5px solid rgba(0,0,0,.15)",borderTop:"2.5px solid black",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
          </div>
        : <div className="scroll" style={{padding:"16px 20px 80px"}}>
            {tab==="my"&&!isPremium&&(
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontFamily:"var(--body)",fontSize:14,color:"#888",marginBottom:16}}>{t("ev.upgrade_rsvp")}</div>
                <button onClick={()=>navigate("upgrade")} style={{background:"black",color:"white",border:"none",borderRadius:50,padding:"12px 24px",fontFamily:"var(--body)",fontSize:14,fontWeight:400,cursor:"pointer"}}>{t("sc.upgrade_btn")}</button>
              </div>
            )}
            {displayEvents.length===0&&(tab!=="my"||isPremium)
              ? <div className="empty">
                  <div className="empty-icon">🗓</div>
                  <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:14,color:"#888",marginBottom:6}}>{tab==="my"?"no events yet — RSVP to events to see them here":"nothing coming up yet"}</div>
                </div>
              : displayEvents.map(ev=>(
                  <div key={ev.id} onClick={()=>navigate("event_detail", ev)}
                    style={{background:"white",border:"1.5px solid #eee",borderRadius:20,overflow:"hidden",marginBottom:14,cursor:"pointer",transition:"transform .15s"}}
                    onTouchStart={e=>e.currentTarget.style.transform="scale(.98)"}
                    onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
                    <div style={{width:"100%",height:140,background:"var(--red)",position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {ev.cover_image
                        ?<ShimmerImg src={ev.cover_image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        :<span style={{fontSize:40}}>🎉</span>
                      }
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.6))",padding:"20px 16px 12px"}}>
                        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16,color:"white"}}>{ev.title}</div>
                      </div>

                    <div style={{padding:"12px 16px"}}>
                      <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:700,color:"var(--red)",marginBottom:4}}>📅 {formatDate(ev.event_date)}</div>

                    </div>
                  </div>
                ))
            }
          </div>
      }
      {showCreate&&<CreatePlanModal navigate={navigate} user={user} allVenues={allVenues} showToast={showToast}
        onClose={()=>setShowCreate(false)}
        onCreate={plan=>{setMyEvents(p=>[plan,...p]);setShowCreate(false);setTab("my");}}/>}
    </div>
  );
}

function EventDetailScreen({navigate, event, user, showToast}) {
  const [rsvp, setRsvp] = useState(null);
  const [rsvpCount, setRsvpCount] = useState(0);
  const [loading, setLoading] = useState(false);
  const isPremium = user?.role==="explorer_pro"||user?.role==="scout"||user?.role==="city_lead";

  useEffect(()=>{
    if(!event) return;
    // Load RSVP count
    supabase.from("event_rsvps").select("id",{count:"exact"}).eq("event_id",event.id).eq("status","going")
      .then(({count})=>setRsvpCount(count||0));
    // Load own RSVP
    if(user?.id){
      supabase.from("event_rsvps").select("status").eq("event_id",event.id).eq("user_id",user.id).single()
        .then(({data})=>{ if(data) setRsvp(data.status); });
    }
  },[event?.id]);

  async function doRsvp(status){
    if(!isPremium){ navigate("upgrade"); return; }
    if(!user?.id) return;
    setLoading(true);
    await supabase.from("event_rsvps").upsert({event_id:event.id, user_id:user.id, status},{onConflict:"event_id,user_id"});
    setRsvp(status);
    setRsvpCount(c=> status==="going" ? c+1 : Math.max(0,c-1));
    showToast(status==="going"?"You're going! 🎉":"RSVP updated");
    setLoading(false);
  }

  function formatDate(dt){
    const d = new Date(dt);
    return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }

  if(!event) return null;

  return (
    <div className="screen">
      <div style={{width:"100%",height:220,background:"var(--red)",flexShrink:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        {event.cover_image
          ?<ShimmerImg src={event.cover_image} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<span style={{fontSize:64}}>🎉</span>
        }
        <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent,rgba(0,0,0,.5))"}}/>
        <button className="back-btn" style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.4)",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:22}} onClick={()=>navigate(-1)}>‹</button>
      </div>
      <div className="scroll" style={{padding:"20px 24px 80px"}}>
        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:26,color:"var(--black)",marginBottom:12,letterSpacing:".02em"}}>{event.title}</div>
        <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--red)",marginBottom:8}}>📅 {formatDate(event.event_date)}</div>
        {event.venues&&(
          <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#555",marginBottom:16}}>📍 {event.venues?.name||""} · {event.venues?.address||""}</div>
        )}
        {event.description&&(
          <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#444",lineHeight:1.7,marginBottom:20}}>{event.description}</div>
        )}

        {/* RSVP */}
        <div style={{background:"var(--white)",borderRadius:16,padding:"16px",marginBottom:20}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",letterSpacing:".06em",marginBottom:12}}>
            {rsvpCount} {rsvpCount===1?"person is":"people are"} going
          </div>
          <div style={{display:"flex",gap:8}}>
            {[["going","🎉 I'm going"],["maybe","🤔 Maybe"],["not_going","✕ Can't go"]].map(([val,label])=>(
              <button key={val} onClick={()=>doRsvp(val)} disabled={loading}
                style={{flex:1,padding:"11px 4px",border:"2px solid",borderRadius:12,fontFamily:"var(--display)",fontWeight:800,fontSize:11,letterSpacing:".02em",cursor:"pointer",transition:"all .15s",
                  background:rsvp===val?"var(--red)":"transparent",
                  color:rsvp===val?"white":"var(--black)",
                  borderColor:rsvp===val?"var(--red)":"rgba(0,0,0,.2)"}}>
                {label}
              </button>
            ))}
          </div>
          {!isPremium&&(
            <div style={{marginTop:10,textAlign:"center",fontFamily:"var(--body)",fontSize:12,fontWeight:600,color:"#888"}}>
              <span style={{color:"var(--red)",cursor:"pointer",fontWeight:700}} onClick={()=>navigate("upgrade")}>{t("ev.upgrade_premium")}</span> to RSVP
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CreatePlanModal({onClose, onCreate, user, allVenues, showToast}) {
  const [title, setTitle] = useState("");
  const [desc, setDesc] = useState("");
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [venueId, setVenueId] = useState("");
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      allVenues.filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||
        (v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch, allVenues]);

  function selectVenue(v){
    setVenueId(v.id);
    setVenueSearch(v.name+" · Dist. "+v.district);
    setVenueSuggestions([]);
  }

  async function save(){
    if(!title.trim()) return;
    if(!venueId){ showToast(t("scout.select_venue")); return; }
    setSaving(true);
    const event_date = date&&time ? new Date(`${date}T${time}`).toISOString() : null;
    const {data, error} = await supabase.from("event_plans").insert({
      created_by: user.id,
      title: title.trim(),
      description: desc.trim()||null,
      event_date,
      venue_id: venueId||null,
    }).select("*, venues(name,district)").single();
    setSaving(false);
    if(error){ showToast("Error: "+error.message); return; }
    onCreate(data);
    showToast(t("toast.event_created"));
  }

  const inputStyle = {width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,outline:"none",background:"white",color:"var(--black)",marginBottom:10};

  return (
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"var(--bg)",borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",width:"100%",animation:"slideInUp .3s ease both"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:20,color:"var(--black)"}}>{t("ev.new_event")}</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#888"}}>✕</button>
        </div>
        <input placeholder="Event name *" value={title} onChange={e=>setTitle(e.target.value)} style={inputStyle}/>
        <textarea placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)} rows={2}
          style={{...inputStyle,resize:"none"}}/>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inputStyle,flex:1,marginBottom:0}}/>
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{...inputStyle,flex:1,marginBottom:0}}/>
        </div>
        <div style={{position:"relative",marginBottom:10}}>
          <input
            placeholder="🔍 Search venue..."
            value={venueSearch}
            onChange={e=>{ setVenueSearch(e.target.value); setVenueId(""); }}
            style={{...inputStyle,marginBottom:0}}
          />
          {venueSuggestions.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #ddd",borderRadius:10,zIndex:50,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden"}}>
              {venueSuggestions.map(v=>(
                <div key={v.id} onClick={()=>selectVenue(v)}
                  style={{padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",cursor:"pointer",borderBottom:"1px solid #f5f5f5"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f9f6f0"}
                  onMouseLeave={e=>e.currentTarget.style.background="white"}>
                  {v.name} <span style={{color:"#888",fontSize:12}}>· Dist. {v.district}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <button className="btn-black" onClick={save} style={{opacity:saving||!title.trim()||!venueId?0.5:1}}>
          {saving?"creating...":"create event →"}
        </button>
      </div>
    </div>
  );
}

// ── EVENT PLAN DETAIL SCREEN ──────────────────
function EventPlanDetailScreen({navigate, plan, user, allVenues, showToast}) {
  const [rsvps, setRsvps] = useState([]);
  const [myRsvp, setMyRsvp] = useState(null);
  const [loading, setLoading] = useState(true);
  const [copied, setCopied] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [editForm, setEditForm] = useState({});
  const [venueSearch, setVenueSearch] = useState("");
  const [venueSuggestions, setVenueSuggestions] = useState([]);
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [currentPlan, setCurrentPlan] = useState(plan);
  const isOwner = plan?.created_by===user?.id;
  const planStatus = currentPlan?.status || plan?.status;

  useEffect(()=>{ setCurrentPlan(plan); },[plan]);

  // Non-owners can only see active plans
  if(!isOwner && planStatus && planStatus!=="active"){
    return (
      <div className="screen" style={{background:"var(--bg)"}}>
        <div className="hdr">
          <button className="back-btn" onClick={()=>navigate(-1)}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div/><div style={{width:26}}/>
        </div>
        <div style={{padding:"60px 28px",textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:16}}>⏳</div>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginBottom:8}}>{t("ev.plan_unavail")}</div>
          <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:400,color:"#777",lineHeight:1.6}}>{t("ev.plan_waiting")}</div>
        </div>
      </div>
    );
  }

  useEffect(()=>{
    if(!plan) return;
    async function load(){
      const {data} = await supabase.from("event_plan_rsvps")
        .select("*, users(name)").eq("plan_id", plan.id);
      setRsvps(data||[]);
      if(user?.id) setMyRsvp((data||[]).find(r=>r.user_id===user.id)?.status||null);
      setLoading(false);
    }
    load();
  },[plan?.id]);

  // Venue autocomplete
  useEffect(()=>{
    if(!venueSearch.trim()){ setVenueSuggestions([]); return; }
    const q = venueSearch.toLowerCase();
    setVenueSuggestions(
      (allVenues||[]).filter(v=>v.status==="active"&&(
        v.name.toLowerCase().includes(q)||(v.district&&String(v.district).toLowerCase().includes(q))
      )).slice(0,5)
    );
  },[venueSearch]);

  async function doRsvp(status){
    if(!user?.id) return;
    await supabase.from("event_plan_rsvps").upsert({plan_id:plan.id,user_id:user.id,status},{onConflict:"plan_id,user_id"});
    setMyRsvp(status);
    setRsvps(prev=>{
      const existing=prev.find(r=>r.user_id===user.id);
      if(existing) return prev.map(r=>r.user_id===user.id?{...r,status}:r);
      return [...prev,{user_id:user.id,status,users:{name:user.name}}];
    });
    showToast(status==="going"?"You're going! 🎉":"RSVP updated");
  }

  function copyLink(){
    const link = `${window.location.origin}${window.location.pathname}?plan=${plan.invite_code}`;
    navigator.clipboard?.writeText(link);
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
    showToast(t("toast.link_copied"));
  }

  function openEdit(){
    const d = currentPlan.event_date ? new Date(currentPlan.event_date) : null;
    setEditForm({
      title: currentPlan.title||"",
      description: currentPlan.description||"",
      event_date: d ? d.toISOString().slice(0,10) : "",
      event_time: d ? d.toTimeString().slice(0,5) : "",
      venue_id: currentPlan.venue_id||"",
    });
    setVenueSearch(currentPlan.venues ? currentPlan.venues.name+" · Dist. "+currentPlan.venues.district : "");
    setVenueSuggestions([]);
    setShowEdit(true);
  }

  async function saveEdit(){
    if(!editForm.title.trim()) return;
    setSaving(true);
    const event_date = editForm.event_date&&editForm.event_time
      ? new Date(`${editForm.event_date}T${editForm.event_time}`).toISOString() : null;
    const {data, error} = await supabase.from("event_plans").update({
      title: editForm.title.trim(),
      description: editForm.description.trim()||null,
      event_date,
      venue_id: editForm.venue_id||null,
    }).eq("id", plan.id).select("*, venues(name,district)").single();
    setSaving(false);
    if(error){ showToast("Error: "+error.message); return; }
    setCurrentPlan(data);
    setShowEdit(false);
    showToast("Event updated ✓");
  }

  async function deletePlan(){
    if(!window.confirm("Delete this event? This cannot be undone.")) return;
    setDeleting(true);
    await supabase.from("event_plan_rsvps").delete().eq("plan_id", plan.id);
    const {error} = await supabase.from("event_plans").delete().eq("id", plan.id);
    if(error){ showToast("Error: "+error.message); setDeleting(false); return; }
    showToast(t("scout.event_deleted"));
    navigate(-1);
  }

  function formatDate(dt){
    if(!dt) return "Date TBD";
    const d=new Date(dt);
    return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }

  if(!currentPlan) return null;

  const going = rsvps.filter(r=>r.status==="going");
  const maybe = rsvps.filter(r=>r.status==="maybe");
  const inputStyle = {width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,outline:"none",background:"white",color:"var(--black)",marginBottom:10};

  return (
    <div className="screen">
      <div className="hdr">
        <button className="back-btn" onClick={()=>navigate(-1)}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16,color:"var(--red)",letterSpacing:".04em"}}>{t("ev.event")}</div>
        <div style={{width:26}}/>
      </div>
      <div className="scroll" style={{padding:"8px 24px 80px"}}>

        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:26,color:"var(--black)",marginBottom:8}}>{currentPlan.title}</div>
        <div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--red)",marginBottom:6}}>📅 {formatDate(currentPlan.event_date)}</div>
        {currentPlan.venues&&<div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#555",marginBottom:12}}>📍 {currentPlan.venues.name} · Dist. {currentPlan.venues.district}</div>}
        {currentPlan.description&&<div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#444",lineHeight:1.7,marginBottom:16}}>{currentPlan.description}</div>}

        {/* Owner actions */}
        {isOwner&&(
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={openEdit}
              style={{flex:1,background:"#EDE8E0",border:"none",borderRadius:12,padding:"12px",fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"var(--black)",cursor:"pointer",letterSpacing:".04em"}}>
              ✏️ EDIT
            </button>
            <button onClick={deletePlan} disabled={deleting}
              style={{flex:1,background:"#F8D7DA",border:"none",borderRadius:12,padding:"12px",fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#58151C",cursor:"pointer",letterSpacing:".04em",opacity:deleting?0.5:1}}>
              {deleting?"...":"🗑 DELETE"}
            </button>
          </div>
        )}

        {/* Invite link */}
        <div style={{background:"var(--red)",borderRadius:14,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"rgba(255,255,255,.7)",letterSpacing:".06em",marginBottom:2}}>{t("ev.invite_link")}</div>
            <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:600,color:"rgba(255,255,255,.9)"}}>{t("ev.share_friends")}</div>
          </div>
          <button onClick={copyLink}
            style={{background:"white",border:"none",borderRadius:10,padding:"9px 14px",fontFamily:"var(--body)",fontWeight:700,fontSize:12,color:"var(--red)",cursor:"pointer",letterSpacing:".04em",flexShrink:0}}>
            {copied?"copied ✓":"copy 🔗"}
          </button>
        </div>

        {/* RSVP */}
        <div style={{background:"var(--white)",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",letterSpacing:".06em",marginBottom:10}}>{t("ev.your_rsvp")}</div>
          <div style={{display:"flex",gap:8}}>
            {[["going","🎉 Going"],["maybe","🤔 Maybe"],["not_going","✕ Can't go"]].map(([val,label])=>(
              <button key={val} onClick={()=>doRsvp(val)}
                style={{flex:1,padding:"10px 4px",border:"2px solid",borderRadius:12,fontFamily:"var(--display)",fontWeight:800,fontSize:11,cursor:"pointer",transition:"all .15s",
                  background:myRsvp===val?"var(--red)":"transparent",
                  color:myRsvp===val?"white":"var(--black)",
                  borderColor:myRsvp===val?"var(--red)":"rgba(0,0,0,.2)"}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* Guest list */}
        <div style={{background:"var(--white)",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",letterSpacing:".06em",marginBottom:10}}>
            GUEST LIST · {going.length} going{maybe.length>0?`, ${maybe.length} maybe`:""}
          </div>
          {loading
            ?<div style={{fontFamily:"var(--body)",fontSize:13,color:"#888"}}>{t("ev.loading")}</div>
            :rsvps.length===0
              ?<div style={{fontFamily:"var(--body)",fontSize:13,color:"#888",fontWeight:600}}>{t("ev.no_rsvps")}</div>
              :rsvps.map(r=>(
                <div key={r.user_id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.06)"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontFamily:"var(--body)",fontWeight:700,fontSize:14,color:"white"}}>{(r.users?.name||"?")[0].toUpperCase()}</span>
                  </div>
                  <div style={{flex:1,fontFamily:"var(--body)",fontSize:14,fontWeight:700,color:"var(--black)"}}>{r.users?.name||"Guest"}</div>
                  <span style={{fontSize:16}}>{r.status==="going"?"🎉":r.status==="maybe"?"🤔":"✕"}</span>
                </div>
              ))
          }
        </div>
      </div>

      {/* Edit modal */}
      {showEdit&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"var(--bg)",borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",width:"100%",animation:"slideInUp .3s ease both"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"var(--black)"}}>{t("ev.edit_event")}</div>

            </div>
            <input placeholder="Title *" value={editForm.title} onChange={e=>setEditForm(f=>({...f,title:e.target.value}))} style={inputStyle}/>
            <textarea placeholder="Description" value={editForm.description} onChange={e=>setEditForm(f=>({...f,description:e.target.value}))} rows={2} style={{...inputStyle,resize:"none"}}/>
            <div style={{display:"flex",gap:8,marginBottom:10}}>

              <input type="time" value={editForm.event_time} onChange={e=>setEditForm(f=>({...f,event_time:e.target.value}))} style={{...inputStyle,flex:1,marginBottom:0}}/>
            </div>
            <div style={{position:"relative",marginBottom:10}}>
              <input placeholder="🔍 Search venue..." value={venueSearch}
                onChange={e=>{ setVenueSearch(e.target.value); setEditForm(f=>({...f,venue_id:""})); }}
                style={{...inputStyle,marginBottom:0}}/>
              {venueSuggestions.length>0&&(
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #ddd",borderRadius:10,zIndex:50,boxShadow:"0 4px 16px rgba(0,0,0,.1)",overflow:"hidden"}}>
                  {venueSuggestions.map(v=>(
                    <div key={v.id} onClick={()=>{setEditForm(f=>({...f,venue_id:v.id}));setVenueSearch(v.name+" · Dist. "+v.district);setVenueSuggestions([]);}}

                      {v.name} <span style={{color:"#888",fontSize:12}}>· Dist. {v.district}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button className="btn-black" onClick={saveEdit} style={{opacity:saving||!editForm.title.trim()?0.5:1}}>
              {saving?t("btn.saving"):t("btn.save_changes_arrow")}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("signin");
  const [appLoading, setAppLoading] = useState(true);
  const [lang, setLangState] = useState(_lang);
  const [dark, setDarkState] = useState(_dark);
  const changeLang = (l) => { setLang(l); setLangState(l); };
  const changeDark = (v) => { setDarkMode(v); setDarkState(v); };
  React.useEffect(()=>{ applyDarkMode(_dark); }, []);
  const [history, setHistory] = useState([]);
  const [selectedVenue, setSelectedVenue] = useState(null);
  const [selectedScout, setSelectedScout] = useState(null);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [pendingInvite, setPendingInvite] = useState(null);
  const [showMenu, setShowMenu] = useState(false);
  const [toast, setToast] = useState(null);
  const [user, setUser] = useState(null);
  const [savedIds, setSavedIds] = useState(new Set());
  const [allVenues, setAllVenues] = useState([]);
  const [venuesLoading, setVenuesLoading] = useState(true);
  const [answers, setAnswers] = useState({});
  const [partner, setPartner] = useState(null);
  const [cities, setCities] = useState([]);

  // Load cities from Supabase
  useEffect(()=>{
    supabase.from("cities").select("id, name").order("name").then(({data})=>{
      if(data) setCities(data);
    });
  },[]);

  // Detect partner slug from URL path
  useEffect(()=>{
    const path = window.location.pathname.replace("/","").trim();
    if(path && path.length > 0){
      supabase.from("partners").select("*").eq("slug", path).single().then(({data})=>{
        if(data) setPartner(data);
      });
    }
  },[]);

  // Load venues from Supabase — only after city is known
  const loadVenues = React.useCallback(async function(cityId){
    setVenuesLoading(true);
    let query = supabase
      .from("venues")
      .select("*")
      .in("status",["active","pending","needs_edit"]);
    if(cityId) query = query.eq("city_id", cityId);
    const {data, error} = await query;
    if(!error && data) setAllVenues(data.map(v=>({
      ...v,
      price: v.price_level,
      why: v.why,
      emoji: "🍽",
      occasions: v.occasions || []
    })));
    setVenuesLoading(false);
  }, []);

  // Reload venues when user city changes
  useEffect(()=>{
    if(!user?.city_id) return;
    loadVenues(user.city_id);
  },[user?.city_id]);

  useEffect(()=>{
    // Safety timeout — max 5 másodperc loading
    const timeout = setTimeout(()=>setAppLoading(false), 5000);

    async function restoreSession(){
      try {
        const {data:{session}} = await supabase.auth.getSession();
        if(session){
          // Email megerősítés ellenőrzés
          if(!session.user.email_confirmed_at){
            await supabase.auth.signOut();
            clearTimeout(timeout);
            setAppLoading(false);
            return;
          }
          const {data:profile} = await supabase.from("users").select("*").eq("id",session.user.id).single();
          // Auto-create profile if doesn't exist (Google auth)
          if(!profile){
            await supabase.from("users").insert({
              id: session.user.id,
              name: session.user.user_metadata?.full_name || session.user.email.split("@")[0],
              email: session.user.email,
              role: "USER"
            });
          }
          // Trial expiry check
          if(profile?.role?.toLowerCase()==="explorer_pro" && profile?.trial_expires_at && new Date(profile.trial_expires_at) < new Date()){
            await supabase.from("users").update({role:"USER"}).eq("id", session.user.id);
            if(profile) profile.role = "USER";
          }
          const u = {
            id: session.user.id,
            name: profile?.name || session.user.user_metadata?.full_name || session.user.email.split("@")[0],
            email: session.user.email,
            role: (()=>{ const r=(profile?.role||"explorer").toLowerCase(); return r==="user"?"explorer":r; })(),
            city_id: profile?.city_id || null,
            badge: profile?.badge || null,
            profile_image: profile?.profile_image || null,
            partner_id: profile?.partner_id || null,
            partner_access_expires_at: profile?.partner_access_expires_at || null,
          };
          setUser(u);
          loadSavedIds(u.id);
          if(partner){
            const hasActiveAccess = u.partner_id && u.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
            setScreen(hasActiveAccess ? "home" : "partner_activate");
          } else {
            setScreen(u.city_id ? "home" : "onboarding");
          }
        }
      } catch(e){

      } finally {
        clearTimeout(timeout);
        setAppLoading(false);
      }
    }

    restoreSession();

    // Trial lejárat ellenőrzés
    async function checkTrialExpiry(userId){
      const {data: u} = await supabase.from("users").select("role, trial_expires_at").eq("id", userId).single();
      if(u?.role==="explorer_pro" && u?.trial_expires_at && new Date(u.trial_expires_at) < new Date()){
        await supabase.from("users").update({role:"USER"}).eq("id", userId);
        return "explorer";
      }
      return null;
    }

    const {data: authListener} = supabase.auth.onAuthStateChange(async (event, session)=>{
      if(event==="SIGNED_OUT"){
        setUser(null);
        setSavedIds(new Set());
        setScreen("signin");
      }
      // Google OAuth callback — csak ha nincs még user betöltve
      if(event==="SIGNED_IN" && session && !appLoading){
        const {data:profile} = await supabase.from("users").select("*").eq("id",session.user.id).single();
        if(!profile){
          await supabase.from("users").insert({
            id: session.user.id,
            name: session.user.user_metadata?.full_name || session.user.email.split("@")[0],
            email: session.user.email,
            role: "USER"
          });
        }
        const u = {
          id: session.user.id,
          name: profile?.name || session.user.user_metadata?.full_name || session.user.email.split("@")[0],
          email: session.user.email,
          role: (()=>{ const r=(profile?.role||"explorer").toLowerCase(); return r==="user"?"explorer":r; })(),
          city_id: profile?.city_id || null,
          badge: profile?.badge || null,
          profile_image: profile?.profile_image || null,
          partner_id: profile?.partner_id || null,
          partner_access_expires_at: profile?.partner_access_expires_at || null,
        };
        setUser(u);
        loadSavedIds(u.id);
        setAppLoading(false);
        if(partner){
          const hasActiveAccess = u.partner_id && u.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
          setScreen(hasActiveAccess ? "home" : "partner_activate");
        } else {
          setScreen(u.city_id ? "home" : "onboarding");
        }
      }
    });

    return ()=>{ authListener?.subscription?.unsubscribe(); };
  },[]);

  function navigate(target, data, opts) {
    if(target===-1||target==="back"){
      setHistory(h=>{
        if(h.length===0){setScreen("home");return h;}
        const prev=h[h.length-1];
        setScreen(prev.screen);
        if(prev.venue) setSelectedVenue(prev.venue);
        if(prev.scout) setSelectedScout(prev.scout);
        if(prev.event) setSelectedEvent(prev.event);
        if(prev.plan) setSelectedPlan(prev.plan);
        return h.slice(0,-1);
      });
      setShowMenu(false);
      return;
    }
    // replace:true → ne pusholjuk a history-ba (top-level menü screenek)
    if(!opts?.replace){
      setHistory(h=>[...h,{screen,venue:selectedVenue,scout:selectedScout,event:selectedEvent,plan:selectedPlan}]);
    }
    if(target==="venue"&&data){setSelectedVenue(data);}
    if(target==="results_list"&&data){setSelectedVenue(data);}
    if(target==="scout_profile"&&data){setSelectedScout(data);}
    if(target==="event_detail"&&data){setSelectedEvent(data);}
    if(target==="event_plan_detail"&&data){setSelectedPlan(data);}
    setScreen(target);
    setShowMenu(false);
  }
  function showToastMsg(msg){setToast(msg);setTimeout(()=>setToast(null),3000);}

  async function loadSavedIds(userId){
    const {data, error} = await supabase
      .from("saved_venues")
      .select("venue_id")
      .eq("user_id", userId);
    if(data) setSavedIds(new Set(data.map(r=>r.venue_id)));
  }

  async function toggleSave(id){
    if(!user) return;
    const isSaved = savedIds.has(id);
    if(isSaved){
      setSavedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
      await supabase.from("saved_venues").delete().eq("user_id",user.id).eq("venue_id",id);
    } else {
      setSavedIds(prev=>new Set(prev).add(id));
      await supabase.from("saved_venues").insert({user_id:user.id, venue_id:id});
    }
  }

  function onLogin(u){
    setUser(u);
    if(u?.id) loadSavedIds(u.id);
    // If pending invite → go to event directly
    if(pendingInvite){
      setSelectedPlan(pendingInvite);
      setPendingInvite(null);
      setScreen(u.city_id ? "event_plan_detail" : "onboarding");
      return;
    }
    // If partner context → go to activate screen (or home if already has active access)
    if(partner){
      const hasActiveAccess = u?.partner_id===partner.id && u?.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
      if(hasActiveAccess) setScreen("home");
      else setScreen("partner_activate");
      return;
    }
    // Normal login → home or onboarding
    if(!u.city_id) setScreen("onboarding");
    else setScreen("home");
  }
  async function signOut(){
    await supabase.auth.signOut();
    setUser(null);
    setSavedIds(new Set());
    setAnswers({});
    setHistory([]);
    setSelectedVenue(null);
    setSelectedScout(null);
    setSelectedEvent(null);
    setSelectedPlan(null);
    setScreen("signin");
  }

  const isScout = user?.role==="scout"||user?.role==="city_lead";
  const isPartnerActive = user?.partner_id && user?.partner_access_expires_at && new Date(user.partner_access_expires_at) > new Date();

  // If partner detected in URL and user not logged in → show partner landing
  useEffect(()=>{
    if(partner && screen==="signin"){
      setScreen("partner_landing");
    }
  },[partner]);

  // Pending invite flow
  useEffect(()=>{
    if(!pendingInvite || appLoading) return;
    setSelectedPlan(pendingInvite);
    if(!user){
      // Not logged in → go to signup, plan waiting
      setScreen("signup");
    } else {
      // Logged in → open event directly (free users can also RSVP)
      setScreen("event_plan_detail");
      setPendingInvite(null);
    }
  },[pendingInvite, appLoading, user]);

  const screens = {
    signin: <SignInScreen navigate={navigate} onLogin={onLogin}/>,
    signup: <SignUpScreen navigate={navigate} onLogin={onLogin}/>,
    onboarding: <OnboardingScreen navigate={navigate} user={user} setUser={setUser}/>,
    home: <HomeScreen navigate={navigate} onMenu={()=>setShowMenu(true)} setAnswers={setAnswers} user={user} partner={isPartnerActive ? partner : null} venuesLoading={venuesLoading} allVenues={allVenues}/>,
    q1: <Q1Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q2: <Q2Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q3: <Q3Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers} partnerDistrict={isPartnerActive ? partner?.district : null} allVenues={allVenues}/>,
    q4: <Q4Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q5: <Q5Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q6: <Q6Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    results: <ResultsScreen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers} allVenues={allVenues} partner={isPartnerActive ? partner : null} user={user}/>,
    venue: selectedVenue&&<VenueDetailScreen venue={selectedVenue} navigate={navigate} savedIds={savedIds} toggleSave={toggleSave} showToast={showToastMsg} isScout={isScout} user={user} allVenues={allVenues}/>,
    saved: <SavedScreen navigate={navigate} savedIds={savedIds} allVenues={allVenues} onMenu={()=>setShowMenu(true)} user={user}/>,
    scouts: <ScoutsScreen navigate={navigate} onMenu={()=>setShowMenu(true)} user={user}/>,
    all_venues: <AllVenuesScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)}/>,
    scout: <ScoutScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} setAllVenues={setAllVenues} user={user} cities={cities}/>,
    city_lead: <CityLeadScreen navigate={navigate} allVenues={allVenues} setAllVenues={setAllVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} user={user}/>,
    profile: <ProfileScreen navigate={navigate} user={user} setUser={setUser} onMenu={()=>setShowMenu(true)} onSignOut={signOut} cities={cities} lang={lang} changeLang={changeLang} dark={dark} changeDark={changeDark}/>,
    about: <AboutScreen navigate={navigate}/>,
    upgrade: <UpgradeScreen navigate={navigate} user={user}/>,
    event_calendar: <EventCalendarScreen navigate={navigate} onMenu={()=>setShowMenu(true)} user={user} allVenues={allVenues} showToast={showToastMsg}/>,
    event_detail: selectedEvent&&<EventDetailScreen navigate={navigate} event={selectedEvent} user={user} showToast={showToastMsg}/>,

    event_plan_detail: selectedPlan&&<EventPlanDetailScreen navigate={navigate} plan={selectedPlan} user={user} allVenues={allVenues} showToast={showToastMsg}/>,
    scout_profile: selectedScout&&<ScoutProfileScreen navigate={navigate} scoutId={selectedScout} allVenues={allVenues} savedIds={savedIds} user={user}/>,
    results_list: (()=>{
      const listData = selectedVenue||{};
      const listVenues = listData.venues||[];
      const listTitle = listData.title||"spots";
      return (
        <div className="screen" style={{background:"var(--bg)"}}>
          <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
              <button onClick={()=>navigate("home",null,{replace:true})} className="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
                <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:20,color:"var(--black)",marginTop:4}}>{t("home.city_picks")}</div>
                <div style={{fontFamily:"var(--body)",fontWeight:400,fontSize:20,color:"var(--black)",marginTop:2}}>{listTitle}</div>
              </div>
            </div>
          </div>
          <div className="scroll" style={{padding:"0 20px 80px"}}>
            {listVenues.map(v=><VenueCard key={v.id} venue={v} onClick={()=>navigate("venue",v)}/>)}
          </div>
        </div>
      );
    })(),
    partner_activate: partner&&user&&<PartnerActivateScreen partner={partner} navigate={navigate} user={user} onActivate={u=>{setUser(u);}} showToast={showToastMsg}/>,
    partner_signup: <SignUpScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
    partner_signin: <SignInScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
  };

  return (
    <>
    <div style={{width:"100%",height:"100%",position:"relative"}}>
      {appLoading
        ? <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20,background:"var(--bg)"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"40px",color:"var(--red)",lineHeight:.88,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{width:24,height:24,border:"2.5px solid rgba(253,1,0,.2)",borderTop:"2.5px solid var(--red)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          </div>
        : <>
            {screens[screen]||screens.signin}
            {showMenu&&<Menu onClose={()=>setShowMenu(false)} navigate={navigate} role={user?.role||"explorer"} onSignOut={signOut}/>}
      {user&&!appLoading&&screen!=="onboarding"&&<BottomNav screen={screen} navigate={navigate} onMenu={()=>setShowMenu(true)} menuOpen={showMenu}/>}
                </>
      }
      {toast&&<div className="toast">{toast}</div>}
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
