<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Barlow',sans-serif;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#root{width:100%;max-width:430px;height:100dvh;max-height:932px;position:relative;overflow:hidden;background:#EDEAE4;}
@media(max-width:430px){#root{max-height:100dvh;}}

/* TOKENS */
:root{
  --bg: #EDEAE4;
  --blue: #1B4FD8;
  --blue-dark: #1640B0;
  --black: #111111;
  --white: #FFFFFF;
  --script: 'Dancing Script', cursive;
  --display: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideInUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);animation:fadeUp .28s ease both;}

/* LOGO — large on auth screens, medium on inner screens */
.logo{font-family:var(--display);font-weight:900;font-size:96px;color:var(--blue);line-height:.88;letter-spacing:-2px;user-select:none;}
.logo-md{font-family:var(--display);font-weight:900;font-size:56px;color:var(--blue);line-height:.9;letter-spacing:-1px;user-select:none;}
.logo-white{color:var(--white);}

/* TAGLINE */
.tagline{font-family:var(--body);font-weight:700;font-size:17px;color:var(--black);margin-top:6px;line-height:1.3;}

/* SCRIPT TEXT */
.script{font-family:var(--script);font-size:30px;color:var(--black);}
.script-white{color:var(--white);}
.script-sm{font-size:22px;}

/* INPUTS — blue background, white bold uppercase, pill shape */
.input-field{
  background:var(--blue);
  border-radius:50px;
  padding:22px 26px;
  font-family:var(--display);
  font-weight:800;
  font-size:17px;
  color:var(--white);
  letter-spacing:.1em;
  width:100%;
  border:none;
  outline:none;
  cursor:text;
  display:block;
}
.input-field::placeholder{color:rgba(255,255,255,.85);font-weight:800;}

/* BUTTONS */
.btn-black{
  background:var(--black);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:20px 28px;
  font-family:var(--display);
  font-weight:800;
  font-size:17px;
  letter-spacing:.1em;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s,opacity .12s;
  display:block;
}
.btn-black:active{transform:scale(.97);}

.btn-black-half{
  background:var(--black);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:22px 20px;
  font-family:var(--display);
  font-weight:800;
  font-size:17px;
  letter-spacing:.1em;
  cursor:pointer;
  flex:1;
  text-align:center;
  transition:transform .12s;
}
.btn-black-half:active{transform:scale(.97);}

.btn-blue{
  background:var(--blue);
  color:var(--white);
  border:none;
  border-radius:50px;
  padding:20px 28px;
  font-family:var(--display);
  font-weight:800;
  font-size:17px;
  letter-spacing:.1em;
  cursor:pointer;
  width:100%;
  text-align:center;
  transition:transform .12s;
  display:block;
}
.btn-blue:active{transform:scale(.97);}

/* OCCASION CARDS — horizontal scroll */
.cards-row{
  display:flex;
  gap:14px;
  padding:0 24px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  padding-bottom:8px;
  flex-shrink:0;
}
.cards-row::-webkit-scrollbar{display:none;}

.occ-card{
  flex-shrink:0;
  width:210px;
  height:260px;
  background:var(--blue);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  scroll-snap-align:center;
  transition:transform .15s,opacity .15s,outline .1s;
  position:relative;
  overflow:hidden;
}
.occ-card:active{transform:scale(.97);}
.occ-card.sel{outline:3px solid var(--black);background:var(--blue-dark);}
.occ-card-label{font-family:var(--script);font-size:24px;color:var(--white);line-height:1.25;position:relative;z-index:1;}

/* SOMETHING ELSE EXPANDED */
.else-card{
  width:210px;
  min-height:260px;
  background:var(--blue);
  border-radius:24px;
  padding:20px 18px;
  cursor:pointer;
  flex-shrink:0;
  scroll-snap-align:center;
}
.else-item{
  font-family:var(--script);
  font-size:20px;
  color:var(--white);
  padding:10px 6px;
  border-bottom:1px solid rgba(255,255,255,.15);
  cursor:pointer;
  transition:opacity .15s;
  border-radius:8px;
}
.else-item:last-child{border-bottom:none;}
.else-item:active{opacity:.7;}

/* MENU */
.menu-panel{
  position:absolute;inset:0;
  background:var(--blue);
  z-index:101;
  animation:fadeIn .22s ease;
  display:flex;flex-direction:column;
  padding:56px 36px 44px;
}
.menu-close{position:absolute;top:24px;right:28px;background:none;border:none;color:rgba(255,255,255,.7);font-size:32px;cursor:pointer;font-weight:200;line-height:1;}
.menu-item{
  font-family:var(--display);
  font-weight:800;
  font-size:44px;
  color:var(--white);
  padding:12px 0;
  cursor:pointer;
  transition:opacity .15s;
  line-height:1;
  letter-spacing:-.5px;
}
.menu-item:active{opacity:.6;}
.menu-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.menu-bottom-item{font-family:var(--body);font-weight:700;font-size:14px;color:rgba(255,255,255,.55);cursor:pointer;transition:color .15s;}
.menu-bottom-item:active{color:var(--white);}

/* HAMBURGER */
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:6px;}
.hamburger span{display:block;width:28px;height:2.5px;background:var(--blue);border-radius:2px;}

/* OPTION BUTTONS (location, budget, etc) */
.opt-btn{
  background:var(--blue);
  border:none;
  border-radius:16px;
  padding:19px 22px;
  font-family:var(--display);
  font-weight:800;
  font-size:18px;
  color:var(--white);
  letter-spacing:.05em;
  cursor:pointer;
  width:100%;
  text-align:left;
  transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;
}
.opt-btn.sel{background:var(--black);}
.opt-btn:active{transform:scale(.98);}
.opt-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-check.on{background:var(--white);border-color:var(--white);}
.opt-check.on::after{content:'✓';font-size:12px;color:var(--blue);font-weight:900;}

/* VENUE CARDS */
.venue-card{
  background:var(--white);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s;
  margin-bottom:14px;
}
.venue-card:active{transform:scale(.98);}
.venue-img{width:100%;height:170px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;}
.venue-body{padding:16px 18px;}
.venue-name{font-family:var(--display);font-weight:800;font-size:22px;color:var(--black);margin-bottom:5px;letter-spacing:.01em;}
.venue-meta{font-family:var(--body);font-size:13px;color:#888;font-weight:600;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.venue-tag{display:inline-block;background:#F0F0F0;color:#555;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:2px solid #ddd;flex-shrink:0;}
.tab{flex:1;padding:14px 6px;font-family:var(--display);font-size:13px;font-weight:800;color:#aaa;background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;letter-spacing:.05em;text-transform:uppercase;transition:all .15s;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}

/* MISC */
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0;flex-shrink:0;}
.back-btn{background:none;border:none;font-size:32px;color:var(--blue);cursor:pointer;padding:0;line-height:1;font-weight:300;}
.text-link{font-family:var(--body);font-size:14px;font-weight:700;color:var(--black);text-decoration:underline;cursor:pointer;}
.text-link-blue{color:var(--blue);}
.divider{height:1px;background:#ddd;margin:4px 0;}
.empty{text-align:center;padding:48px 20px;color:#aaa;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.toast{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--white);padding:13px 26px;border-radius:50px;font-family:var(--display);font-size:14px;font-weight:800;letter-spacing:.06em;animation:popIn .25s ease both;white-space:nowrap;z-index:300;}
.status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.04em;font-family:var(--body);}
.pill-pending{background:#FFF3CD;color:#856404;}
.pill-active{background:#D1E7DD;color:#0A3622;}
.pill-rejected{background:#F8D7DA;color:#58151C;}
.pill-needs_edit{background:#CFF4FC;color:#055160;}
.admin-card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:12px;}
.input-wrap-light{background:var(--white);border:2px solid #ddd;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;width:100%;}
.input-wrap-light input{border:none;outline:none;background:transparent;font-family:var(--body);font-size:15px;font-weight:600;color:var(--black);flex:1;}
.input-wrap-light input::placeholder{color:#bbb;}
.prog-dots{display:flex;gap:7px;justify-content:center;padding:10px 0 4px;}
.prog-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.13);transition:all .2s;}
.prog-dot.on{background:var(--blue);width:24px;border-radius:5px;}

/* DARK MODE */
body.dark #root { background: #111; }
body.dark { background: #000; }
.dark-mode {
  --bg: #1A1A1A;
  --black: #FFFFFF;
  --white: #2A2A2A;

.dark-mode .screen { background: var(--bg); }
.dark-mode .venue-card { background: #2A2A2A; }
.dark-mode .venue-name { color: #FFFFFF; }
.dark-mode .venue-meta { color: #aaa; }
.dark-mode .venue-tag { background: #333; color: #ccc; }
.dark-mode .admin-card { background: #2A2A2A; }
.dark-mode .input-wrap-light { background: #2A2A2A; border-color: #444; }
.dark-mode .input-wrap-light input { color: #fff; }
.dark-mode .opt-btn { background: #1B4FD8; }
.dark-mode .hdr { background: transparent; }
.dark-mode .tabs { background: #1A1A1A; border-color: #333; }
.dark-mode .tab { color: #666; }
.dark-mode .tab.on { color: var(--blue); }
.dark-mode .hamburger span { background: var(--blue); }
.dark-mode .script { color: #eee; }
.dark-mode .logo-md { color: var(--blue); }
.dark-mode .tagline { color: #ccc; }
</style>

function SignInScreen({navigate, onLogin}) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  async function go() {
    if(!email||!pw) return;
    setLoading(true);
    setError(null);
    try {
      const {data, error} = await supabase.auth.signInWithPassword({email, password:pw});
      if(error) throw error;
      const {data: profile} = await supabase.from("users").select("*").eq("id", data.user.id).single();
      const u = {
        id: data.user.id,
        name: profile?.name || email.split("@")[0],
        email: data.user.email,
        role: profile?.role?.toLowerCase() || "user",
        city_id: profile?.city_id || null
      };
      onLogin(u);
      navigate(u.city_id ? "home" : "onboarding");
    } catch(e) {
      setError(e.message || "Sign in failed. Check your email and password.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="screen" style={{padding:"28px 28px 36px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
      <div>
        <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:"128px",color:"var(--blue)",lineHeight:.84,letterSpacing:"-3px",userSelect:"none",marginLeft:"-4px"}}>LOKALZ</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"var(--black)",marginTop:8,lineHeight:1.3}}>Skip the tourist traps. Discover the real city.</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontFamily:"var(--script)",fontSize:28,color:"var(--black)",marginBottom:4}}>Sign in</div>
        <input className="input-field" placeholder="E-MAIL" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input className="input-field" placeholder="PASSWORD" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/>
        {error&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#c00",fontWeight:600,background:"rgba(255,0,0,.08)",padding:"10px 14px",borderRadius:10}}>{error}</div>}
        <div style={{marginTop:4}}>
          <div style={{fontFamily:"var(--script)",fontSize:24,color:"var(--black)",marginBottom:12}}>Or continue with...</div>
          <div style={{display:"flex",gap:12}}>
            <button className="btn-black-half" onClick={async()=>{
              await supabase.auth.signInWithOAuth({
                provider:"google",
                options:{redirectTo: "https://lokalz.vercel.app"}
              });
            }}>GOOGLE</button>
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button className="btn-black" onClick={go} style={{opacity:loading?0.6:1}}>
          {loading ? "SIGNING IN..." : "SIGN IN"}
        </button>
        <div style={{textAlign:"center",display:"flex",flexDirection:"column",gap:8}}>
          <span className="text-link" style={{fontSize:15}}>Forgot Password?</span>
          <span style={{fontFamily:"var(--body)",fontSize:15,color:"var(--black)",fontWeight:600}}>
            Don't have account?{" "}
            <span className="text-link text-link-blue" onClick={()=>navigate("signup")}>Sign Up</span>
          </span>
        </div>
      </div>
    </div>
  );
}

function SignUpScreen({navigate, onLogin}) {
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [dob,setDob]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [success,setSuccess]=useState(false);

  async function go() {
    if(!name||!email||!pw) return setError("Please fill in all required fields.");
    if(pw!==pw2) return setError("Passwords don't match.");
    if(pw.length<6) return setError("Password must be at least 6 characters.");
    setLoading(true);
    setError(null);
    try {
      const {data, error} = await supabase.auth.signUp({email, password:pw});
      if(error) throw error;
      // Create user profile
      await supabase.from("users").insert({
        id: data.user.id,
        name,
        email,
        role: "USER"
      });
      setSuccess(true);
    } catch(e) {
      setError(e.message || "Sign up failed. Please try again.");
    } finally {
      setLoading(false);
    }
  }

  if(success) return (
    <div className="screen" style={{padding:"36px 28px",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:20,textAlign:"center"}}>
      <div style={{fontFamily:"var(--display)",fontWeight:900,fontSize:"80px",color:"var(--blue)",lineHeight:.9}}>LOKALZ</div>
      <div style={{fontFamily:"var(--script)",fontSize:32,color:"var(--black)",marginTop:20}}>Check your email!</div>
      <div style={{fontFamily:"var(--body)",fontSize:16,fontWeight:600,color:"#555",lineHeight:1.6}}>
        We sent a confirmation link to <strong>{email}</strong>. Click it to activate your account.
      </div>
      <button className="btn-black" style={{marginTop:20}} onClick={()=>navigate("signin")}>BACK TO SIGN IN</button>
    </div>
  );

  return (
    <div className="screen" style={{padding:"36px 28px 32px",justifyContent:"space-between"}}>
      <div>
        <div className="logo">LOKALZ</div>
        <div className="tagline">Skip the tourist traps. Discover the real city.</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div className="script" style={{marginBottom:4}}>Sign up</div>
        <input className="input-field" placeholder="NAME" value={name} onChange={e=>setName(e.target.value)}/>
        <input className="input-field" placeholder="E-MAIL" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input className="input-field" placeholder="PASSWORD" type="password" value={pw} onChange={e=>setPw(e.target.value)}/>
        <input className="input-field" placeholder="PASSWORD AGAIN" type="password" value={pw2} onChange={e=>setPw2(e.target.value)}/>
        <input className="input-field" placeholder="DATE OF BIRTH (DD/MM/YYYY)" value={dob} onChange={e=>setDob(e.target.value)} maxLength={10}/>
        {error&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#c00",fontWeight:600,background:"rgba(255,0,0,.08)",padding:"10px 14px",borderRadius:10}}>{error}</div>}
      </div>
      <div>
        <button className="btn-black" onClick={go} style={{marginBottom:16,opacity:loading?0.6:1}}>
          {loading ? "SIGNING UP..." : "SIGN UP"}
        </button>
        <div style={{textAlign:"center",fontFamily:"var(--body)",fontSize:14,color:"#777",fontWeight:600}}>
          Already have an account?{" "}
          <span className="text-link text-link-blue" onClick={()=>navigate("signin")}>Sign In</span>
        </div>
      </div>
    </div>
  );
}

function Q1Screen({navigate, onMenu, answers, setAnswers}) {

    if(id==="Something else..."){setShowElse(v=>!v);return;}
    setSel(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }
  function toggleElse(val) {
    setSel(prev=>prev.includes(val)?prev.filter(x=>x!==val):[...prev,val]);
  }
  function next(){setAnswers(a=>({...a,occasions:sel}));navigate("q2");}

  return (

// Capacity matching — "2 főre keresek" → Up to 6, Up to 8, 8+ is megfelelő
function capacityMatches(venueCapacity, searchGroup) {
  if(!venueCapacity || !searchGroup) return true;
  const order = ["2", "Up to 6", "Up to 8", "8+"];
  const vIdx = order.indexOf(venueCapacity);
  const sIdx = order.indexOf(searchGroup);
  if(vIdx === -1 || sIdx === -1) return true;
  return vIdx >= sIdx; // venue kapacitása >= keresett csoport
}

function ResultsScreen({navigate, onMenu, answers, allVenues}) {
  const BATCH=5;
  const active = allVenues.filter(v=>v.status==="active");
  const filtered = active.filter(v=>{
    if(answers.occasions?.length>0 && !answers.occasions.some(o=>(v.occasions||[]).includes(o))) return false;
    if(answers.budget && (v.price_level||v.price)!==answers.budget) return false;
    if(answers.cuisines?.length>0 && v.cuisine && !answers.cuisines.some(c=>v.cuisine.toLowerCase().includes(c.toLowerCase()))) return false;
    if(answers.group && !capacityMatches(v.capacity, answers.group)) return false;
    return true;
  });
  const pool = shuffle(filtered.length>0?filtered:active);
  const [shown,setShown]=useState(pool.slice(0,BATCH));
  const [page,setPage]=useState(1);
  const noMore=page*BATCH>=pool.length;

  function showMore(){
    const next=pool.slice(page*BATCH,(page+1)*BATCH);
    setShown(p=>[...p,...next]);
    setPage(p=>p+1);
  }

  return (
    <div className="screen" style={{padding:"20px 0 0"}}>
      <div className="hdr" style={{paddingBottom:0}}>
        <Hamburger onClick={onMenu}/>
        <div style={{width:26}}/>

        <div className="script" style={{marginTop:6}}>Our picks for you:</div>
      </div>
      <div className="scroll" style={{padding:"0 20px"}}>
        {shown.length===0&&(
          <div className="empty">
            <div className="empty-icon">😕</div>
            <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:600,color:"#777",lineHeight:1.6}}>
              No venues matched your filters.<br/>Try different options!
            </div>
            <button className="btn-blue" style={{marginTop:20,width:"auto",padding:"14px 28px"}} onClick={()=>navigate("q1")}>
              START OVER

        {shown.map((v,i)=>(

            <VenueCard venue={v} onClick={()=>navigate("venue",v)}/>
          </div>
        ))}
        {shown.length>0&&!noMore&&(
          <button className="btn-blue" style={{marginBottom:16,borderRadius:14}} onClick={showMore}>

            That's all! <span className="text-link text-link-blue" onClick={()=>navigate("q1")}>Start over</span>

        )}
      </div>
    </div>
  );
}

function ScoutFeedbackSection({venue, user, showToast}) {
  const [existing, setExisting] = useState(null);
  const [counts, setCounts] = useState({still_recommended:0, needs_review:0, report_closed:0});
  const [submitting, setSubmitting] = useState(false);

  useEffect(()=>{
    // Load own feedback
    if(user?.id){
      supabase.from("venue_feedback")
        .select("*")
        .eq("venue_id", venue.id)
        .eq("scout_id", user.id)
        .single()
        .then(({data})=>{ if(data) setExisting(data); });
    }
    // Load counts
    supabase.from("venue_feedback")
      .select("feedback_type")
      .eq("venue_id", venue.id)
      .then(({data})=>{
        if(data){
          const c={still_recommended:0,needs_review:0,report_closed:0};
          data.forEach(r=>{ if(c[r.feedback_type]!==undefined) c[r.feedback_type]++; });
          setCounts(c);
        }
      });
  },[venue.id, user?.id]);

  async function submitFeedback(type){
    if(!user?.id) return;
    setSubmitting(true);
    const prevType = existing?.feedback_type;
    if(existing){
      const {error} = await supabase.from("venue_feedback").update({feedback_type:type}).eq("id",existing.id);
      if(!error){
        setExisting(e=>({...e,feedback_type:type}));
        setCounts(c=>({...c,[prevType]:c[prevType]-1,[type]:c[type]+1}));
      }
    } else {
      const {data,error} = await supabase.from("venue_feedback").insert({
        venue_id: venue.id,
        scout_id: user.id,
        feedback_type: type
      }).select().single();
      if(!error){
        setExisting(data);
        setCounts(c=>({...c,[type]:c[type]+1}));
      }
    }
    setSubmitting(false);
    showToast("Feedback submitted ✓");
  }

  const options = [
    {type:"still_recommended", label:"Still recommended", icon:"✅"},
    {type:"needs_review", label:"Needs review", icon:"⚠️"},
    {type:"report_closed", label:"Report closed", icon:"🚫"},
  ];

  return (
    <div style={{background:"#F5F5F5",borderRadius:16,padding:16,marginTop:4}}>
      <div style={{fontFamily:"var(--display)",fontSize:13,fontWeight:800,color:"var(--blue)",letterSpacing:".06em",marginBottom:10}}>SCOUT FEEDBACK</div>
      {options.map(o=>(
        <button key={o.type} onClick={()=>!submitting&&submitFeedback(o.type)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"space-between",
            background:existing?.feedback_type===o.type?"var(--blue)":"none",
            color:existing?.feedback_type===o.type?"white":"var(--black)",
            border:"1.5px solid",
            borderColor:existing?.feedback_type===o.type?"var(--blue)":"#ddd",
            borderRadius:10,padding:"10px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8,transition:"all .15s"}}>
          <span>{o.icon} {o.label}</span>
          <span style={{background:existing?.feedback_type===o.type?"rgba(255,255,255,.25)":"#e0e0e0",borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:800,color:existing?.feedback_type===o.type?"white":"#555"}}>
            {counts[o.type]}
          </span>
        </button>
      ))}
      {existing&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:4}}>Last updated: {new Date(existing.created_at).toLocaleDateString()}</div>}
    </div>
  );
}

      why: v.why||"",
    });
    setEditingVenue(v);

  async function submitScoutEdit(){
    setEditSubmitting(true);
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      cuisine: editForm.cuisine||null,

      edit_comment: null,

    setEditingVenue(null);

  // Add Venue form state
  const [form,setForm]=useState({name:"",address:"",district:"",category:"",cuisine:"",price_level:"",capacity:"",terrace:"",instagram_url:"",reservation_url:"",google_maps_url:"",why:""});

  const [imgFiles, setImgFiles] = useState([]);

  function handleImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - imgFiles.length;
    const newFiles = files.slice(0, remaining);
    setImgFiles(prev=>[...prev, ...newFiles]);
    setImgPreviews(prev=>[...prev, ...newFiles.map(f=>URL.createObjectURL(f))]);
  }

  function removeImg(idx){
    setImgFiles(prev=>prev.filter((_,i)=>i!==idx));

  }

  async function submitVenue(){
    if(!form.name||!form.address||!form.district||!form.category||!form.price_level||!form.why||!form.google_maps_url){
      setFormError("Please fill in all required fields (*).");
      return;
    }
    setSubmitting(true);
    setFormError(null);
    try {
      const {data, error} = await supabase.from("venues").insert({
        city_id: "62aeda29-9994-4c45-8d41-d1bd68ce1fa1",
        name: form.name,
        address: form.address,
        district: form.district,
        category: form.category,
        cuisine: form.cuisine||null,
        price_level: form.price_level,

        submitted_by: user?.id||null,
        status: "pending",

      // Upload images if selected

      setImgPreviews([]);
      showToast("Submitted for review ✓");

  // Scout edit screen

        <select style={selectStyle} value={editForm.cuisine} onChange={e=>setEditForm(f=>({...f,cuisine:e.target.value}))}>

        </select>
        <select style={selectStyle} value={editForm.price_level} onChange={e=>setEditForm(f=>({...f,price_level:e.target.value}))}>
          <option value="">Price level *</option>
          {BUDGETS.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
        <select style={selectStyle} value={editForm.capacity} onChange={e=>setEditForm(f=>({...f,capacity:e.target.value}))}>

        <select style={selectStyle} value={editForm.terrace} onChange={e=>setEditForm(f=>({...f,terrace:e.target.value}))}>
          <option value="">Terrace?</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

          {editSubmitting?"RESUBMITTING...":"RESUBMIT FOR REVIEW →"}
        </button>
      </div>
    </div>
  );

  return (

      <div className="hdr"><Hamburger onClick={onMenu}/><div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,color:"var(--blue)",letterSpacing:".04em"}}>SCOUT MODE</div><div/></div>
      <div className="tabs">
        {[["all","All Venues"],["add","Add Venue"],["activity","My Activity"]].map(([k,l])=>(
          <button key={k} className={`tab${tab===k?" on":""}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      {tab==="all"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          <div className="input-wrap-light" style={{marginBottom:12}}>
            <span style={{color:"#aaa"}}>🔍</span>
            <input placeholder="Search venue..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {filtered.map(v=>(
            <div key={v.id} className="admin-card" onClick={()=>navigate("venue",v)} style={{cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16}}>{v.name}</div>

      {tab==="add"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          <div style={{fontFamily:"var(--body)",fontSize:13,fontWeight:700,color:"#888",marginBottom:14}}>Submit a new venue for review</div>
          {[["name","Venue name *"],["address","Address *"],["district","District * (e.g. V)"]].map(([k,p])=>(
            <div key={k} className="input-wrap-light" style={{marginBottom:10}}>
              <input placeholder={p} value={form[k]} onChange={e=>setF(k,e.target.value)}/>

          <select style={selectStyle} value={form.category} onChange={e=>setF("category",e.target.value)}>
            <option value="">Category *</option>
            {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select style={selectStyle} value={form.cuisine} onChange={e=>setF("cuisine",e.target.value)}>

              <input placeholder={p} value={form[k]} onChange={e=>setF(k,e.target.value)}/>

          <div className="input-wrap-light" style={{marginBottom:10,alignItems:"flex-start"}}>
            <textarea placeholder="Why locals go here * (max 280 chars)" maxLength={280} rows={4} value={form.why} onChange={e=>setF("why",e.target.value)} style={{border:"none",outline:"none",background:"transparent",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",flex:1,resize:"none"}}/>

      {tab==="activity"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          <div style={{display:"flex",gap:12,marginBottom:20}}>

          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:16,color:"var(--black)",marginBottom:10,letterSpacing:".04em"}}>MY SUBMISSIONS</div>
          {myVenues.length===0
            ?<div className="empty"><div className="empty-icon">📍</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No submissions yet.</div></div>

                {v.status==="needs_edit"&&(
                  <button onClick={()=>startScoutEdit(v)} style={{background:"var(--blue)",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"white",cursor:"pointer",width:"100%",marginTop:4}}>
                    ✏ Edit & Resubmit
                  </button>
                )}
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

function CityLeadScreen({navigate, allVenues, setAllVenues, onMenu, showToast}) {
  const [tab,setTab]=useState("pending");
  const [editComment,setEditComment]=useState({});
  const [showEditFor,setShowEditFor]=useState(null);
  const [editingVenue,setEditingVenue]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [uploadingImg,setUploadingImg]=useState(false);
  const [saving,setSaving]=useState(false);
  const [reports,setReports]=useState([]);

  const CATEGORIES = ["Restaurant","Café","Bar","Brunch","Street food"];
  const CAPACITIES = ["2","Up to 6","Up to 8","8+"];

  const pending=allVenues.filter(v=>v.status==="pending"||v.status==="needs_edit"||v.status==="rejected");
  const active=[...allVenues.filter(v=>v.status==="active")].reverse();

  useEffect(()=>{
    supabase.from("venue_reports")
      .select("*, venues(name)")
      .order("created_at",{ascending:false})
      .then(({data})=>{ if(data) setReports(data); });
  },[]);

  async function sendEmailNotification(type, venueId, editComment=""){
    try {
      const {data: venue} = await supabase.from("venues").select("name, submitted_by").eq("id", venueId).single();
      if(!venue?.submitted_by) return;
      const {data: scout} = await supabase.from("users").select("email").eq("id", venue.submitted_by).single();
      if(!scout?.email) return;
      await supabase.functions.invoke("send-email", {
        body: { type, to: scout.email, venue_name: venue.name, edit_comment: editComment }
      });
    } catch(e) { console.log("Email error:", e); }
  }

  async function updateStatus(id, status){
    const {error} = await supabase.from("venues").update({status}).eq("id", id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===id?{...v,status}:v));
    showToast("Updated: "+status);
    if(status==="active") sendEmailNotification("approved", id);
    if(status==="rejected") sendEmailNotification("rejected", id);
  }

  async function deleteVenue(id){
    const {error} = await supabase.from("venues").delete().eq("id",id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.filter(v=>v.id!==id));
    showToast("Venue deleted ✓");
  }

  async function sendEdit(id){
    const comment=editComment[id]||"";
    const {error} = await supabase.from("venues").update({status:"needs_edit", edit_comment:comment}).eq("id", id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===id?{...v,status:"needs_edit",edit_comment:comment}:v));
    setShowEditFor(null);
    setEditComment(e=>({...e,[id]:""}));
    showToast("Edit request sent ✓");
    sendEmailNotification("needs_edit", id, comment);
  }

  const [editImgFiles, setEditImgFiles] = useState([]);
  const [editImgPreviews, setEditImgPreviews] = useState([]);
  const [existingImages, setExistingImages] = useState([]);

  async function loadExistingImages(venueId){
    const {data} = await supabase.from("venue_images").select("id,url").eq("venue_id",venueId).order("sort_order");
    if(data) setExistingImages(data);
  }

  function handleEditImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - existingImages.length - editImgFiles.length;
    const newFiles = files.slice(0, remaining);
    setEditImgFiles(prev=>[...prev,...newFiles]);
    setEditImgPreviews(prev=>[...prev,...newFiles.map(f=>URL.createObjectURL(f))]);
  }

  function removeEditImg(idx){
    setEditImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setEditImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }

  async function removeExistingImg(img){
    await supabase.from("venue_images").delete().eq("id",img.id);
    setExistingImages(prev=>prev.filter(i=>i.id!==img.id));
  }

  function startEdit(v){
    setEditImgFiles([]);
    setEditImgPreviews([]);
    setExistingImages([]);
    loadExistingImages(v.id);
    setEditForm({
      name: v.name||"",
      address: v.address||"",
      district: v.district||"",
      category: v.category||"",
      cuisine: v.cuisine||"",
      price_level: v.price_level||v.price||"",
      capacity: v.capacity||"",
      terrace: v.terrace?"yes":"no",
      google_maps_url: v.google_maps_url||"",
      instagram_url: v.instagram_url||"",
      reservation_url: v.reservation_url||"",
      why: v.why||"",
      scout_alias: v.scout_alias||"",
    });
    setEditingVenue(v);
  }

  async function uploadImage(file, venueId){
    setUploadingImg(true);
    const ext = file.name.split(".").pop();
    const path = `${venueId}/${Date.now()}.${ext}`;
    const {error} = await supabase.storage.from("venue-images").upload(path, file);
    if(error){showToast("Upload error: "+error.message);setUploadingImg(false);return;}
    const {data} = supabase.storage.from("venue-images").getPublicUrl(path);
    await supabase.from("venue_images").insert({venue_id:venueId, url:data.publicUrl, is_primary:true});
    showToast("Image uploaded ✓");
    setUploadingImg(false);
  }

  async function saveEdit(){
    setSaving(true);
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      cuisine: editForm.cuisine||null,
      price_level: editForm.price_level,
      capacity: editForm.capacity||null,
      terrace: editForm.terrace==="yes",
      google_maps_url: editForm.google_maps_url||null,
      instagram_url: editForm.instagram_url||null,
      reservation_url: editForm.reservation_url||null,
      why: editForm.why,
      scout_alias: editForm.scout_alias||null,
    }).eq("id", editingVenue.id);
    if(error){showToast("Error: "+error.message);setSaving(false);return;}
    // Upload new images
    for(let i=0;i<editImgFiles.length;i++){
      const file = editImgFiles[i];
      const ext = file.name.split(".").pop();
      const path = `${editingVenue.id}/${Date.now()}_${i}.${ext}`;
      const {error: uploadErr} = await supabase.storage.from("venue-images").upload(path, file);
      if(!uploadErr){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("venue_images").insert({venue_id:editingVenue.id, url:urlData.publicUrl, is_primary:existingImages.length===0&&i===0, sort_order:existingImages.length+i});
      }
    }
    setAllVenues(p=>p.map(v=>v.id===editingVenue.id?{...v,...editForm,price:editForm.price_level}:v));
    showToast("Venue updated ✓");

                  {v.status!=="rejected"&&<button style={{background:"#F8D7DA",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#58151C",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"rejected")}>✕ Reject</button>}

                  {v.status==="rejected"&&<button style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#0A3622",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"pending")}>↩ Restore</button>}

                  <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>{v.cuisine} · Dist. {v.district} · {v.price_level||v.price}</div>
                </div>
                <StatusPill status={v.status}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={{background:"var(--blue)",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"white",cursor:"pointer"}} onClick={()=>startEdit(v)}>✏ Edit</button>
                <button style={{background:"#F8D7DA",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#58151C",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"closed")}>✕ Close</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {tab==="reports"&&(
        <div className="scroll" style={{padding:"14px 20px"}}>
          {reports.length===0
            ?<div className="empty"><div className="empty-icon">🚩</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No reports yet.</div></div>
            :Object.entries(
                reports.reduce((acc,r)=>{
                  const key = r.venue_id;
                  if(!acc[key]) acc[key]={name:r.venues?.name||"Unknown venue", reports:[]};
                  acc[key].reports.push(r);
                  return acc;
                },{})
              ).map(([venueId,group])=>(
              <div key={venueId} className="admin-card" style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{group.name}</div>
                  <button onClick={async()=>{
                    await Promise.all(group.reports.map(r=>supabase.from("venue_reports").delete().eq("id",r.id)));
                    setReports(prev=>prev.filter(r=>r.venue_id!==venueId));
                  }} style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"6px 12px",fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"#0A3622",cursor:"pointer"}}>
                    ✓ Resolved
                  </button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {group.reports.map(r=>(
                    <div key={r.id} style={{background:"#F8D7DA",color:"#58151C",borderRadius:8,padding:"3px 10px",fontFamily:"var(--display)",fontWeight:700,fontSize:12}}>
                      {r.report_type==="closed"?"Closed"
                       :r.report_type==="wrong_address"?"Wrong address"
                       :r.report_type==="photos_outdated"?"Photos outdated"
                       :"Other"}
                    </div>
                  ))}
                </div>
                <div style={{fontFamily:"var(--body)",fontSize:11,color:"#aaa",fontWeight:600,marginTop:6}}>
                  {group.reports.length} report{group.reports.length>1?"s":""} · Latest: {new Date(group.reports[0].created_at).toLocaleDateString()}
                </div>
              </div>
            ))
          }
        </div>
      )}
      {tab==="partners"&&(
        <PartnerManageTab showToast={showToast}/>
      )}
    </div>
  );
}

function PartnerManageTab({showToast}) {
  const [partners, setPartners] = useState([]);
  const [pins, setPins] = useState({});
  const [generating, setGenerating] = useState(null);

  useEffect(()=>{
    supabase.from("partners").select("*").order("name").then(({data})=>{
      if(data) setPartners(data);
    });
  },[]);

  async function generatePin(partnerId){
    setGenerating(partnerId);
    const pin = Math.floor(1000 + Math.random() * 9000).toString();
    const validUntil = new Date();
    validUntil.setMonth(validUntil.getMonth() + 3);
    const {error} = await supabase.from("partner_pins").insert({
      partner_id: partnerId,
      pin,
      valid_from: new Date().toISOString(),
      valid_until: validUntil.toISOString()
    });
    setGenerating(null);
    if(error){ showToast("Error: "+error.message); return; }
    setPins(p=>({...p, [partnerId]: pin}));
    showToast("PIN generated: " + pin);
  }

  return (
    <div className="scroll" style={{padding:"14px 20px"}}>
      {partners.length===0
        ?<div className="empty"><div className="empty-icon">🏨</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No partners yet.</div></div>
        :partners.map(p=>(
          <div key={p.id} className="admin-card" style={{marginBottom:12}}>
            <div style={{marginBottom:8}}>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{p.name}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>{p.type} · {p.plan} · {p.address}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,color:"var(--blue)",fontWeight:600,marginTop:1}}>🔗 lokalz.vercel.app/{p.slug}</div>
            </div>
            {pins[p.id]&&(
              <div style={{background:"#D1E7DD",borderRadius:10,padding:"10px 14px",marginBottom:10,fontFamily:"var(--display)",fontWeight:800,fontSize:20,color:"#0A3622",textAlign:"center",letterSpacing:".3em"}}>
                {pins[p.id]}
                <div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:600,color:"#0A3622",opacity:.7,marginTop:2,letterSpacing:0}}>Valid 3 months — send to hotel</div>
              </div>
            )}
            <button onClick={()=>generatePin(p.id)} style={{background:"var(--blue)",border:"none",borderRadius:10,padding:"10px 16px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,color:"white",cursor:"pointer",width:"100%",opacity:generating===p.id?0.6:1}}>
              {generating===p.id?"GENERATING...":"🔑 Generate new PIN"}
            </button>
          </div>
        ))
      }
    </div>
  );
}

function ProfileScreen({navigate, user, onMenu, onSignOut, darkMode, setDarkMode}) {
  const [editing, setEditing] = useState(null);
  const [newPassword, setNewPassword] = useState("");
  const [newPassword2, setNewPassword2] = useState("");
  const [newCity, setNewCity] = useState(user?.city||"Budapest");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showDelete, setShowDelete] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState("");

  function showMsg(text, isErr=false){setMsg({text,isErr});setTimeout(()=>setMsg(null),3000);}

  async function savePassword(){
    if(newPassword.length<6) return showMsg("Password must be at least 6 characters.",true);
    if(newPassword!==newPassword2) return showMsg("Passwords don't match.",true);
    setSaving(true);
    const {error} = await supabase.auth.updateUser({password: newPassword});
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setNewPassword("");setNewPassword2("");setEditing(null);
    showMsg("Password updated ✓");
  }

  async function saveCity(){
    setSaving(true);
    const {error} = await supabase.from("users").update({city_id: null}).eq("id",user.id);
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setEditing(null);
    showMsg("City updated ✓");
  }

  async function deleteAccount(){
    if(deleteConfirm!=="DELETE") return showMsg("Type DELETE to confirm.",true);
    const {error} = await supabase.rpc("delete_user");
    if(error){
      // fallback: just sign out
      await supabase.auth.signOut();
      onSignOut();
      return;
    }
    await supabase.auth.signOut();
    onSignOut();
  }

  const rowStyle={background:"var(--white)",borderRadius:14,padding:"16px",marginBottom:10,cursor:"pointer"};

  return (
    <div className="screen">
      <div className="hdr"><Hamburger onClick={onMenu}/><div/></div>
      <div style={{padding:"12px 24px 24px"}}>
        <div className="logo-md">LOKALZ</div>
        <div className="script" style={{marginTop:6}}>Profile</div>
      </div>
      <div className="scroll" style={{padding:"0 20px"}}>

        {/* Name — read only */}
        <div style={rowStyle}>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em"}}>NAME</div>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15,color:"var(--black)",marginTop:2}}>{user?.name||"User"}</div>
        </div>

        {/* Password */}
        <div style={rowStyle} onClick={()=>setEditing(editing==="password"?null:"password")}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em"}}>PASSWORD</div>
              <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15,color:"var(--black)",marginTop:2}}>••••••••</div>
            </div>
            <span style={{color:"var(--blue)",fontSize:20}}>{editing==="password"?"∨":"›"}</span>
          </div>
          {editing==="password"&&(
            <div style={{marginTop:12}} onClick={e=>e.stopPropagation()}>
              <input type="password" placeholder="New password" value={newPassword} onChange={e=>setNewPassword(e.target.value)}
                style={{width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,marginBottom:8,outline:"none"}}/>
              <input type="password" placeholder="Confirm password" value={newPassword2} onChange={e=>setNewPassword2(e.target.value)}
                style={{width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,marginBottom:10,outline:"none"}}/>
              <button onClick={savePassword} style={{background:"var(--blue)",color:"white",border:"none",borderRadius:10,padding:"11px",width:"100%",fontFamily:"var(--display)",fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.6:1}}>
                {saving?"SAVING...":"SAVE PASSWORD"}
              </button>
            </div>
          )}
        </div>

        {/* City */}
        <div style={rowStyle} onClick={()=>setEditing(editing==="city"?null:"city")}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".06em"}}>CITY</div>
              <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15,color:"var(--black)",marginTop:2}}>{newCity}</div>
            </div>
            <span style={{color:"var(--blue)",fontSize:20}}>{editing==="city"?"∨":"›"}</span>
          </div>
          {editing==="city"&&(
            <div style={{marginTop:12}} onClick={e=>e.stopPropagation()}>
              <select value={newCity} onChange={e=>setNewCity(e.target.value)}

                {saving?"SAVING...":"SAVE CITY"}

            </div>
          )}

        {/* Dark mode */}

        {/* Delete account */}

            <div style={{fontFamily:"var(--body)",fontSize:13,fontWeight:600,color:"#888",marginBottom:12}}>Type DELETE to confirm. This cannot be undone.</div>
            <input placeholder="Type DELETE" value={deleteConfirm} onChange={e=>setDeleteConfirm(e.target.value)}
              style={{width:"100%",border:"1.5px solid #F8D7DA",borderRadius:10,padding:"11px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,marginBottom:10,outline:"none"}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={deleteAccount} style={{flex:1,background:"#58151C",color:"white",border:"none",borderRadius:10,padding:"11px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer",opacity:deleteConfirm==="DELETE"?1:.5}}>
                DELETE
              </button>
              <button onClick={()=>{setShowDelete(false);setDeleteConfirm("");}} style={{background:"#eee",border:"none",borderRadius:10,padding:"11px 16px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          </div>
        }
        <div style={{height:32}}/>
      </div>
    </div>
  );
}

// ── PARTNER ACTIVATE SCREEN ──────────────────
function PartnerActivateScreen({partner, navigate, user, onActivate, showToast}) {
  const [pin, setPin] = useState("");
  const [nights, setNights] = useState(1);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  async function activate(){
    if(!pin) return setError("Please enter the PIN code.");
    setLoading(true);
    setError(null);
    // Check PIN
    const {data: validPin} = await supabase
      .from("partner_pins")
      .select("id")
      .eq("partner_id", partner.id)
      .eq("pin", pin)
      .gt("valid_until", new Date().toISOString())
      .single();

    if(!validPin){
      setLoading(false);
      return setError("Invalid or expired PIN. Please check with the hotel reception.");
    }

    // Save partner access to user profile
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + nights);

    const {error: updateError} = await supabase.from("users").update({
      partner_id: partner.id,
      partner_access_expires_at: expiresAt.toISOString()
    }).eq("id", user.id);

    setLoading(false);
    if(updateError) return setError("Something went wrong. Please try again.");

    onActivate({...user, partner_id: partner.id, partner_access_expires_at: expiresAt.toISOString()});
    showToast("Welcome to " + partner.name + "! 🎉");
    navigate("home");
  }

  return (
    <div className="screen" style={{padding:"36px 28px", justifyContent:"space-between"}}>
      <div>
        <div className="logo-md">LOKALZ</div>
        <div className="script" style={{marginTop:8}}>Activate your stay</div>
        <div style={{fontFamily:"var(--body)",fontSize:15,fontWeight:600,color:"#555",marginTop:8,lineHeight:1.5}}>
          Enter the PIN code from {partner.name} to unlock your local guide.
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".08em",marginBottom:8}}>PIN CODE</div>
          <input
            className="input-field"
            placeholder="Enter PIN"
            value={pin}
            onChange={e=>setPin(e.target.value)}
            maxLength={8}
            style={{textAlign:"center",fontSize:24,letterSpacing:".3em"}}
          />
        </div>
        <div>
          <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:13,color:"#888",letterSpacing:".08em",marginBottom:8}}>HOW MANY NIGHTS?</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[1,2,3,4,5,6,7].map(n=>(
              <button key={n} onClick={()=>setNights(n)}
                style={{flex:1,minWidth:40,background:nights===n?"var(--black)":"var(--blue)",color:"white",border:"none",borderRadius:12,padding:"14px 8px",fontFamily:"var(--display)",fontWeight:800,fontSize:17,cursor:"pointer"}}>
                {n}
              </button>
            ))}
          </div>
        </div>
        {error&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#c00",fontWeight:600,background:"rgba(255,0,0,.08)",padding:"10px 14px",borderRadius:10}}>{error}</div>}
      </div>
      <button className="btn-black" onClick={activate} style={{opacity:loading?0.6:1}}>
        {loading?"ACTIVATING...":"ACTIVATE →"}
      </button>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────
function App() {
  const [screen, setScreen] = useState("signin");
  const [prevScreen, setPrevScreen] = useState(null);
  const [selectedVenue, setSelectedVenue] = useState(null);
  const [showMenu, setShowMenu] = useState(false);
  const [toast, setToast] = useState(null);
  const [user, setUser] = useState(null);
  const [savedIds, setSavedIds] = useState(new Set());
  const [allVenues, setAllVenues] = useState([]);
  const [venuesLoading, setVenuesLoading] = useState(true);
  const [answers, setAnswers] = useState({});
  const [partner, setPartner] = useState(null);

  // Detect partner slug from URL path
  useEffect(()=>{
    const path = window.location.pathname.replace("/","").trim();
    if(path && path.length > 0){
      supabase.from("partners").select("*").eq("slug", path).single().then(({data})=>{
        if(data) setPartner(data);
      });
    }
  },[]);

  // Load venues from Supabase
  useEffect(()=>{
    async function loadVenues(){
      setVenuesLoading(true);
      const {data, error} = await supabase
        .from("venues")
        .select("*")
        .in("status",["active","pending","needs_edit","watchlist"]);
      if(!error && data) setAllVenues(data.map(v=>({
        ...v,
        price: v.price_level,
        why: v.why,
        emoji: "🍽",
        occasions: v.occasions || []
      })));
      setVenuesLoading(false);
    }
    loadVenues();
  },[]);

  const [darkMode, setDarkMode] = useState(false);

  useEffect(()=>{
    const root = document.getElementById("root");
    if(darkMode) root.classList.add("dark-mode");
    else root.classList.remove("dark-mode");
  },[darkMode]);
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session){
        supabase.from("users").select("*").eq("id",session.user.id).single().then(({data:profile})=>{
          const u = {
            id: session.user.id,
            name: profile?.name || session.user.email.split("@")[0],
            email: session.user.email,
            role: profile?.role?.toLowerCase() || "user",
            city_id: profile?.city_id || null
          };
          setUser(u);
          loadSavedIds(u.id);
          // Show onboarding if no city selected yet
          setScreen(u.city_id ? "home" : "onboarding");
        });
      }
    });
    supabase.auth.onAuthStateChange(async (event, session)=>{
      if(event==="SIGNED_OUT"){
        setUser(null);
        setSavedIds(new Set());
        setScreen("signin");
      }
    });
  },[]);

  function navigate(target, data) {
    if(target==="venue"&&data){setSelectedVenue(data);setPrevScreen(screen);}
    setScreen(target);
    setShowMenu(false);
  }
  function showToastMsg(msg){setToast(msg);setTimeout(()=>setToast(null),2000);}

  async function loadSavedIds(userId){
    const {data, error} = await supabase
      .from("saved_venues")
      .select("venue_id")
      .eq("user_id", userId);
    console.log("loadSavedIds", userId, data, error);
    if(data) setSavedIds(new Set(data.map(r=>r.venue_id)));
  }

  async function toggleSave(id){
    if(!user) return;
    const isSaved = savedIds.has(id);
    if(isSaved){
      setSavedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
      await supabase.from("saved_venues").delete().eq("user_id",user.id).eq("venue_id",id);
    } else {
      setSavedIds(prev=>new Set(prev).add(id));
      await supabase.from("saved_venues").insert({user_id:user.id, venue_id:id});
    }
  }

  function onLogin(u){
    setUser(u);
    if(u?.id) loadSavedIds(u.id);
    // If partner context → go to activate screen (or home if already has active access)
    if(partner){
      const hasActiveAccess = u?.partner_id===partner.id && u?.partner_access_expires_at && new Date(u.partner_access_expires_at) > new Date();
      if(hasActiveAccess) setScreen("home");
      else setScreen("partner_activate");
    }
  }
  async function signOut(){
    await supabase.auth.signOut();
    setUser(null);
    setSavedIds(new Set());
    setScreen("signin");
  }

  const isScout = user?.role==="scout"||user?.role==="city_lead";
  const isPartnerActive = user?.partner_id && user?.partner_access_expires_at && new Date(user.partner_access_expires_at) > new Date();

  // If partner detected in URL and user not logged in → show partner landing
  useEffect(()=>{
    if(partner && screen==="signin"){
      setScreen("partner_landing");
    }
  },[partner]);

  const screens = {
    signin: <SignInScreen navigate={navigate} onLogin={onLogin}/>,
    signup: <SignUpScreen navigate={navigate} onLogin={onLogin}/>,
    onboarding: <OnboardingScreen navigate={navigate} user={user}/>,
    home: <HomeScreen navigate={navigate} onMenu={()=>setShowMenu(true)} setAnswers={setAnswers} user={user} partner={isPartnerActive ? partner : null}/>,
    q1: <Q1Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers}/>,
    q2: <Q2Screen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} setAnswers={setAnswers} partnerDistrict={isPartnerActive ? partner?.district : null}/>,
    q3: <Q3Screen navigate={navigate} answers={answers} setAnswers={setAnswers}/>,
    q4: <Q4Screen navigate={navigate} answers={answers} setAnswers={setAnswers}/>,
    q5: <Q5Screen navigate={navigate} answers={answers} setAnswers={setAnswers}/>,
    results: <ResultsScreen navigate={navigate} onMenu={()=>setShowMenu(true)} answers={answers} allVenues={allVenues}/>,
    venue: selectedVenue&&<VenueDetailScreen venue={selectedVenue} navigate={navigate} savedIds={savedIds} toggleSave={toggleSave} showToast={showToastMsg} isScout={isScout} user={user}/>,
    saved: <SavedScreen navigate={navigate} savedIds={savedIds} allVenues={allVenues} onMenu={()=>setShowMenu(true)}/>,
    all_venues: <AllVenuesScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)}/>,
    scout: <ScoutScreen navigate={navigate} allVenues={allVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg} setAllVenues={setAllVenues} user={user}/>,
    city_lead: <CityLeadScreen navigate={navigate} allVenues={allVenues} setAllVenues={setAllVenues} onMenu={()=>setShowMenu(true)} showToast={showToastMsg}/>,
    profile: <ProfileScreen navigate={navigate} user={user} onMenu={()=>setShowMenu(true)} onSignOut={signOut} darkMode={darkMode} setDarkMode={setDarkMode}/>,
    partner_landing: partner&&<PartnerLandingScreen partner={partner} navigate={navigate} onLogin={onLogin}/>,
    partner_activate: partner&&user&&<PartnerActivateScreen partner={partner} navigate={navigate} user={user} onActivate={u=>{setUser(u);}} showToast={showToastMsg}/>,
    partner_signup: <SignUpScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
    partner_signin: <SignInScreen navigate={navigate} onLogin={onLogin} partner={partner}/>,
  };

  return (
    <div style={{width:"100%",height:"100%",position:"relative"}}>
      {screens[screen]||screens.signin}
      {showMenu&&<Menu onClose={()=>setShowMenu(false)} navigate={navigate} role={user?.role||"user"} onSignOut={signOut}/>}
      {toast&&<div className="toast">{toast}</div>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
