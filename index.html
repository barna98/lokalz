function DraggableImageGrid({previews, onMove, onRemove, onAdd, maxPhotos=5}) {
  const [selectedIdx, setSelectedIdx] = React.useState(null);

  function handleTap(i){
    if(selectedIdx===null){
      // First tap: select
      setSelectedIdx(i);
    } else if(selectedIdx===i){
      // Tap same: deselect
      setSelectedIdx(null);
    } else {
      // Tap different: move
      onMove(selectedIdx, i);
      setSelectedIdx(null);
    }
  }

  return (
    <div>
      {selectedIdx!==null&&(
        <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:600,color:"var(--red)",marginBottom:8,textAlign:"center"}}>
          tap another photo to swap positions
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {previews.map((src,i)=>(
          <div key={i}
            onClick={()=>handleTap(i)}
            style={{
              position:"relative",
              aspectRatio:"1",
              borderRadius:10,
              overflow:"hidden",
              cursor:"pointer",
              outline: selectedIdx===i?"3px solid var(--red)":"2px solid transparent",
              transform: selectedIdx===i?"scale(0.95)":"scale(1)",
              transition:"all .15s",
              boxSizing:"border-box"
            }}>
            <img src={src.url||src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <button
              onClick={e=>{e.stopPropagation();onRemove(i);}}
              style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:"50%",width:24,height:24,color:"white",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>
              ✕
            </button>
            {i===0&&<div style={{position:"absolute",bottom:4,left:4,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"2px 6px",fontFamily:"var(--display)",fontWeight:700,fontSize:10,color:"white"}}>MAIN</div>}
            {selectedIdx===null&&<div style={{position:"absolute",top:4,left:4,background:"rgba(0,0,0,.4)",borderRadius:6,padding:"3px 5px",fontSize:11,color:"rgba(255,255,255,.8)"}}>⠿</div>}
            {selectedIdx===i&&<div style={{position:"absolute",inset:0,background:"rgba(220,38,38,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"var(--red)",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:14}}>✓</div>
            </div>}
          </div>
        ))}
        {previews.length<maxPhotos&&(
          <label style={{aspectRatio:"1",borderRadius:10,border:"2px dashed #ddd",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:4}}>
            <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={onAdd}/>
            <span style={{fontSize:24}}>📷</span>
            <span style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#888"}}>Add</span>
          </label>
        )}
      </div>
    </div>
  );
}

function ScoutScreen({navigate, allVenues, onMenu, showToast, setAllVenues, user, cities}) {
  const scoutScrollRef = React.useRef(null);
  React.useEffect(()=>{ setTimeout(()=>restoreScroll("scout", scoutScrollRef.current), 50); },[]);
  const [tab,setTab]=useState("add");
  const [editingVenue, setEditingVenue]=useState(null);
  const [editForm, setEditForm]=useState({});
  const [editSubmitting, setEditSubmitting]=useState(false);
  const [categoryCustomTags, setCategoryCustomTags] = useState({});

  async function loadCustomTagsForCategory(category){
    if(!category || categoryCustomTags[category]) return;
    const {data} = await supabase.from("category_tags").select("tag").eq("category",category).order("count",{ascending:false});
    if(data) setCategoryCustomTags(prev=>({...prev,[category]:data.map(r=>r.tag)}));
  }

  async function saveCustomTag(category, tag){
    if(!category||!tag) return;
    await supabase.from("category_tags").upsert({category,tag,count:1},{onConflict:"category,tag",ignoreDuplicates:false});
    // increment count
    await supabase.rpc("increment_tag_count",{p_category:category,p_tag:tag}).then(()=>{}).catch?.(()=>{});
    setCategoryCustomTags(prev=>({
      ...prev,
      [category]: prev[category] ? [...new Set([...prev[category],tag])] : [tag]
    }));
  }

  const [scoutEditImgFiles, setScoutEditImgFiles] = useState([]);
  const [scoutEditImgPreviews, setScoutEditImgPreviews] = useState([]);
  const [scoutExistingImages, setScoutExistingImages] = useState([]);

  async function loadScoutExistingImages(venueId){
    const {data} = await supabase.from("venue_images").select("id,url").eq("venue_id",venueId).order("sort_order");
    if(data) setScoutExistingImages(data);
  }
  function handleScoutEditImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - scoutExistingImages.length - scoutEditImgFiles.length;
    const newFiles = files.slice(0, remaining);
    setScoutEditImgFiles(prev=>[...prev,...newFiles]);
    setScoutEditImgPreviews(prev=>[...prev,...newFiles.map(f=>URL.createObjectURL(f))]);
  }
  function removeScoutExistingImg(img){
    supabase.from("venue_images").delete().eq("id",img.id);
    setScoutExistingImages(prev=>prev.filter(i=>i.id!==img.id));
  }
  function removeScoutEditImg(idx){
    setScoutEditImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setScoutEditImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }
  function moveScoutExistingImg(from,to){
    if(to<0||to>=scoutExistingImages.length) return;
    setScoutExistingImages(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }
  function moveScoutEditImg(from,to){
    if(to<0||to>=scoutEditImgPreviews.length) return;
    setScoutEditImgFiles(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
    setScoutEditImgPreviews(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }
  // Only submitted_by, fallback to scout_alias if submitted_by is null
  const myVenues=allVenues.filter(v=>
    v.submitted_by===user?.id ||
    (!v.submitted_by && v.scout_alias && user?.name && v.scout_alias.toLowerCase().startsWith(user.name.split(" ")[0].toLowerCase()))
  );

  function startScoutEdit(v){
    setScoutEditImgFiles([]);
    setScoutEditImgPreviews([]);
    setScoutExistingImages([]);
    loadScoutExistingImages(v.id);
    loadCustomTagsForCategory(v.category);
    setEditForm({
      name: v.name||"",
      address: v.address||"",
      district: v.district||"",
      category: v.category||"",
      cuisine: v.cuisine||"",
      price_level: v.price_level||v.price||"",
      capacity: v.capacity||"",
      google_maps_url: v.google_maps_url||"",
      instagram_url: v.instagram_url||"",
      reservation_url: v.reservation_url||"",
      why: v.why||"",
      occasions: v.occasions||[],
      is_city_pick: v.is_city_pick||false,
      subcategory: v.subcategory||"",
      tags: v.tags||[],
    });
    setEditingVenue(v);
  }

  async function submitScoutEdit(){
    setEditSubmitting(true);
    // Auto-fetch google_place_id if not set
    let placeId = editingVenue.google_place_id||null;
    let lat = editingVenue.latitude||null;
    let lng = editingVenue.longitude||null;
    if(!placeId && editForm.name) {
      const pd = await fetchPlaceId(editForm.name, editForm.address);
      placeId = pd?.place_id || null;
      lat = pd?.latitude || lat;
      lng = pd?.longitude || lng;
    }
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      subcategory: editForm.subcategory||null,
      cuisine: editForm.cuisine||null,
      price_level: editForm.price_level,
      capacity: editForm.capacity||null,

      google_maps_url: editForm.google_maps_url||null,
      instagram_url: editForm.instagram_url||null,
      reservation_url: editForm.reservation_url||null,
      why: editForm.why,
      occasions: editForm.occasions||[],
      tags: editForm.tags||[],
      status: "pending",
      edit_comment: null,
      google_place_id: placeId,
      latitude: lat,
      longitude: lng,
    }).eq("id", editingVenue.id);
    setEditSubmitting(false);
    if(error){showToast("Error: "+error.message);return;}
    // Save any custom tags
    const scoutCustomTags = (editForm.tags||[]).filter(t=>!TAGS.includes(t));
    for(const tag of scoutCustomTags) await saveCustomTag(editForm.category, tag);

    // Update existing image sort order
    for(let i=0;i<scoutExistingImages.length;i++){
      await supabase.from("venue_images").update({sort_order:i,is_primary:i===0}).eq("id",scoutExistingImages[i].id);
    }
    // Upload new images
    for(let i=0;i<scoutEditImgFiles.length;i++){
      const file = scoutEditImgFiles[i];
      const ext = file.name.split(".").pop();
      const path = `${editingVenue.id}/${Date.now()}_${i}.${ext}`;
      const {error: uploadErr} = await supabase.storage.from("venue-images").upload(path, file);
      if(!uploadErr){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("venue_images").insert({venue_id:editingVenue.id, url:urlData.publicUrl, is_primary:scoutExistingImages.length===0&&i===0, sort_order:scoutExistingImages.length+i});
      }
    }
    setAllVenues(p=>p.map(v=>v.id===editingVenue.id?{...v,...editForm,status:"pending",edit_comment:null,price:editForm.price_level}:v));
    showToast(t("toast.resubmitted"));
    setEditingVenue(null);
    setTab(t("scout.activity"));
  }

  // Add Venue form state
  const [form,setForm]=useState({name:"",address:"",district:"",category:"",subcategory:"",cuisine:"",price_level:"",capacity:"",terrace:"",instagram_url:"",reservation_url:"",google_maps_url:"",why:"",city_id:user?.city_id||"",google_place_id:"",latitude:null,longitude:null,dietary:[],tags:[]});
  const [duplicates, setDuplicates]=useState([]);
  const [checkingDupe, setCheckingDupe]=useState(false);
  const [selOccasions,setSelOccasions]=useState([]);
  const [customOccasion,setCustomOccasion]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [formError,setFormError]=useState(null);
  const [geocoding,setGeocoding]=useState(false);
  const [geocodeResult,setGeocodeResult]=useState(null); // {lat,lng,display_name}
  // Google Places Autocomplete
  const [placeSuggestions,setPlaceSuggestions]=useState([]);
  const [placeSearchVal,setPlaceSearchVal]=useState("");
  const [placeSelected,setPlaceSelected]=useState(false);
  const [loadingPlace,setLoadingPlace]=useState(false);
  const placeSessionToken=React.useRef(null);
  const placeSvc=React.useRef(null);
  const placeDetailSvc=React.useRef(null);

  // Helper: get autocomplete service (lazy init after google loads)
  function getPlaceSvc(){
    if(!window.google?.maps?.places) return null;
    if(!placeSvc.current) placeSvc.current=new window.google.maps.places.AutocompleteService();
    if(!placeDetailSvc.current){
      const mapDiv=document.createElement("div");
      placeDetailSvc.current=new window.google.maps.places.PlacesService(mapDiv);
    }
    if(!placeSessionToken.current) placeSessionToken.current=new window.google.maps.places.AutocompleteSessionToken();
    return placeSvc.current;
  }

  // Debounced place search
  function handlePlaceSearch(val){
    setPlaceSearchVal(val);
    setPlaceSelected(false);
    setF("name",val);
    if(val.trim().length<2){setPlaceSuggestions([]);return;}
    const svc=getPlaceSvc();
    if(!svc){
      // fallback: no google loaded yet, just use regular name field
      setPlaceSuggestions([]);
      return;
    }
    clearTimeout(window._placeTimeout);
    window._placeTimeout=setTimeout(()=>{
      setLoadingPlace(true);
      svc.getPlacePredictions({
        input:val,
        types:["establishment"],
        componentRestrictions:{country:"hu"},
        sessionToken:placeSessionToken.current
      },(preds,status)=>{
        setLoadingPlace(false);
        if(status===window.google.maps.places.PlacesServiceStatus.OK && preds){
          setPlaceSuggestions(preds.slice(0,5));
        } else {
          setPlaceSuggestions([]);
        }
      });
    },350);
  }

  // Budapest district mapping from postal code
  function districtFromPostal(postal){
    const code=parseInt(postal);
    if(!code) return "";
    const map={1011:"I",1012:"I",1013:"I",1014:"I",1015:"I",1016:"I",1021:"II",1022:"II",1023:"II",1024:"II",1025:"II",1026:"II",1027:"II",1028:"II",1029:"II",1031:"III",1032:"III",1033:"III",1034:"III",1035:"III",1036:"III",1037:"III",1038:"III",1039:"III",1041:"IV",1042:"IV",1043:"IV",1044:"IV",1045:"IV",1046:"IV",1047:"IV",1048:"IV",1051:"V",1052:"V",1053:"V",1054:"V",1055:"V",1056:"V",1061:"VI",1062:"VI",1063:"VI",1064:"VI",1065:"VI",1066:"VI",1067:"VI",1068:"VI",1071:"VII",1072:"VII",1073:"VII",1074:"VII",1075:"VII",1076:"VII",1077:"VII",1078:"VII",1081:"VIII",1082:"VIII",1083:"VIII",1084:"VIII",1085:"VIII",1086:"VIII",1087:"VIII",1088:"VIII",1089:"VIII",1091:"IX",1092:"IX",1093:"IX",1094:"IX",1095:"IX",1096:"IX",1097:"IX",1098:"IX",1101:"X",1102:"X",1103:"X",1104:"X",1105:"X",1106:"X",1107:"X",1108:"X",1111:"XI",1112:"XI",1113:"XI",1114:"XI",1115:"XI",1116:"XI",1117:"XI",1118:"XI",1119:"XI",1121:"XII",1122:"XII",1123:"XII",1124:"XII",1125:"XII",1126:"XII",1131:"XIII",1132:"XIII",1133:"XIII",1134:"XIII",1135:"XIII",1136:"XIII",1137:"XIII",1138:"XIII",1139:"XIII",1141:"XIV",1142:"XIV",1143:"XIV",1144:"XIV",1145:"XIV",1146:"XIV",1147:"XIV",1148:"XIV",1149:"XIV",1151:"XV",1152:"XV",1153:"XV",1154:"XV",1158:"XV",1161:"XVI",1162:"XVI",1163:"XVI",1164:"XVI",1165:"XVI",1172:"XVII",1173:"XVII",1174:"XVII",1175:"XVII",1181:"XVIII",1182:"XVIII",1183:"XVIII",1184:"XVIII",1185:"XVIII",1186:"XVIII",1188:"XVIII",1191:"XIX",1192:"XIX",1193:"XIX",1194:"XIX",1195:"XIX",1196:"XIX",1201:"XX",1202:"XX",1203:"XX",1204:"XX",1211:"XXI",1212:"XXI",1213:"XXI",1214:"XXI",1215:"XXI",1221:"XXII",1222:"XXII",1223:"XXII",1224:"XXII",1225:"XXII",1231:"XXIII",1237:"XXIII",1238:"XXIII",1239:"XXIII"};
    return map[code]||"";
  }

  // On place selection: fetch details and fill form
  function selectPlace(pred){
    if(!placeDetailSvc.current) return;
    setPlaceSuggestions([]);
    setLoadingPlace(true);
    const name=pred.structured_formatting?.main_text||pred.description;
    setPlaceSearchVal(name);
    setF("name",name);
    placeDetailSvc.current.getDetails({
      placeId:pred.place_id,
      fields:["name","formatted_address","address_components","url","place_id"],
      sessionToken:placeSessionToken.current
    },(place,status)=>{
      setLoadingPlace(false);
      placeSessionToken.current=null; // reset token after detail fetch
      if(status!==window.google.maps.places.PlacesServiceStatus.OK||!place) return;
      // Extract postal code for district
      const postalComp=place.address_components?.find(c=>c.types.includes("postal_code"));
      const postal=postalComp?.long_name||"";
      const district=districtFromPostal(postal);
      // Build clean address (street + number)
      const route=place.address_components?.find(c=>c.types.includes("route"))?.long_name||"";
      const num=place.address_components?.find(c=>c.types.includes("street_number"))?.long_name||"";
      const cleanAddr=route&&num?`${route} ${num}`:place.formatted_address||"";
      // Google Maps URL
      const mapsUrl=place.url||`https://maps.google.com/?cid=${place.place_id}`;
      setForm(f=>({...f,
        name:place.name||name,
        address:cleanAddr,
        district:district,
        google_maps_url:mapsUrl,
        google_place_id:place.place_id||""
      }));
      setPlaceSearchVal(place.name||name);
      setPlaceSelected(true);
      // Also trigger dupe check on the filled name
      if(place.name&&place.name.trim().length>=2){
        setCheckingDupe(true);
        supabase.from("venues").select("id,name,district,status").ilike("name",`%${place.name.trim()}%`).limit(3).then(({data})=>{
          setDuplicates(data||[]);
          setCheckingDupe(false);
        });
      }
    });
  }

  function setF(k,v){
    setForm(f=>({...f,[k]:v}));
    if(k==="name" && v.trim().length>=2){
      setCheckingDupe(true);
      clearTimeout(window._dupeTimeout);
      window._dupeTimeout = setTimeout(async()=>{
        const {data} = await supabase.from("venues")
          .select("id,name,district,status")
          .ilike("name", `%${v.trim()}%`)
          .limit(3);
        setDuplicates(data||[]);
        setCheckingDupe(false);
      }, 500);
    } else if(k==="name") {
      setDuplicates([]);
    }
  }
  function toggleOcc(o){setSelOccasions(prev=>prev.includes(o)?prev.filter(x=>x!==o):[...prev,o]);}

  const [imgFiles, setImgFiles] = useState([]);
  const [imgPreviews, setImgPreviews] = useState([]);

  function handleImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - imgFiles.length;
    const newFiles = files.slice(0, remaining);
    setImgFiles(prev=>[...prev, ...newFiles]);
    setImgPreviews(prev=>[...prev, ...newFiles.map(f=>URL.createObjectURL(f))]);
  }

  function removeImg(idx){
    setImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }

  function moveImg(from, to){
    if(to<0||to>=imgPreviews.length) return;
    setImgFiles(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
    setImgPreviews(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }

  async function getCoordinates(){
    const query=[form.name,form.address,"Budapest"].filter(Boolean).join(", ");
    if(!form.address){setFormError(t("err.fill_all"));return;}
    setGeocoding(true);setGeocodeResult(null);setFormError(null);
    try{
      const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=hu`;
      const res=await fetch(url,{headers:{"Accept-Language":"en","User-Agent":"Lokalz/1.0"}});
      const data=await res.json();
      if(!data||data.length===0){
        setGeocodeResult({error:true});
        setGeocoding(false);
        return;
      }
      const r=data[0];
      const lat=parseFloat(r.lat);
      const lng=parseFloat(r.lon);
      const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(form.name+", "+form.address+", Budapest")}`;
      setGeocodeResult({lat,lng,display_name:r.display_name});
      setF("google_maps_url",mapsUrl);
      setF("latitude",lat);
      setF("longitude",lng);
    }catch(e){
      setGeocodeResult({error:true});
    }
    setGeocoding(false);

  async function submitVenue(){
    if(!form.name||!form.address||!form.district||!form.category||!form.price_level||!form.why||!form.google_maps_url||!form.city_id){
      setFormError("Please fill in all required fields (*).");
      return;
    }
    if(form.category==="Restaurant"&&!form.cuisine){
      setFormError("Please select a cuisine for Restaurant.");
      return;
    }
    // Exact duplicate check
    const exactMatch = duplicates.find(d=>d.name.toLowerCase()===form.name.trim().toLowerCase());
    if(exactMatch){
      setFormError(`"${exactMatch.name}" already exists in District ${exactMatch.district}. Please check before submitting.`);
      return;
    }
    setSubmitting(true);
    setFormError(null);
    try {
      const {data, error} = await supabase.from("venues").insert({
        city_id: form.city_id || user?.city_id || "62aeda29-9994-4c45-8d41-d1bd68ce1fa1",
        name: form.name,
        address: form.address,
        district: form.district,
        category: form.category,
        subcategory: form.subcategory||null,
        cuisine: form.cuisine||null,
        price_level: form.price_level,
        capacity: form.capacity||null,

        google_maps_url: form.google_maps_url,
        instagram_url: form.instagram_url||null,
        reservation_url: form.reservation_url||null,
        dietary: form.dietary||[],
      tags: form.tags||[],
        why: form.why,
        scout_alias: (()=>{ const fn=(user?.name||"Scout").split(" ")[0]; const b=user?.badge||"The Local"; return `${fn} - ${b}`; })(),
        submitted_by: user?.id||null,
        status: "pending",
        occasions: customOccasion.trim() ? [...selOccasions, customOccasion.trim()] : selOccasions,
        ...await fetchPlaceId(form.name, form.address).then(pd=>({
          google_place_id: pd?.place_id||null,
          latitude: pd?.latitude||null,
          longitude: pd?.longitude||null,
        })).catch(()=>({google_place_id:null,latitude:null,longitude:null})),
      }).select().single();
      if(error) throw error;
      // Upload images if selected
      // Save any custom tags to category_tags table
    const customTagsToSave = (form.tags||[]).filter(t=>!TAGS.includes(t));
    for(const tag of customTagsToSave) await saveCustomTag(form.category, tag);

    if(imgFiles.length>0 && data?.id){
        for(let i=0;i<imgFiles.length;i++){
          const file = imgFiles[i];
          const ext = file.name.split(".").pop();
          const path = `${data.id}/${Date.now()}_${i}.${ext}`;
          const {error: uploadErr} = await supabase.storage.from("venue-images").upload(path, file);
          if(!uploadErr){
            const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
            await supabase.from("venue_images").insert({venue_id:data.id, url:urlData.publicUrl, is_primary:i===0, sort_order:i});
          }
        }
      }
      setAllVenues(v=>[...v, {...data, price: data.price_level, emoji:"🍽"}]);
      setForm({name:"",address:"",district:"",category:"",subcategory:"",cuisine:"",price_level:"",capacity:"",terrace:"",instagram_url:"",reservation_url:"",google_maps_url:"",why:"",city_id:user?.city_id||"",google_place_id:"",latitude:null,longitude:null,dietary:[],tags:[]});
      setGeocodeResult(null);
      setPlaceSearchVal("");
      setPlaceSelected(false);
      setPlaceSuggestions([]);
      setSelOccasions([]);
      setCustomOccasion("");
      setImgFiles([]);
      setImgPreviews([]);
      showToast(t("toast.submitted"));
      setTab(t("scout.activity"));
    } catch(e){
      setFormError(e.message||"Submit failed. Try again.");
    } finally {
      setSubmitting(false);
    }
  }

              onRemove={removeImg}

              <div key={label} style={{flex:1,background:"var(--white)",borderRadius:16,padding:"16px",textAlign:"center"}}>

                <div style={{fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:"#888"}}>{label}</div>
              </div>
            ))}
          </div>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16,color:"var(--black)",marginBottom:10}}>my submissions</div>
          {myVenues.length===0
            ?<div className="empty"><div className="empty-icon">📍</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No submissions yet.</div></div>
            :myVenues.map(v=>(
              <div key={v.id} className="admin-card">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:v.edit_comment?6:0}}>
                  <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15}}>{v.name}</div>
                  <StatusPill status={v.status}/>
                </div>
                {v.edit_comment&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#e67e00",fontWeight:600,marginTop:6,background:"#FFF3CD",padding:"8px 10px",borderRadius:8,marginBottom:8}}>✏ {v.edit_comment}</div>}
                {v.status==="needs_edit"&&(
                  <button onClick={()=>startScoutEdit(v)} style={{background:"var(--red)",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"white",cursor:"pointer",width:"100%",marginTop:4}}>
                    ✏ Edit & Resubmit
                  </button>
                )}
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

function CityLeadScreen({navigate, allVenues, setAllVenues, onMenu, showToast, user}) {
  const clScrollRef = React.useRef(null);
  React.useEffect(()=>{
    if(tab==="all") setTimeout(()=>restoreScroll("cityLead", clScrollRef.current), 50);
  },[tab]);
  const [tab,setTab]=useState("pending");
  const [editComment,setEditComment]=useState({});
  const [showEditFor,setShowEditFor]=useState(null);
  const [expandedVenue,setExpandedVenue]=useState(null);
  const [editingVenue,setEditingVenue]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [uploadingImg,setUploadingImg]=useState(false);
  const [saving,setSaving]=useState(false);
  const [reports,setReports]=useState([]);
  const [clSearch,setClSearch]=useState("");
  const [clCategory,setClCategory]=useState("");
  const [pendingEvents,setPendingEvents]=useState([]);
  const [scouts,setScouts]=useState([]);
  const [assignScout,setAssignScout]=useState({}); // {[venueId]: scoutUserId}

  useEffect(()=>{
    supabase.from("events").select("*, venues(name,city_id), users(name)")
      .eq("status","pending").order("created_at",{ascending:false})
      .then(({data})=>{
        if(data) setPendingEvents(data.filter(e=>e.venues?.city_id===user?.city_id||!e.venues?.city_id));
      });
    // Load scouts for assignment
    supabase.from("users").select("id,name,email").in("role",["SCOUT","CITY_LEAD","scout","city_lead"])
      .then(({data})=>{ if(data) setScouts(data); });
  },[]);

  async function approveEvent(id){
    await supabase.from("events").update({status:"active"}).eq("id",id);
    setPendingEvents(p=>p.filter(e=>e.id!==id));
    showToast(t("toast.event_approved"));
  }
  async function rejectEvent(id){
    if(!window.confirm("Reject and delete this event?")) return;
    await supabase.from("events").delete().eq("id",id);
    setPendingEvents(p=>p.filter(e=>e.id!==id));
    showToast(t("cl.event_rejected"));
  }

  const CATEGORIES = ["Restaurant","Café","Bar","Bakery","Patisserie","Street food","Other"];
  const BAR_SUBCATEGORIES = ["Cocktail bar","Wine bar","Pub","Night club","Speakeasy"];
  const CAPACITIES = ["2","3-6","6-8","9+"];

  // City Lead csak a saját városának venue-jait látja
  const cityVenues = user?.city_id
    ? allVenues.filter(v=>v.city_id===user.city_id)
    : allVenues;

  const pending=cityVenues.filter(v=>v.status==="pending"||v.status==="needs_edit");
  const rejected=cityVenues.filter(v=>v.status==="rejected");
  const active=[...cityVenues.filter(v=>v.status==="active")].reverse();

  useEffect(()=>{
    // Reports csak az adott város venue-jaihoz
    const cityVenueIds = allVenues.filter(v=>v.city_id===user?.city_id).map(v=>v.id);
    if(cityVenueIds.length>0){
      supabase.from("venue_reports")
        .select("*, venues(name)")
        .in("venue_id", cityVenueIds)
        .order("created_at",{ascending:false})
        .then(({data})=>{ if(data) setReports(data); });
    }
  },[]);

  async function sendEmailNotification(type, venueId, editComment=""){
    try {
      const {data: venue} = await supabase.from("venues").select("name, submitted_by").eq("id", venueId).single();
      if(!venue?.submitted_by){ showToast(t("err.no_scout")); return; }
      const {data: scout} = await supabase.from("users").select("email").eq("id", venue.submitted_by).single();
      if(!scout?.email) return;
      await supabase.functions.invoke("send-email", {
        body: { type, to: scout.email, venue_name: venue.name, edit_comment: editComment }
      });
    } catch(e) { }
  }

  async function updateStatus(id, status){
    const updates = {status};
    if(status==="active") updates.approved_at = new Date().toISOString();
    const {error} = await supabase.from("venues").update(updates).eq("id", id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===id?{...v,...updates}:v));
    showToast(t("cl.updated")+status);
    if(status==="active") sendEmailNotification("approved", id);
    if(status==="rejected") sendEmailNotification("rejected", id);
  }

  async function deleteVenue(id){
    const {error} = await supabase.from("venues").delete().eq("id",id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.filter(v=>v.id!==id));
    showToast(t("cl.deleted"));
  }

  async function sendEdit(id){
    const comment=editComment[id]||"";
    const scoutId=assignScout[id]||null;
    const updateData={status:"needs_edit", edit_comment:comment};
    if(scoutId) updateData.submitted_by=scoutId;
    const {error} = await supabase.from("venues").update(updateData).eq("id", id);
    if(error){showToast("Error: "+error.message);return;}
    setAllVenues(p=>p.map(v=>v.id===id?{...v,status:"needs_edit",edit_comment:comment,...(scoutId?{submitted_by:scoutId}:{})}:v));
    setShowEditFor(null);
    setEditComment(e=>({...e,[id]:""}));
    showToast(t("cl.edit_sent"));
    sendEmailNotification("needs_edit", id, comment);
  }

  const [editImgFiles, setEditImgFiles] = useState([]);
  const [editImgPreviews, setEditImgPreviews] = useState([]);
  const [existingImages, setExistingImages] = useState([]);
  const [categoryCustomTags, setCategoryCustomTags] = useState({});

  async function loadCustomTagsForCategory(category){
    if(!category || categoryCustomTags[category]) return;
    const {data} = await supabase.from("category_tags").select("tag").eq("category",category).order("count",{ascending:false});
    if(data) setCategoryCustomTags(prev=>({...prev,[category]:data.map(r=>r.tag)}));
  }

  async function saveCustomTag(category, tag){
    if(!category||!tag) return;
    await supabase.from("category_tags").upsert({category,tag,count:1},{onConflict:"category,tag",ignoreDuplicates:false});
    setCategoryCustomTags(prev=>({...prev,[category]:prev[category]?[...new Set([...prev[category],tag])]:[tag]}));
  }

  async function loadExistingImages(venueId){
    const {data} = await supabase.from("venue_images").select("id,url").eq("venue_id",venueId).order("sort_order");
    if(data) setExistingImages(data);
  }

  function handleEditImgSelect(e){
    const files = Array.from(e.target.files);
    const remaining = 5 - existingImages.length - editImgFiles.length;
    const newFiles = files.slice(0, remaining);
    setEditImgFiles(prev=>[...prev,...newFiles]);
    setEditImgPreviews(prev=>[...prev,...newFiles.map(f=>URL.createObjectURL(f))]);
  }

  function removeEditImg(idx){
    setEditImgFiles(prev=>prev.filter((_,i)=>i!==idx));
    setEditImgPreviews(prev=>prev.filter((_,i)=>i!==idx));
  }

  function moveExistingImg(from, to){
    if(to<0||to>=existingImages.length) return;
    setExistingImages(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }

  function moveEditImg(from, to){
    if(to<0||to>=editImgPreviews.length) return;
    setEditImgFiles(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
    setEditImgPreviews(prev=>{ const a=[...prev]; [a[from],a[to]]=[a[to],a[from]]; return a; });
  }

  async function removeExistingImg(img){
    await supabase.from("venue_images").delete().eq("id",img.id);
    setExistingImages(prev=>prev.filter(i=>i.id!==img.id));
  }

  function startEdit(v){
    setEditImgFiles([]);
    setEditImgPreviews([]);
    setExistingImages([]);
    loadExistingImages(v.id);
    loadCustomTagsForCategory(v.category);
    setEditForm({
      name: v.name||"",
      address: v.address||"",
      district: v.district||"",
      category: v.category||"",
      subcategory: v.subcategory||"",
      cuisine: v.cuisine||"",
      price_level: v.price_level||v.price||"",
      capacity: v.capacity||"",
      google_maps_url: v.google_maps_url||"",
      instagram_url: v.instagram_url||"",
      reservation_url: v.reservation_url||"",
      why: v.why||"",
      scout_alias: v.scout_alias||"",
      occasions: v.occasions||[],
      is_city_pick: v.is_city_pick||false,
      dietary: v.dietary||[],
      tags: v.tags||[],
      website_url: v.website_url||"",
    });
    setEditingVenue(v);
  }

  async function uploadImage(file, venueId){
    setUploadingImg(true);
    const ext = file.name.split(".").pop();
    const path = `${venueId}/${Date.now()}.${ext}`;
    const {error} = await supabase.storage.from("venue-images").upload(path, file);
    if(error){showToast(t("cl.upload_error")+error.message);setUploadingImg(false);return;}
    const {data} = supabase.storage.from("venue-images").getPublicUrl(path);
    await supabase.from("venue_images").insert({venue_id:venueId, url:data.publicUrl, is_primary:true});
    showToast(t("toast.image_uploaded"));
    setUploadingImg(false);
  }

  async function saveEdit(){
    setSaving(true);
    // Auto-fetch google_place_id if not already set
    let placeId = editingVenue.google_place_id||null;
    let lat = editingVenue.latitude||null;
    let lng = editingVenue.longitude||null;
    if(!placeId && editForm.name) {
      const pd = await fetchPlaceId(editForm.name, editForm.address);
      placeId = pd?.place_id || null;
      lat = pd?.latitude || lat;
      lng = pd?.longitude || lng;
    }
    const {error} = await supabase.from("venues").update({
      name: editForm.name,
      address: editForm.address,
      district: editForm.district,
      category: editForm.category||null,
      subcategory: editForm.subcategory||null,
      cuisine: editForm.cuisine||null,
      price_level: editForm.price_level,
      capacity: editForm.capacity||null,
      google_maps_url: editForm.google_maps_url||null,
      instagram_url: editForm.instagram_url||null,
      reservation_url: editForm.reservation_url||null,
      why: editForm.why,
      scout_alias: editForm.scout_alias||null,
      occasions: editForm.customOccasion?.trim() ? [...(editForm.occasions||[]), editForm.customOccasion.trim()] : editForm.occasions||[],
      is_city_pick: editForm.is_city_pick||false,
      dietary: editForm.dietary||[],
      tags: editForm.tags||[],
      website_url: editForm.website_url||null,
      google_place_id: placeId,
      latitude: lat,
      longitude: lng,
    }).eq("id", editingVenue.id);
    if(error){
      showToast("Error: "+error.message+" | "+error.details+" | "+error.hint);
      setSaving(false);return;
    }
    // Upload new images
    // Save any custom tags
    const clCustomTags = (editForm.tags||[]).filter(t=>!TAGS.includes(t));
    for(const tag of clCustomTags) await saveCustomTag(editForm.category, tag);

    // Update sort_order for existing images based on current order
    for(let i=0;i<existingImages.length;i++){
      await supabase.from("venue_images").update({sort_order:i, is_primary:i===0}).eq("id",existingImages[i].id);
    }
    for(let i=0;i<editImgFiles.length;i++){
      const file = editImgFiles[i];
      const ext = file.name.split(".").pop();
      const path = `${editingVenue.id}/${Date.now()}_${i}.${ext}`;
      const {error: uploadErr} = await supabase.storage.from("venue-images").upload(path, file);
      if(!uploadErr){
        const {data: urlData} = supabase.storage.from("venue-images").getPublicUrl(path);
        await supabase.from("venue_images").insert({venue_id:editingVenue.id, url:urlData.publicUrl, is_primary:existingImages.length===0&&i===0, sort_order:existingImages.length+i});
      }
    }
    setAllVenues(p=>p.map(v=>v.id===editingVenue.id?{...v,...editForm,status:editingVenue.status,occasions:editForm.occasions||[],is_city_pick:editForm.is_city_pick||false,dietary:editForm.dietary||[],price:editForm.price_level}:v));
    showToast("Venue updated ✓");
    setSaving(false);
    setEditingVenue(null);
  }

  const inputStyle={width:"100%",background:"var(--white)",border:"1.5px solid #ddd",borderRadius:12,padding:"12px 14px",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",marginBottom:10,outline:"none"};
  const selectStyle={...inputStyle,cursor:"pointer"};

  // Edit venue screen
  if(editingVenue) return (
    <div className="screen">
      <div className="hdr">
        <button className="back-btn" onClick={()=>setEditingVenue(null)}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16,color:"var(--red)"}}>EDIT VENUE</div>
        <div style={{width:26}}/>
      </div>
      <div className="scroll" style={{padding:"14px 20px 80px"}}>
        {[["name","Name *"],["address","Address *"],["scout_alias","Scout alias"],
          ["google_maps_url","Google Maps URL"],["instagram_url","Instagram URL"],
          ["reservation_url","Reservation URL"],["website_url","Website URL"]].map(([k,p])=>(
          <input key={k} style={inputStyle} placeholder={p} value={editForm[k]||""} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))}/>
        ))}
        <select style={selectStyle} value={editForm.district||""} onChange={e=>setEditForm(f=>({...f,district:e.target.value}))}>
          <option value="">{t("opt.select_district")}</option>
          {["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII","XIX","XX","XXI","XXII","XXIII"].map(d=>(
            <option key={d} value={d}>District {d}.</option>
          ))}
        </select>
        <select style={selectStyle} value={editForm.category||""} onChange={e=>setEditForm(f=>({...f,category:e.target.value,subcategory:""}))}>
          <option value="">{t("opt.select_category")}</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{tCat(c)}</option>)}
        </select>
        {editForm.category==="Bar"&&(
          <select style={selectStyle} value={editForm.subcategory||""} onChange={e=>setEditForm(f=>({...f,subcategory:e.target.value}))}>
            <option value="">{t("opt.select_bar_type")}</option>
            {["Cocktail bar","Wine bar","Pub","Night club","Speakeasy"].map(s=><option key={s} value={s}>{tCat(s)}</option>)}
          </select>
        )}
        {editForm.category==="Restaurant"&&(
          <select style={{...selectStyle,borderColor:!editForm.cuisine?"var(--red)":"#ddd"}} value={editForm.cuisine||""} onChange={e=>setEditForm(f=>({...f,cuisine:e.target.value}))}>
            <option value="">{t("opt.select_cuisine")}</option>
            {CUISINES_FILTER.map(c=><option key={c} value={c}>{tCui(c)}</option>)}
          </select>
        )}
        <select style={selectStyle} value={editForm.price_level||""} onChange={e=>setEditForm(f=>({...f,price_level:e.target.value}))}>
          <option value="">{t("opt.select_price")}</option>
          {BUDGETS.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
        <select style={selectStyle} value={editForm.capacity||""} onChange={e=>setEditForm(f=>({...f,capacity:e.target.value}))}>
          <option value="">{t("opt.select_capacity")}</option>
          {CAPACITIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>

        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#FFFFFF",border:"1.5px solid #ddd",borderRadius:12,marginBottom:10,cursor:"pointer"}} onClick={()=>setEditForm(f=>({...f,is_city_pick:!f.is_city_pick}))}>
          <div style={{width:20,height:20,borderRadius:5,border:"2px solid var(--red)",background:editForm.is_city_pick?"var(--red)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {editForm.is_city_pick&&<span style={{color:"white",fontSize:12,fontWeight:800}}>✓</span>}
          </div>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"var(--black)"}}>⭐ City pick <span style={{color:"#888",fontWeight:600,fontSize:12}}>(Premium only)</span></div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",marginBottom:8}}>occasions</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {getOccasionsForCategory(editForm.category).map(occ=>{
              const sel=(editForm.occasions||[]).includes(occ);
              return <button key={occ} type="button"
                style={{padding:"7px 14px",borderRadius:20,border:"2px solid",fontFamily:"var(--body)",fontWeight:700,fontSize:12,cursor:"pointer",
                  background:sel?"var(--red)":"transparent",color:sel?"var(--white)":"var(--red)",borderColor:"var(--red)"}}
                onClick={()=>setEditForm(f=>{const cur=f.occasions||[];return{...f,occasions:sel?cur.filter(o=>o!==occ):[...cur,occ]};})}
              >{occ}</button>;
            })}
          </div>
          <input style={{...inputStyle,marginTop:8,marginBottom:0}} placeholder="Other occasion... (free text)"
            value={editForm.customOccasion||""} onChange={e=>setEditForm(f=>({...f,customOccasion:e.target.value}))}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",marginBottom:8}}>dietary options</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {DIETARY_OPTIONS.map(d=>{
              const sel=(editForm.dietary||[]).includes(d);
              return <button key={d} type="button"
                style={{padding:"7px 14px",borderRadius:20,border:"2px solid",fontFamily:"var(--body)",fontWeight:700,fontSize:12,cursor:"pointer",
                  background:sel?"var(--red)":"transparent",color:sel?"var(--white)":"var(--red)",borderColor:"var(--red)"}}
                onClick={()=>setEditForm(f=>{const cur=f.dietary||[];return{...f,dietary:sel?cur.filter(x=>x!==d):[...cur,d]};})}
              >{tDiet(d)}</button>;
            })}
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",marginBottom:8}}>tags</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:8}}>
            {getTagsForCategory(editForm.category, categoryCustomTags[editForm.category]||[]).map(t=>{
              const sel=(editForm.tags||[]).includes(t);
              return <button key={t} type="button"
                style={{padding:"7px 14px",borderRadius:20,border:"2px solid",fontFamily:"var(--body)",fontWeight:700,fontSize:12,cursor:"pointer",
                  background:sel?"var(--black)":"transparent",color:sel?"white":"var(--black)",borderColor:"var(--black)"}}
                onClick={()=>setEditForm(f=>{const cur=f.tags||[];return{...f,tags:sel?cur.filter(x=>x!==t):[...cur,t]};})}
              >{t}</button>;
            })}
          </div>
          {(()=>{
            const customTags=(editForm.tags||[]).filter(t=>!TAGS.includes(t));
            return (
              <div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
                  {customTags.map(t=>(
                    <span key={t} style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--black)",color:"white",borderRadius:20,padding:"7px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12}}>
                      {t}
                      <button type="button" onClick={()=>setEditForm(f=>({...f,tags:(f.tags||[]).filter(x=>x!==t)}))} style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>✕</button>
                    </span>
                  ))}
                </div>
                {customTags.length<3&&(
                  <div style={{display:"flex",gap:8}}>
                    <input id="customTagInput_cl" placeholder="Add custom tag..." style={{flex:1,border:"1.5px solid #ddd",borderRadius:20,padding:"7px 14px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,outline:"none"}}
                      onKeyDown={e=>{
                        if(e.key==="Enter"&&e.target.value.trim()){
                          const val=e.target.value.trim();
                          setEditForm(f=>{if((f.tags||[]).includes(val))return f;return{...f,tags:[...(f.tags||[]),val]};});
                          e.target.value="";
                        }
                      }}/>
                    <button type="button" onClick={()=>{
                      const inp=document.getElementById("customTagInput_cl");
                      if(inp&&inp.value.trim()){
                        const val=inp.value.trim();
                        setEditForm(f=>{if((f.tags||[]).includes(val))return f;return{...f,tags:[...(f.tags||[]),val]};});
                        inp.value="";
                      }
                    }} style={{background:"var(--black)",color:"white",border:"none",borderRadius:20,padding:"7px 16px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,cursor:"pointer"}}>+ add</button>
                  </div>
                )}
                {customTags.length>=3&&<div style={{fontFamily:"var(--body)",fontSize:11,color:"#888",marginTop:4}}>Max 3 custom tags reached</div>}
              </div>
            );
          })()}
        </div>
        <textarea style={{...inputStyle,resize:"none",minHeight:100}} placeholder="Why locals go here *" maxLength={280} value={editForm.why||""} onChange={e=>setEditForm(f=>({...f,why:e.target.value}))}/>
        
        {/* Image upload */}
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",letterSpacing:".05em",marginBottom:8}}>PHOTOS ({existingImages.length + editImgPreviews.length}/5)</div>
          <DraggableImageGrid
            previews={[...existingImages.map(img=>({url:img.url,id:img.id})),...editImgPreviews.map(src=>({url:src}))]}
            onMove={(from,to)=>{
              const allPreviews=[...existingImages,...editImgPreviews.map((src,i)=>({url:src,_new:true,_newIdx:i}))];
              const moved=[...allPreviews];
              [moved[from],moved[to]]=[moved[to],moved[from]];
              setExistingImages(moved.filter(x=>!x._new));
              const newNew=moved.filter(x=>x._new);
              if(newNew.length===editImgFiles.length){
                setEditImgFiles(newNew.map(x=>editImgFiles[x._newIdx]));
                setEditImgPreviews(newNew.map(x=>editImgPreviews[x._newIdx]));
              }
            }}
            onRemove={(i)=>{
              const allPreviews=[...existingImages,...editImgPreviews.map(src=>({url:src,_new:true}))];
              const item=allPreviews[i];
              if(item._new){ removeEditImg(i-existingImages.length); }
              else { removeExistingImg(item); }
            }}
            onAdd={handleEditImgSelect}
            maxPhotos={5}
          />
        </div>

        <button className="btn-blue" style={{borderRadius:14,opacity:saving?0.6:1}} onClick={saveEdit}>
          {saving?t("btn.saving"):t("btn.save_changes")}
        </button>
      </div>
    </div>
  );

  return (
    <div className="screen" style={{background:"var(--bg)"}}>
      <div style={{background:"var(--bg)",padding:"20px 24px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <button onClick={()=>{onMenu&&onMenu();}} className="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"var(--black)",marginTop:4}}>{t("menu.city_lead2")}</div>
          </div>
        </div>
      </div>
      <div className="tabs" style={{background:"var(--black)",borderBottom:"1px solid rgba(255,255,255,.15)",flexShrink:0}}>
        {[["pending","pending",pending.length],["all","all",active.length],["events","events",pendingEvents.length],["reports","reports",reports.length],["partners","partners",""]].map(([k,l,c])=>(
          <button key={k} style={{flex:1,padding:"14px 6px",fontFamily:"var(--body)",fontSize:12,fontWeight:400,color:tab===k?"white":"rgba(255,255,255,.4)",background:"none",border:"none",cursor:"pointer",borderBottom:tab===k?"2.5px solid white":"2.5px solid transparent",marginBottom:-1,transition:"all .15s"}} onClick={()=>setTab(k)}>
            {l}
          </button>
        ))}
      </div>
      {tab==="pending"&&(
        <div className="scroll" style={{padding:"14px 20px 80px"}}>
          {pending.length===0
            ?<div className="empty"><div className="empty-icon">✅</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>{t("cl.no_pending")}</div></div>
            :pending.map(v=>(
              <div key={v.id} className="admin-card" style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6,cursor:"pointer"}} onClick={()=>setExpandedVenue(expandedVenue===v.id?null:v.id)}>
                  <div style={{flex:1,marginRight:8}}>
                    <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16}}>{v.name}</div>
                    <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>{v.address} · {v.cuisine}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <StatusPill status={v.status}/>
                    <span style={{color:"#aaa",fontSize:16}}>{expandedVenue===v.id?"▲":"▼"}</span>
                  </div>
                </div>
                {expandedVenue===v.id&&(
                  <div style={{background:"#f9f9f9",borderRadius:10,padding:"12px 14px",marginBottom:10,animation:"fadeUp .15s ease both"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                      <div><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa"}}>CATEGORY</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"var(--black)"}}>{v.category||v.cuisine}</div></div>
                      <div><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa"}}>DISTRICT</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"var(--black)"}}>Dist. {v.district}</div></div>
                      <div><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa"}}>PRICE</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"var(--black)"}}>{v.price_level||v.price}</div></div>
                      <div><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa"}}>CAPACITY</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"var(--black)"}}>{v.capacity||"—"}</div></div>

                      <div><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa"}}>SCOUT</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"var(--black)"}}>{v.scout_alias||"—"}</div></div>
                    </div>
                    <div style={{marginBottom:8}}><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa",marginBottom:3}}>ADDRESS</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"var(--black)"}}>{v.address}</div></div>
                    <div style={{marginBottom:8}}><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa",marginBottom:3}}>WHY LOCALS GO HERE</div><div style={{fontFamily:"var(--body)",fontSize:13,color:"#444",lineHeight:1.5}}>{v.why}</div></div>
                    {v.occasions?.length>0&&<div style={{marginBottom:8}}><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa",marginBottom:4}}>OCCASIONS</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{v.occasions.map(o=><span key={o} style={{background:"#eee",borderRadius:20,padding:"3px 10px",fontFamily:"var(--body)",fontSize:11,color:"#555"}}>{o}</span>)}</div></div>}
                    {v.tags?.length>0&&<div style={{marginBottom:6}}><div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:700,color:"#aaa",marginBottom:4}}>{t("cl.tags")}</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{v.tags.map(t=><span key={t} style={{background:"#eee",borderRadius:20,padding:"3px 10px",fontFamily:"var(--body)",fontSize:11,color:"#555"}}>{t}</span>)}</div></div>}
                    {v.google_maps_url&&<a href={v.google_maps_url} target="_blank" rel="noreferrer" style={{fontFamily:"var(--body)",fontSize:12,color:"var(--red)",display:"block",marginTop:4}}>📍 View on Google Maps</a>}
                  </div>
                )}
                {showEditFor===v.id&&(
                  <div style={{marginBottom:10,animation:"fadeUp .2s ease both"}}>
                    <textarea
                      value={editComment[v.id]||""}
                      onChange={e=>setEditComment(prev=>({...prev,[v.id]:e.target.value}))}
                      placeholder={t("cl.edit_placeholder")}
                      rows={3}
                      style={{width:"100%",border:"1.5px solid #ddd",borderRadius:10,padding:"10px 12px",fontFamily:"var(--body)",fontSize:13,fontWeight:600,resize:"none",outline:"none",marginBottom:6}}
                    />
                    <div style={{display:"flex",gap:8}}>
                      <button style={{flex:1,background:"#FFF3CD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#664D03",cursor:"pointer"}} onClick={()=>sendEdit(v.id)}>{t("cl.send_to_scout")}</button>
                      <button style={{background:"#eee",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#666",cursor:"pointer"}} onClick={()=>setShowEditFor(null)}>{t("vd.cancel")}</button>
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginTop:showEditFor===v.id?0:10,flexWrap:"wrap"}}>
                  {v.status!=="rejected"&&<button style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#0A3622",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"active")}>✓ Approve</button>}
                  {showEditFor!==v.id&&v.status!=="rejected"&&<button style={{background:"#FFF3CD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#664D03",cursor:"pointer"}} onClick={()=>setShowEditFor(v.id)}>✏ Request edit</button>}
                  {v.status!=="rejected"&&<button style={{background:"#F8D7DA",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#58151C",cursor:"pointer"}} onClick={async()=>{
                    if(window.confirm(`Reject "${v.name}"? This will move it to the rejected list.`)) await updateStatus(v.id,"rejected");
                  }}>✕ Reject</button>}
                </div>
              </div>
            ))
          }
          {rejected.length>0&&(
            <div style={{marginTop:16}}>
              <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:13,color:"#888",marginBottom:10,letterSpacing:".04em"}}>REJECTED ({rejected.length})</div>
              {rejected.map(v=>(
                <div key={v.id} className="admin-card" style={{marginBottom:10,opacity:0.7}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15}}>{v.name}</div>
                    <StatusPill status={v.status}/>
                  </div>
                  <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginBottom:8}}>{v.address}</div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{flex:1,background:"#D1E7DD",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#0A3622",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"pending")}>↩ Restore</button>
                    <button style={{flex:1,background:"#58151C",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"white",cursor:"pointer"}} onClick={()=>{
                      if(window.confirm(`Permanently delete "${v.name}"? This cannot be undone.`)) deleteVenue(v.id);
                    }}>🗑 Delete</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {tab==="all"&&(
        <div className="scroll" style={{padding:"14px 20px 80px"}} ref={clScrollRef}
          onScroll={e=>saveScroll("cityLead",e.currentTarget)}>
          <div style={{marginBottom:12,display:"flex",justifyContent:"flex-end"}}>
            <button onClick={async()=>{
              const toUpdate = (allVenues||[]).filter(v=>v.status==="active"&&(!v.google_place_id?.trim()||!v.latitude||!v.longitude)&&v.name);
              if(toUpdate.length===0){showToast(t("cl.all_have_ids"));return;}
              const BATCH = 10;
              let count = 0;
              let i = 0;
              showToast(t("cl.fetching")+toUpdate.length+t("cl.fetching_venues"));
              async function processBatch(){
                const slice = toUpdate.slice(i, i+BATCH);
                for(const v of slice){
                  const pd = await fetchPlaceId(v.name, v.address);
                  if(pd?.place_id){
                    const {error} = await supabase.from("venues").update({
                      google_place_id: pd.place_id,
                      latitude: pd.latitude||null,
                      longitude: pd.longitude||null,
                    }).eq("id",v.id);
                    if(!error) count++;
                  }
                  await new Promise(r=>setTimeout(r,200));
                }
                i += BATCH;
                if(i < toUpdate.length){
                  showToast(`Progress: ${Math.min(i,toUpdate.length)}/${toUpdate.length}...`);
                  setTimeout(processBatch, 1000);
                } else {
                  showToast(t("cl.updated_venues")+count+t("cl.updated_venues_end"));
                }
              }
              processBatch();
            }} style={{background:"var(--black)",color:"white",border:"none",borderRadius:20,padding:"6px 14px",fontFamily:"var(--body)",fontSize:12,fontWeight:600,cursor:"pointer"}}>
              {t("cl.autofill_btn")}
            </button>
          </div>
          <div className="input-wrap-light" style={{marginBottom:8}}>
            <span style={{color:"#888",fontSize:16}}>🔍</span>
            <input placeholder="Search venue..." value={clSearch} onChange={e=>setClSearch(e.target.value)}
              style={{border:"none",outline:"none",background:"transparent",fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"var(--black)",flex:1}}/>
            {clSearch&&<button onClick={()=>setClSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:16}}>✕</button>}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            {["","Restaurant","Café","Bar","Bakery","Patisserie","Street food","Other"].map(cat=>(
              <button key={cat} onClick={()=>setClCategory(cat)}
                style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid",fontFamily:"var(--body)",fontWeight:600,fontSize:12,cursor:"pointer",
                  background:clCategory===cat?"var(--black)":"white",
                  color:clCategory===cat?"white":"var(--black)",
                  borderColor:clCategory===cat?"var(--black)":"#ddd"}}>
                {cat||"all"}
              </button>
            ))}
          </div>
          {(()=>{
            const filtered = [...active]
              .filter(v=>!clSearch||v.name.toLowerCase().includes(clSearch.toLowerCase())||v.cuisine?.toLowerCase().includes(clSearch.toLowerCase())||v.district?.toLowerCase().includes(clSearch.toLowerCase()))
              .filter(v=>!clCategory||v.category===clCategory)
              .sort((a,b)=>a.name.localeCompare(b.name));
            return filtered.length===0
              ? <div className="empty"><div className="empty-icon">🔍</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No venues found</div></div>
              : filtered.map(v=>(
                <div key={v.id} className="admin-card" style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <div style={{flex:1,marginRight:8}}>
                      <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:15}}>{v.name}</div>
                      <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>
                        {v.category}{v.cuisine?` · ${v.cuisine}`:""} · Dist. {v.district} · {v.price_level||v.price}
    
                        {v.is_city_pick&&<span style={{marginLeft:6}}>⭐</span>}
                      </div>
                      {v.occasions?.length>0&&<div style={{fontFamily:"var(--body)",fontSize:11,color:"#888",fontWeight:600,marginTop:2}}>{v.occasions.join(" · ")}</div>}
                    </div>
                    <StatusPill status={v.status}/>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{background:"var(--red)",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"white",cursor:"pointer"}} onClick={()=>startEdit(v)}>✏ Edit</button>
                    <button style={{background:"#F8D7DA",border:"none",borderRadius:8,padding:"8px 14px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#58151C",cursor:"pointer"}} onClick={()=>updateStatus(v.id,"closed")}>✕ Close</button>
                  </div>
                </div>
              ));
          })()}
        </div>
      )}
      {tab==="reports"&&(
        <div className="scroll" style={{padding:"14px 20px 80px"}}>
          {reports.length===0
            ?<div className="empty"><div className="empty-icon">🚩</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No reports yet.</div></div>
            :Object.entries(
                reports.reduce((acc,r)=>{
                  const key = r.venue_id;
                  if(!acc[key]) acc[key]={name:r.venues?.name||"Unknown venue", reports:[]};
                  acc[key].reports.push(r);
                  return acc;
                },{})
              ).map(([venueId,group])=>(
              <div key={venueId} className="admin-card" style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{group.name}</div>
                  <button onClick={async()=>{
                    await Promise.all(group.reports.map(r=>supabase.from("venue_reports").delete().eq("id",r.id)));
                    setReports(prev=>prev.filter(r=>r.venue_id!==venueId));
                  }} style={{background:"#D1E7DD",border:"none",borderRadius:8,padding:"6px 12px",fontFamily:"var(--body)",fontWeight:400,fontSize:12,color:"#0A3622",cursor:"pointer"}}>
                    ✓ Resolved
                  </button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {group.reports.map(r=>(
                    <div key={r.id} style={{background:"#F8D7DA",color:"#58151C",borderRadius:8,padding:"3px 10px",fontFamily:"var(--display)",fontWeight:700,fontSize:12}}>
                      {r.report_type==="closed"?"Closed"
                       :r.report_type==="wrong_address"?"Wrong address"
                       :r.report_type==="photos_outdated"?"Photos outdated"
                       :"Other"}
                    </div>
                  ))}
                </div>
                <div style={{fontFamily:"var(--body)",fontSize:11,color:"#888",fontWeight:600,marginTop:6}}>
                  {group.reports.length} report{group.reports.length>1?"s":""} · Latest: {new Date(group.reports[0].created_at).toLocaleDateString()}
                </div>
              </div>
            ))
          }
        </div>
      )}
      {tab==="events"&&(
        <div className="scroll" style={{padding:"14px 20px 80px"}}>
          {pendingEvents.length===0
            ?<div className="empty"><div className="empty-icon">🗓</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>{t("cl.no_pending_events")}</div></div>
            :pendingEvents.map(ev=>(
              <div key={ev.id} className="admin-card" style={{marginBottom:12}}>
                <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:16,marginBottom:4}}>{ev.title}</div>
                <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginBottom:4}}>
                  {t("cl.by")} {ev.users?.name||"Scout"} · {ev.venues?.name||t("cl.no_venue")}
                </div>
                {ev.event_date&&<div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>
                  📅 {new Date(ev.event_date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
                </div>}
                {ev.description&&<div style={{fontFamily:"var(--body)",fontSize:13,color:"#555",lineHeight:1.5,marginBottom:10}}>{ev.description}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>approveEvent(ev.id)}
                    style={{flex:1,background:"#D1E7DD",color:"#0A3622",border:"none",borderRadius:10,padding:"10px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✓ APPROVE
                  </button>
                  <button onClick={()=>rejectEvent(ev.id)}
                    style={{flex:1,background:"#F8D7DA",color:"#58151C",border:"none",borderRadius:10,padding:"10px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    ✕ REJECT
                  </button>
                </div>
              </div>
            ))
          }
        </div>
      )}
      {tab==="partners"&&(
        <PartnerManageTab showToast={showToast} cityId={user?.city_id}/>
      )}
    </div>
  );
}

function PartnerManageTab({showToast, cityId}) {
  const [partners, setPartners] = useState([]);
  const [pins, setPins] = useState({});
  const [generating, setGenerating] = useState(null);

  useEffect(()=>{
    let q = supabase.from("partners").select("*").order("name");
    if(cityId) q = q.eq("city_id", cityId);
    q.then(({data})=>{ if(data) setPartners(data); });
  },[cityId]);

  async function generatePin(partnerId){
    setGenerating(partnerId);
    const pin = Math.floor(1000 + Math.random() * 9000).toString();
    const validUntil = new Date();
    validUntil.setMonth(validUntil.getMonth() + 3);
    const {error} = await supabase.from("partner_pins").insert({
      partner_id: partnerId,
      pin,
      valid_from: new Date().toISOString(),
      valid_until: validUntil.toISOString()
    });
    setGenerating(null);
    if(error){ showToast("Error: "+error.message); return; }
    setPins(p=>({...p, [partnerId]: pin}));
    showToast(t("pin.generated") + pin);
  }

  return (
    <div className="scroll" style={{padding:"14px 20px 80px"}}>
      {partners.length===0
        ?<div className="empty"><div className="empty-icon">🏨</div><div style={{fontFamily:"var(--body)",fontSize:14,fontWeight:600,color:"#777"}}>No partners yet.</div></div>
        :partners.map(p=>(
          <div key={p.id} className="admin-card" style={{marginBottom:12}}>
            <div style={{marginBottom:8}}>
              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:15}}>{p.name}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,color:"#888",fontWeight:600,marginTop:2}}>{p.type} · {p.plan} · {p.address}</div>
              <div style={{fontFamily:"var(--body)",fontSize:12,color:"var(--red)",fontWeight:600,marginTop:1}}>🔗 lokalz.vercel.app/{p.slug}</div>
            </div>
            {pins[p.id]&&(
              <div style={{background:"#D1E7DD",borderRadius:10,padding:"10px 14px",marginBottom:10,fontFamily:"var(--display)",fontWeight:800,fontSize:20,color:"#0A3622",textAlign:"center",letterSpacing:".3em"}}>
                {pins[p.id]}
                <div style={{fontFamily:"var(--body)",fontSize:11,fontWeight:600,color:"#0A3622",opacity:.7,marginTop:2,letterSpacing:0}}>Valid 3 months — send to hotel</div>
              </div>
            )}
            <button onClick={()=>generatePin(p.id)} style={{background:"var(--red)",border:"none",borderRadius:10,padding:"10px 16px",fontFamily:"var(--display)",fontWeight:700,fontSize:13,color:"white",cursor:"pointer",width:"100%",opacity:generating===p.id?0.6:1}}>
              {generating===p.id?"generating...":"🔑 Generate new PIN"}
            </button>
          </div>
        ))
      }
    </div>
  );
}

function ProfileScreen({navigate, user, setUser, onMenu, onSignOut, cities, lang, changeLang, dark, changeDark}) {
  const [editing, setEditing] = useState(null);
  const [newName, setNewName] = useState(user?.name||"");
  const [newPassword, setNewPassword] = useState("");
  const [newPassword2, setNewPassword2] = useState("");
  const [newCity, setNewCity] = useState(user?.city||"Budapest");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);
  const [showDelete, setShowDelete] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState("");
  const [newBio, setNewBio] = useState(user?.bio||"");
  const [newInstagram, setNewInstagram] = useState(user?.instagram_url||"");
  const [uploadingImg, setUploadingImg] = useState(false);

  function showMsg(text, isErr=false){setMsg({text,isErr});setTimeout(()=>setMsg(null),3000);}

  async function saveProfile(){
    setSaving(true);
    const {error} = await supabase.from("users").update({
      bio: newBio.trim()||null,
      instagram_url: newInstagram.trim()||null,
    }).eq("id",user.id);
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setUser(u=>({...u, bio:newBio.trim(), instagram_url:newInstagram.trim()}));
    setEditing(null);
    showMsg(t("profile.updated"));
  }

  async function uploadProfileImage(file){
    setUploadingImg(true);
    const ext = file.name.split(".").pop();
    const path = `profiles/${user.id}/avatar.${ext}`;
    const {error} = await supabase.storage.from("venue-images").upload(path, file, {upsert:true, cacheControl:'3600'});
    if(error){showMsg(t("cl.upload_error")+error.message,true);setUploadingImg(false);return;}
    const {data} = supabase.storage.from("venue-images").getPublicUrl(path);
    const publicUrl = data.publicUrl + '?t=' + Date.now();
    const {error: updateError} = await supabase.from("users").update({profile_image: publicUrl}).eq("id",user.id);
    if(updateError){showMsg(t("profile.save_error")+updateError.message,true);setUploadingImg(false);return;}
    setUser(u=>({...u, profile_image:publicUrl}));
    showMsg(t("profile.photo_updated"));
    setUploadingImg(false);
  }

  async function savePassword(){
    if(newPassword.length<6) return showMsg(t("auth.password_short"),true);
    if(newPassword!==newPassword2) return showMsg(t("auth.password_mismatch"),true);
    setSaving(true);
    const {error} = await supabase.auth.updateUser({password: newPassword});
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setNewPassword("");setNewPassword2("");setEditing(null);
    showMsg(t("profile.pw_updated"));
  }

  async function saveCity(){
    setSaving(true);
    const {data: cityData} = await supabase.from("cities").select("id").eq("name", newCity).single();
    const {error} = await supabase.from("users").update({city_id: cityData?.id||null}).eq("id",user.id);
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setUser(u=>({...u, city_id: cityData?.id||null, city: newCity}));
    setEditing(null);
    showMsg(t("profile.city_updated"));
  }

  async function saveBadge(badgeId){
    setSaving(true);
    const {error} = await supabase.from("users").update({badge:badgeId}).eq("id",user.id);
    setSaving(false);
    if(error) return showMsg(error.message,true);
    setUser(u=>({...u, badge:badgeId}));
    setEditing(null);
    showMsg(t("profile.badge_updated"));
  }

  async function deleteAccount(){
    if(deleteConfirm!=="delete") return showMsg(t("err.type_delete"),true);
    const {error} = await supabase.rpc("delete_user");
    if(error){
      // fallback: just sign out
      await supabase.auth.signOut();
      onSignOut();
      return;
    }
    await supabase.auth.signOut();
    onSignOut();
  }

          <button onClick={()=>{onMenu&&onMenu();}} className="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--display)",fontSize:"44px",color:"var(--red)",lineHeight:.9,letterSpacing:0}}>LOKAL&#39;Z</div>
            <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:18,color:"var(--black)",marginTop:4}}>{t("menu.profile")}</div>
          </div>
        </div>
      </div>
      <div className="scroll" style={{padding:"16px 20px 80px",background:"white",flex:1}}>

        {/* Profile header — fekete pill kártya */}

            <div style={{width:72,height:72,borderRadius:"50%",background:"white",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>

function ScoutProfileScreen({navigate, scoutId, allVenues, user}) {
  const [scout, setScout] = useState(null);
  const [venues, setVenues] = useState({added:[], saved:[]});
  const [loading, setLoading] = useState(true);
  const [catFilter, setCatFilter] = useState("All");
  const [isFollowing, setIsFollowing] = useState(false);
  const [followLoading, setFollowLoading] = useState(false);

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const {data: sd} = await supabase
        .from("users").select("id,name,bio,instagram_url,profile_image,role,badge")
        .eq("id", scoutId).single();
      setScout(sd||null);

      const {data: added} = await supabase
        .from("venues").select("*")
        .eq("submitted_by", scoutId)
        .eq("status","active");

      const {data: saved} = await supabase
        .from("saved_venues").select("venue_id")
        .eq("user_id", scoutId);
      const savedIds = new Set((saved||[]).map(s=>s.venue_id));

      let savedVenues = [];
      if(savedIds.size > 0){
        const {data: sv} = await supabase
          .from("venues").select("*")
          .in("id",[...savedIds])
          .eq("status","active");
        savedVenues = sv||[];
      }

      const addedVenues = added||[];
      const onlySaved = (savedVenues||[]).filter(v=>!addedVenues.find(a=>a.id===v.id));
      setVenues({added: addedVenues, saved: onlySaved});

      // Check if following
      if(user?.id){
        const {data: follow} = await supabase
          .from("scout_follows")
          .select("id")
          .eq("user_id", user.id)
          .eq("scout_id", scoutId)
          .single();
        setIsFollowing(!!follow);
      }
      setLoading(false);
    }
    if(scoutId) load();
  },[scoutId]);

  async function toggleFollow(){
    if(!user?.id) return;
    setFollowLoading(true);
    if(isFollowing){
      await supabase.from("scout_follows").delete().eq("user_id",user.id).eq("scout_id",scoutId);
      setIsFollowing(false);
    } else {
      await supabase.from("scout_follows").insert({user_id:user.id, scout_id:scoutId});

function PartnerActivateScreen({partner, navigate, user, onActivate, showToast}) {
  const [pin, setPin] = useState("");
  const [nights, setNights] = useState(1);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [attempts, setAttempts] = useState(0);
  const MAX_ATTEMPTS = 5;

  async function activate(){
    if(!pin) return setError(t("err.enter_pin"));
    if(attempts >= MAX_ATTEMPTS) return setError(t("err.too_many"));
    setLoading(true);
    setError(null);
    // Check PIN
    const {data: validPin} = await supabase
      .from("partner_pins")
      .select("id")
      .eq("partner_id", partner.id)
      .eq("pin", pin)
      .gt("valid_until", new Date().toISOString())
      .single();

    if(!validPin){
      setLoading(false);
      setAttempts(a=>a+1);
      const remaining = MAX_ATTEMPTS - attempts - 1;
      return setError(remaining > 0
        ? `Invalid PIN. ${remaining} attempt${remaining===1?"":"s"} remaining.`
        : t("err.too_many")
      );
    }

    // Save partner access to user profile
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + nights);

    const {error: updateError} = await supabase.from("users").update({
      partner_id: partner.id,
      partner_access_expires_at: expiresAt.toISOString()
    }).eq("id", user.id);

    setLoading(false);
    if(updateError) return setError(t("err.something_wrong"));

    onActivate({...user, partner_id: partner.id, partner_access_expires_at: expiresAt.toISOString()});
    showToast("Welcome to " + partner.name + "! 🎉");
    navigate("home",null,{replace:true});
  }

  return (
    <div className="screen" style={{padding:"36px 28px", justifyContent:"space-between"}}>
      <div>
        <div className="logo-md">Lokal&#39;z</div>
        <div style={{fontFamily:"var(--body)",fontWeight:700,fontSize:22,color:"var(--black)",marginTop:8}}>Activate your stay</div>
